<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TORCH Pregame — Broadcast Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height:100%; width:100%; overflow:hidden;
    background:#0A0804; color:#fff;
    font-family:'Rajdhani',sans-serif;
  }

  .pregame {
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    background:#0A0804;
    overflow:hidden;
  }

  /* ── BACKGROUND TEXTURE ── */
  .bg-noise {
    position:absolute; inset:0;
    background-image:
      radial-gradient(ellipse at 50% 30%, rgba(255,69,17,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 70%, rgba(255,184,0,0.04) 0%, transparent 60%);
    pointer-events:none; z-index:0;
  }
  .bg-line {
    position:absolute; top:0; bottom:0; left:50%; width:1px;
    background:linear-gradient(180deg,transparent 0%,rgba(255,184,0,0.06) 30%,rgba(255,69,17,0.10) 50%,rgba(255,184,0,0.06) 70%,transparent 100%);
    pointer-events:none; z-index:0;
  }

  /* ── TORCH HEADER ── */
  .header {
    flex-shrink:0; z-index:1;
    display:flex; flex-direction:column; align-items:center;
    padding:28px 0 10px;
    opacity:0; animation: fadeDown 0.5s ease-out 0.1s both;
  }
  .header .flame-icon { animation: flamePulse 2s ease-in-out infinite; }
  .header .title {
    font-family:'Teko'; font-weight:700; font-size:22px;
    color:#FFB800; letter-spacing:10px; margin-top:6px;
  }
  .header .subtitle {
    font-family:'Teko'; font-size:13px;
    color:#FF6B00; letter-spacing:6px; opacity:0.6;
  }

  /* ── MATCHUP CONTAINER ── */
  .matchup {
    flex:1; z-index:1;
    display:flex; flex-direction:column;
    justify-content:center;
    padding:0 0;
    gap:0;
  }

  /* ── TEAM PANEL ── */
  .team-panel {
    position:relative;
    display:flex; align-items:center;
    padding:18px 20px;
    overflow:hidden;
    min-height:120px;
  }
  .team-panel::before {
    content:''; position:absolute; inset:0;
    opacity:0.12; pointer-events:none;
  }

  /* Away panel */
  .team-panel.away {
    border-left:4px solid var(--team-accent);
    background: linear-gradient(100deg, var(--team-primary) 0%, rgba(10,8,4,0.95) 70%);
    opacity:0; animation: slideInLeft 0.5s cubic-bezier(0.22,1,0.36,1) 0.3s both;
  }
  .team-panel.away .team-info { text-align:left; }
  .team-panel.away .panel-layout { flex-direction:row; }

  /* Home panel */
  .team-panel.home {
    border-right:4px solid var(--team-accent);
    background: linear-gradient(260deg, var(--team-primary) 0%, rgba(10,8,4,0.95) 70%);
    opacity:0; animation: slideInRight 0.5s cubic-bezier(0.22,1,0.36,1) 0.5s both;
  }
  .team-panel.home .team-info { text-align:right; }
  .team-panel.home .panel-layout { flex-direction:row-reverse; }

  .panel-layout {
    display:flex; align-items:center; gap:16px;
    width:100%;
  }

  /* Badge */
  .team-badge {
    flex-shrink:0;
    width:80px; height:80px;
    filter: drop-shadow(0 0 12px rgba(255,255,255,0.1));
  }

  /* Team info */
  .team-info { flex:1; min-width:0; }
  .team-label {
    display:inline-block;
    padding:2px 10px; border-radius:3px;
    font-family:'Rajdhani'; font-weight:700; font-size:10px;
    letter-spacing:3px; text-transform:uppercase;
  }
  .team-label.away-label { background:rgba(255,255,255,0.06); color:#777; }
  .team-label.home-label { background:rgba(255,184,0,0.15); color:#FFB800; }

  .team-school {
    font-family:'Rajdhani'; font-size:12px;
    color:rgba(255,255,255,0.35); letter-spacing:3px;
    margin-top:4px; text-transform:uppercase;
  }
  .team-name {
    font-family:'Teko'; font-weight:900; font-size:44px;
    color:#fff; letter-spacing:3px; line-height:1;
    text-shadow: 0 2px 12px var(--team-primary);
    margin-top:-2px;
  }
  .team-scheme {
    font-family:'Teko'; font-weight:500; font-size:13px;
    color:var(--team-accent); letter-spacing:4px;
    opacity:0.9;
  }
  .team-pips {
    display:flex; align-items:center; gap:14px;
    margin-top:6px;
  }
  .team-pips.right { justify-content:flex-end; }
  .pip-group {
    display:flex; align-items:center; gap:4px;
  }
  .pip-label {
    font-family:'Rajdhani'; font-size:10px; font-weight:600;
    color:#666; letter-spacing:2px;
  }

  /* ── DIAGONAL ACCENT STRIPE on panels ── */
  .team-panel.away::after {
    content:''; position:absolute;
    right:0; top:0; bottom:0; width:60px;
    background:linear-gradient(90deg, transparent, rgba(10,8,4,0.8));
    pointer-events:none;
  }
  .team-panel.home::after {
    content:''; position:absolute;
    left:0; top:0; bottom:0; width:60px;
    background:linear-gradient(270deg, transparent, rgba(10,8,4,0.8));
    pointer-events:none;
  }

  /* ── VS COLLISION ZONE ── */
  .vs-zone {
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    padding:10px 24px;
    position:relative;
    opacity:0; animation: vsSlam 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.7s both;
  }
  .vs-bar {
    flex:1; height:2px; border-radius:1px;
  }
  .vs-bar.left { background:linear-gradient(90deg, transparent 10%, #FF4511 50%, #FFB800); }
  .vs-bar.right { background:linear-gradient(270deg, transparent 10%, #FF4511 50%, #FFB800); }
  .vs-text {
    font-family:'Teko'; font-weight:900; font-size:48px;
    color:#fff;
    letter-spacing:6px; line-height:1;
    padding:0 16px;
    position:relative;
  }
  .vs-text::before {
    content:'VS'; position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    -webkit-text-stroke:2px #FFB800;
    color:transparent;
    font-family:'Teko'; font-weight:900; font-size:48px;
    letter-spacing:6px;
  }
  .vs-glow {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    pointer-events:none;
  }
  .vs-glow::after {
    content:'';
    width:80px; height:80px;
    background:radial-gradient(circle, rgba(255,184,0,0.15) 0%, transparent 70%);
    animation: vsGlowPulse 2.5s ease-in-out infinite;
  }

  /* ── CONDITIONS CARD ── */
  .conditions {
    flex-shrink:0; z-index:1;
    display:flex; flex-direction:column; align-items:center;
    padding:12px 24px 20px;
    opacity:0; animation: fadeUp 0.5s ease-out 1.0s both;
  }
  .conditions-card {
    display:flex; align-items:center;
    width:100%; max-width:300px;
    border-radius:12px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.06);
    padding:12px 0;
  }
  .cond-col {
    flex:1; display:flex; flex-direction:column;
    align-items:center; gap:2px;
  }
  .cond-icon { font-size:22px; line-height:1; }
  .cond-value {
    font-family:'Teko'; font-weight:700; font-size:24px; color:#fff;
  }
  .cond-label {
    font-family:'Rajdhani'; font-size:9px; font-weight:600;
    color:#555; letter-spacing:3px;
  }
  .cond-name {
    font-family:'Teko'; font-size:13px; color:#FFB800; letter-spacing:2px;
  }
  .cond-divider {
    width:1px; height:36px; background:rgba(255,255,255,0.06);
  }

  /* Shimmer accent */
  .shimmer-bar {
    width:70%; height:2px; margin-top:14px;
    border-radius:1px;
    background:linear-gradient(90deg, #FF4511, #FFB800, #FF4511);
    background-size:200% 100%;
    animation: shimmer 3s linear infinite;
  }

  /* Tap hint */
  .tap-hint {
    font-family:'Rajdhani'; font-size:10px; font-weight:600;
    color:rgba(255,255,255,0.15); letter-spacing:4px;
    margin-top:10px;
    animation: pulse 2s ease-in-out infinite;
  }

  /* ── FLAME PIPS ── */
  .flame-pip {
    width:12px; height:14px;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    0% { opacity:0; transform:translateY(-12px); }
    100% { opacity:1; transform:translateY(0); }
  }
  @keyframes fadeUp {
    0% { opacity:0; transform:translateY(12px); }
    100% { opacity:1; transform:translateY(0); }
  }
  @keyframes slideInLeft {
    0% { opacity:0; transform:translateX(-100%); }
    100% { opacity:1; transform:translateX(0); }
  }
  @keyframes slideInRight {
    0% { opacity:0; transform:translateX(100%); }
    100% { opacity:1; transform:translateX(0); }
  }
  @keyframes vsSlam {
    0% { opacity:0; transform:scale(2.5); }
    70% { opacity:1; transform:scale(0.95); }
    100% { opacity:1; transform:scale(1); }
  }
  @keyframes vsGlowPulse {
    0%,100% { opacity:0.5; transform:scale(1); }
    50% { opacity:1; transform:scale(1.2); }
  }
  @keyframes flamePulse {
    0%,100% { transform:scale(1); }
    50% { transform:scale(1.15); }
  }
  @keyframes shimmer {
    0% { background-position:200% 0; }
    100% { background-position:-200% 0; }
  }
  @keyframes pulse {
    0%,100% { opacity:0.15; }
    50% { opacity:0.3; }
  }
</style>
</head>
