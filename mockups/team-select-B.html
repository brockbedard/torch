<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Select — Option B: Stacked Vertical (Name Hero)</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height:100vh; height:100dvh;
    background:#0A0804; color:#fff;
    font-family:'Rajdhani',sans-serif;
    overflow:hidden;
    max-width:375px; margin:0 auto;
  }
  .shell {
    height:100vh; height:100dvh;
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  .hdr {
    flex-shrink:0;
    background:rgba(0,0,0,0.6);
    padding:8px 14px;
    display:flex; justify-content:space-between; align-items:center;
    border-bottom:2px solid #FFB800;
  }
  .hdr-title {
    font-family:'Teko'; font-weight:700; font-size:22px;
    color:#FFB800; letter-spacing:3px; font-style:italic;
    transform:skewX(-8deg);
    text-shadow:2px 2px 0 rgba(0,0,0,0.9);
  }
  .hdr-back {
    font-family:'Rajdhani'; font-size:10px; padding:6px 12px;
    background:#000; color:#fff; border:2px solid #333; border-radius:4px;
    cursor:pointer;
  }
  .instr {
    flex-shrink:0; text-align:center; padding:8px 20px 4px;
  }
  .instr h2 {
    font-family:'Teko'; font-weight:700; font-size:22px;
    color:#FFB800; letter-spacing:3px;
  }
  .instr p {
    font-family:'Rajdhani'; font-weight:500; font-size:11px;
    color:rgba(255,255,255,0.4); letter-spacing:1px; margin-top:2px;
  }
  .instr p span { color:#FFB800; }

  /* ── GRID ── */
  .grid {
    flex:1; min-height:0;
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;
    gap:8px;
    padding:6px 8px;
  }

  /* ── CARD — Option B: Team name is the hero, badge is a watermark ── */
  .card {
    min-height:0;
    border-radius:12px;
    position:relative; overflow:hidden;
    cursor:pointer;
    transition:all 0.25s ease;
    display:flex; flex-direction:column;
  }
  .card:hover { transform:scale(1.03); }
  .card-bg {
    position:absolute; inset:0; z-index:0;
  }
  /* Badge as watermark behind everything */
  .card-watermark {
    position:absolute; z-index:0;
    top:8px; right:-10px;
    opacity:0.12;
  }
  .card-inner {
    position:relative; z-index:1;
    display:flex; flex-direction:column;
    justify-content:center;
    height:100%;
    padding:10px 10px 8px;
    gap:3px;
  }
  .card-school {
    font-family:'Rajdhani'; font-weight:700; font-size:9px;
    color:rgba(255,255,255,0.5); letter-spacing:2.5px;
    text-transform:uppercase; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis;
  }
  .card-name {
    font-family:'Teko'; font-weight:700; font-size:32px;
    color:#fff; letter-spacing:3px; line-height:0.9;
    text-shadow:2px 3px 0 rgba(0,0,0,0.8);
    white-space:nowrap;
  }
  .card-name.long { font-size:22px; letter-spacing:1px; }
  .card-name.med { font-size:26px; letter-spacing:2px; }
  .card-divider {
    width:32px; height:2px; margin:3px 0;
    border-radius:1px;
  }
  .card-scheme {
    font-family:'Rajdhani'; font-weight:700; font-size:9px;
    letter-spacing:1.5px; white-space:nowrap;
    opacity:0.85;
  }
  .card-vibe {
    font-family:'Rajdhani'; font-weight:500; font-size:9px;
    color:rgba(255,255,255,0.4); line-height:1.2;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden; margin-top:1px;
  }
  .card-ratings {
    display:flex; align-items:center; gap:4px; margin-top:3px;
  }
  .card-ratings .label {
    font-family:'Rajdhani'; font-size:8px; font-weight:700;
    color:#999; letter-spacing:0.5px; min-width:18px;
  }

  .option-label {
    flex-shrink:0; text-align:center; padding:6px;
    font-family:'Rajdhani'; font-size:10px; color:rgba(255,255,255,0.25);
    letter-spacing:2px;
  }
</style>
</head>
<body>

    <div class="hdr-title">TORCH FOOTBALL</div>
    <button class="hdr-back">← BACK</button>
  </div>
  <div class="instr">
    <h2>CHOOSE YOUR TEAM</h2>
    <p><span>RUN</span> heavy? <span>PASS</span> first? Your team, your play style.</p>
  </div>
  <div class="grid" id="grid"></div>
  <div class="option-label">OPTION B — NAME HERO + BADGE WATERMARK</div>
</div>

function badge(t, sz) {
  var r=sz/2, bw=Math.max(1.5,Math.round(sz*0.025)), iSc=(sz*0.65)/512, iOff=sz*0.175;
  var bgC = {sentinels:'#8B0000',wolves:'#1A1A2E',stags:'#1C1C1C',serpents:'#2E0854'}[t.id];
  var fgC = {sentinels:'#C4A265',wolves:'#C0C0C0',stags:'#F28C28',serpents:'#39FF14'}[t.id];
  var bdC = {sentinels:'#C4A265',wolves:'#8B0000',stags:'#F28C28',serpents:'#39FF14'}[t.id];
  return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'"><circle cx="'+r+'" cy="'+r+'" r="'+(r-bw)+'" fill="'+bgC+'" stroke="'+bdC+'" stroke-width="'+bw+'"/><g transform="translate('+iOff+','+iOff+') scale('+iSc.toFixed(4)+')"><path d="'+t.path+'" fill="'+fgC+'"/></g></svg>';
}

function rawIcon(t, sz) {
  var iSc=sz/512;
  var fgC = {sentinels:'#C4A265',wolves:'#C0C0C0',stags:'#F28C28',serpents:'#39FF14'}[t.id];
  return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 512 512"><path d="'+t.path+'" fill="'+fgC+'" opacity="0.15"/></svg>';
}

function pips(filled, total, color, sz) {
  var s=''; for(var i=0;i<total;i++){
    var op = i<filled?1:0.2;
    s+='<svg width="'+sz+'" height="'+(sz*1.2)+'" viewBox="0 0 10 12" style="margin:0 0.5px;opacity:'+op+'"><path d="M5 0C3.5 2 0 4 0 7.5 0 10 2.2 12 5 12s5-2 5-4.5C10 4 6.5 2 5 0z" fill="'+color+'"/></svg>';
  } return s;
}

var grid=document.getElementById('grid');
TEAMS.forEach(function(t){
  var nameLen = t.name.length;
  var nameClass = nameLen > 9 ? 'long' : nameLen > 6 ? 'med' : '';
  var card = document.createElement('div');
  card.className = 'card';
  card.style.cssText = 'border:2px solid '+t.primary+'88;box-shadow:0 4px 16px rgba(0,0,0,0.5);';
  card.innerHTML =
    '<div class="card-bg" style="background:linear-gradient(0deg,'+t.primary+'bb 0%,'+t.primary+'44 50%,#0A0804 100%);"></div>'+
    '<div class="card-watermark">'+rawIcon(t,120)+'</div>'+
    '<div class="card-inner">'+
      '<div class="card-school">'+t.school.toUpperCase()+'</div>'+
      '<div class="card-name '+nameClass+'">'+t.name+'</div>'+
      '<div class="card-divider" style="background:'+t.accent+';"></div>'+
      '<div class="card-scheme" style="color:'+t.accent+';">'+t.scheme+'</div>'+
      '<div class="card-vibe">'+t.vibe+'</div>'+
      '<div class="card-ratings">'+
        '<span class="label">OFF</span>'+pips(t.offRating,5,'#00ff44',7)+
        '<span style="display:inline-block;width:1px;height:10px;background:rgba(255,255,255,0.15);margin:0 4px;"></span>'+
        '<span class="label">DEF</span>'+pips(t.defRating,5,'#4488ff',7)+
      '</div>'+
    '</div>';
  card.onclick = function(){
    grid.querySelectorAll('.card').forEach(function(c){ c.style.opacity=c===card?'1':'0.3'; c.style.transform=c===card?'scale(1.04)':'scale(0.96)'; });
  };
  grid.appendChild(card);
});
</script>

</html>
