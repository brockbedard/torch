<style>
:root {
  --bg: #050015; --f-purple: #bb00ff; --l-green: #00ff44; --a-gold: #ffcc00;
  --white: #ffffff; --glass: rgba(255, 255, 255, 0.1);
  --chrome: linear-gradient(to bottom, #fff 0%, #888 50%, #fff 100%);
  --p-red: #ff0040; --text: #fff; --muted: #888; --cyan: #00eaff; --orange: #ff4d00; --danger: #ff0040;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html,body { 
  background: var(--bg); width: 100%; height: 100%; overflow: hidden; 
  user-select: none; -webkit-user-select: none; touch-action: manipulation;
}
body { color: white; font-family: 'Barlow Condensed', sans-serif; display: flex; justify-content: center; font-size: 18px; }
#root { 
  width: 100%; max-width: 430px; height: 100vh; background: #080020; position: relative; 
  overflow-y: auto; overflow-x: hidden; box-shadow: 0 0 100px rgba(187, 0, 255, 0.2);
  padding-top: var(--safe-top); padding-bottom: var(--safe-bottom);
  user-select: none; -webkit-user-select: none; touch-action: manipulation;
}
#root::after {
  content: ""; position: fixed; inset: 0; width: 100%; max-width: 430px; left: 50%; transform: translateX(-50%);
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
  background-size: 100% 3px, 3px 100%; z-index: 9999; pointer-events: none; opacity: 0.6;
}
.px { font-family: 'Press Start 2P', monospace; }
.bn { font-family: 'Bebas Neue', sans-serif; }

@keyframes sup{from{transform:translateY(26px);opacity:0;}to{transform:none;opacity:1;}}
@keyframes pop{0%{transform:scale(.2);opacity:0;}65%{transform:scale(1.16);}100%{transform:scale(1);opacity:1;}}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
@keyframes flicker{from{opacity:0.8;transform:scale(1);}to{opacity:1;transform:scale(1.1);}}
@keyframes ballPass{
  0%{transform:translate(-250px, 120px) rotate(0deg);opacity:0;}
  15%{transform:translate(-180px, 80px) rotate(60deg);opacity:1;}
  50%{transform:translate(0px, 0px) rotate(360deg);opacity:1;}
  85%{transform:translate(180px, -80px) rotate(660deg);opacity:1;}
  100%{transform:translate(250px, -120px) rotate(720deg);opacity:0;}
}
@keyframes ignite{
  0%,48%{opacity:0;transform:scale(0.4) rotate(-20deg);filter:blur(5px);}
  50%{opacity:1;transform:scale(1.8) rotate(0deg);filter:blur(0px);}
  55%{transform:scale(1.4) rotate(10deg);}
  60%,100%{opacity:1;transform:scale(1.3) rotate(0deg);filter:drop-shadow(0 0 15px var(--orange));}
}

.sup{animation:sup .38s ease-out both;}
.pop{animation:pop .48s cubic-bezier(.34,1.56,.64,1) both;}
.fi{animation:fi .45s ease-out both;}
.flicker{animation:flicker 0.1s infinite alternate;}

.btn-blitz {
  background: #fff; border: 4px solid var(--f-purple); padding: 15px;
  font-family: 'Press Start 2P', monospace; font-size: 14px; color: var(--f-purple);
  box-shadow: 6px 6px 0 var(--f-purple), 10px 10px 0 #000; cursor: pointer;
  text-transform: uppercase; width: 100%; transition: all 0.1s; display: block; line-height: 1.2;
}
.btn-blitz:active:not(:disabled) { transform: translate(4px, 4px); box-shadow: 2px 2px 0 var(--f-purple), 4px 4px 0 #000; }
.btn-blitz:disabled { opacity: 0.4; cursor: not-allowed; }

.chrome-header {
  color: var(--a-gold); font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 2px; font-style: italic;
  transform: skewX(-10deg); display: inline-block; margin-bottom: 20px;
  text-shadow: 2px 2px 0 #000, 0 0 10px var(--a-gold);
}

.team-card {
  background: linear-gradient(135deg, #1a0033 0%, #05051a 100%);
  border: 4px solid var(--white); padding: 20px; margin-bottom: 10px;
  position: relative; box-shadow: 8px 8px 0 rgba(0,0,0,0.5); cursor: pointer; transition: all 0.1s;
  display: flex; align-items: center; justify-content: space-between;
}
.team-card.selected { border-color: var(--l-green); box-shadow: 0 0 20px var(--l-green); transform: scale(1.02); }
.team-name { font-family: 'Bebas Neue', sans-serif; font-size: 32px; font-style: italic; line-height: 1; margin-bottom: 5px; color: white; }
.team-icon { font-size: 50px; opacity: 1; margin-left: 15px; }
.play-card-blitz {
  background: var(--glass); border: 2px solid var(--white); padding: 10px;
  text-align: center; position: relative; overflow: hidden; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: space-between; min-height: 90px;
}
.play-card-blitz.selected { background: var(--f-purple); border-color: var(--a-gold); box-shadow: 0 0 15px var(--f-purple); transform: scale(1.05); }

.clash-card {
  width: 100px; height: 140px; border: 4px solid var(--white); background: #111;
  display: flex; flex-direction: column; align-items: center; justify-content: space-between;
  box-shadow: 0 0 20px rgba(255,255,255,0.2); padding: 6px; text-align: center;
}
.vs-circle {
  width: 50px; height: 50px; border-radius: 50%; background: var(--p-red);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif; font-size: 24px; font-style: italic;
  box-shadow: 0 0 30px var(--p-red); z-index: 2; color: white; margin: 0 -15px; flex-shrink: 0;
}
</style>

var SND=(function(){
  var ctx=null;var crowdNode=null;var crowdGain=null;
  function ac(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();return ctx;}
  function tone(f,dur,type,vol,t0){
    try{var c=ac(),now=c.currentTime,o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type=type||'square';o.frequency.value=f;
      g.gain.setValueAtTime(vol||.1,now+(t0||0));
      g.gain.exponentialRampToValueAtTime(0.001,now+(t0||0)+dur);
      o.start(now+(t0||0));o.stop(now+(t0||0)+dur+.02);}catch(e){}}
  function noise(dur,vol,t0){
    try{var c=ac(),sr=c.sampleRate,buf=c.createBuffer(1,Math.floor(sr*dur),sr),data=buf.getChannelData(0);
      for(var i=0;i<data.length;i++)data[i]=Math.random()*2-1;
      var s=c.createBufferSource(),g=c.createGain();s.buffer=buf;s.connect(g);g.connect(c.destination);
      g.gain.setValueAtTime(vol||.1,c.currentTime+(t0||0));
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+(t0||0)+dur);
      s.start(c.currentTime+(t0||0));}catch(e){}}
  function whistle(dur, vol, t0) {
    try {
      var c = ac(), now = c.currentTime + (t0 || 0), g = c.createGain();
      g.connect(c.destination); g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(vol || 0.2, now + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now + dur);
      [2500, 2515].forEach(function(f) {
        var o = c.createOscillator(); o.type = 'sine'; o.frequency.value = f;
        var mod = c.createOscillator(); mod.frequency.value = 30;
        var modG = c.createGain(); modG.gain.value = 15;
        mod.connect(modG); modG.connect(o.frequency);
        o.connect(g); mod.start(now); o.start(now); o.stop(now + dur); mod.stop(now + dur);
      });
    } catch(e) {}
  }
  function grunt(vol, t0) {
    try {
      var c = ac(), now = c.currentTime + (t0 || 0), o = c.createOscillator(), g = c.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(120, now);
      o.frequency.exponentialRampToValueAtTime(60, now + 0.15);
      g.gain.setValueAtTime(vol || 0.1, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      o.connect(g); g.connect(c.destination); o.start(now); o.stop(now + 0.15);
    } catch(e) {}
  }
  return{
    click:function(){tone(440,.06,'square',.08);tone(880,.04,'square',.05,.05);},
    select:function(){tone(523,.05,'triangle',.1);tone(659,.07,'triangle',.11,.06);},
    snap:function(){grunt(0.3); noise(0.1, 0.2, 0.05); tone(80, 0.2, 'sawtooth', 0.2);},
    menu:function(){[262,330,392,523].forEach(function(f,i){tone(f,.14,'square',.12,i*.1);});},
    td:function(){whistle(0.5, 0.25); whistle(0.5, 0.25, 0.6); [523,659,784,1047].forEach(function(f,i){tone(f,.2,'square',.15,i*.1 + 0.2);});},
    turnover:function(){whistle(0.8, 0.3); [330,247,196,147,110].forEach(function(f,i){tone(f,.2,'sawtooth',.18-i*.02,i*.13 + 0.1);});},
    clash:function(){grunt(0.4); noise(0.15, 0.4); tone(60, 0.2, 'sawtooth', 0.3);},
    draft:function(){tone(330,.04,'square',.1);tone(550,.05,'square',.12,.05);tone(880,.1,'square',.14,.1);},
    flip:function(){for(var i=0;i<4;i++)tone(1200+i*200,.02,'square',.04,i*.04);},
    crowdStart:function(){},
    crowdStop:function(){},
    };
    })();

// ===== YARD/TURNOVER RESOLUTION =====
function rollYards(tier){
  if(tier==='O+') return 8+Math.floor(Math.random()*13);
  if(tier==='N')  return 2+Math.floor(Math.random()*5);
  if(tier==='D+') return -2+Math.floor(Math.random()*5);
  if(tier==='TO') return -2+Math.floor(Math.random()*5);
  if(tier==='OT') return Math.random()<0.7?(8+Math.floor(Math.random()*13)):(-2+Math.floor(Math.random()*3));
  return 3;
}
function isTurnover(tier){
  if(tier==='TO') return Math.random()<0.2;
  if(tier==='OT') return Math.random()<0.2;
  return false;
}

// ===== AI PLAY-CALLING =====
function aiPickDefense(defTeamId,hand,lastPlayId){
  if(hand.length===0) return null;
  if(hand.length===1) return hand[0];
  var pool=hand.slice();
  // Iron Ridge (Saban): 60% zone, 25% adjustment, 15% aggressive
  if(defTeamId==='iron_ridge'){
    // Never call same play twice in a row
    if(lastPlayId) pool=pool.filter(function(c){return c.id!==lastPlayId;});
    if(pool.length===0) pool=hand.slice();
    var zone=['rip_liz','cov4_match','mod','cover_6'];
    var adjust=['skinny','bracket','meg'];
    var aggr=['fire_zone','robber','gap_int'];
    var r=Math.random();
    var bucket=r<0.6?zone:r<0.85?adjust:aggr;
    var avail=pool.filter(function(c){return bucket.indexOf(c.id)!==-1;});
    if(avail.length>0) return avail[Math.floor(Math.random()*avail.length)];
  }
  // Canyon Tech (Williams): 50% blitz, 30% coverage, 15% specialty, 5% random
  if(defTeamId==='canyon_tech'){
    var blitz=['overload','db_blitz','zero_cov','a_gap_mug','edge_crash'];
    var cov=['cov2_buc','man_press','zone_drop'];
    var spec=['spy','prevent'];
    var r2=Math.random();
    var bucket2=r2<0.5?blitz:r2<0.8?cov:r2<0.95?spec:null;
    if(bucket2){
      var avail2=pool.filter(function(c){return bucket2.indexOf(c.id)!==-1;});
      if(avail2.length>0) return avail2[Math.floor(Math.random()*avail2.length)];
    }
  }
  return pool[Math.floor(Math.random()*pool.length)];
}

function aiPickOffense(offTeamId,hand,lastPlayId){
  if(hand.length===0) return null;
  if(hand.length===1) return hand[0];
  var pool=hand.slice();
  // Canyon Tech AI (Air Raid): 70% short pass, 20% deep, 10% run
  if(offTeamId==='canyon_tech'){
    var short=['mesh','slant','shallow_cross','stick','bubble_screen'];
    var deep=['four_verts','go_route','y_corner'];
    var run=['draw','qb_sneak'];
    var r=Math.random();
    var bucket=r<0.7?short:r<0.9?deep:run;
    var avail=pool.filter(function(c){return bucket.indexOf(c.id)!==-1;});
    if(avail.length>0) return avail[Math.floor(Math.random()*avail.length)];
  }
  // Iron Ridge AI (Triple Option): 70% run, 20% option/misdirection, 10% play-action
  if(offTeamId==='iron_ridge'){
    var mainRun=['triple_option','zone_read','power'];
    var optMis=['midline','qb_keeper','trap','rocket_toss'];
    var pa=['pa_post','pa_flat'];
    var r2=Math.random();
    var bucket2=r2<0.7?mainRun:r2<0.9?optMis:pa;
    var avail2=pool.filter(function(c){return bucket2.indexOf(c.id)!==-1;});
    if(avail2.length>0) return avail2[Math.floor(Math.random()*avail2.length)];
  }
  return pool[Math.floor(Math.random()*pool.length)];
}

// ===== CARD INTEL OVERLAY =====
function showCardIntel(card, teamId, side){
  var overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fi .3s ease-out both;';
  
  var modal=document.createElement('div');
  modal.style.cssText='width:100%;max-width:340px;background:var(--bg2);border:2px solid var(--cyan);border-radius:12px;padding:24px;position:relative;box-shadow:0 0 40px rgba(0,212,255,.2);';
  
  var close=document.createElement('div');
  close.style.cssText='position:absolute;top:12px;right:12px;font-size:24px;color:var(--muted);cursor:pointer;line-height:1;';
  close.textContent='\u00D7';
  close.onclick=function(){overlay.remove();};
  
  var title=document.createElement('div');
  title.style.cssText="font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--cyan);letter-spacing:2px;margin-bottom:4px;";
  title.textContent=card.name;
  
  var type=document.createElement('div');
  type.className='px';
  type.style.cssText='font-size:6px;color:var(--muted);letter-spacing:1px;margin-bottom:16px;';
  type.textContent=card.cat.toUpperCase();
  
  var body=document.createElement('div');
  body.style.cssText='font-size:15px;color:var(--text);line-height:1.6;font-weight:600;';
  body.textContent=card.desc;
  
  var intel=document.createElement('div');
  intel.style.cssText='margin-top:20px;padding-top:16px;border-top:1px solid var(--bdr);';
  
  var intelH=document.createElement('div');
  intelH.className='px';
  intelH.style.cssText='font-size:6px;color:var(--gold);margin-bottom:10px;letter-spacing:1px;';
  intelH.textContent='STRATEGIC INTEL';
  
  var intelText=document.createElement('div');
  intelText.style.cssText='font-size:14px;color:var(--text);opacity:.8;font-style:italic;';
  
  // Logic-based intel
  var text = '';
  var isOffense = side==='offense';
  if(isOffense){
    if(card.type==='pass'){
      if(card.cat.includes('Quick') || card.cat.includes('Short')) text='Effective against heavy pressure and blitzes. Harder to pick off, but lower yardage ceiling.';
      else if(card.cat.includes('Deep') || card.cat.includes('Bomb')) text='High risk, high reward. Beats soft zone but very vulnerable to deep coverage and "Robber" looks.';
      else if(card.id.includes('pa_')) text='Play-action constraints. Punishes aggressive run-stuffing defenses by faking the dive.';
    } else {
      if(card.id==='triple_option') text='The core engine. QB reads the end. Devastates soft zones, but dies to "Spy" and "Gap Integrity".';
      else if(card.cat.includes('Inside')) text='Safe yards between the tackles. Beats speed-rushers, but struggles against "A-Gap Mug".';
      else if(card.cat.includes('Outside')) text='Attacks the perimeter. Beats slow interior defenses, but loses to "DB Blitz" and speed on the edge.';
    }
  } else {
    if(card.type==='agg'){
      if(card.cat.includes('Pressure')) text='High pressure. Creates sacks and turnovers, but leaves huge holes against quick-game passing.';
      else if(card.id==='robber' || card.id==='gap_int') text='Discipline over chaos. Counters specific concepts like deep shots or option runs.';
    } else {
      if(card.cat.includes('Zone')) text='Safe coverage. Keeps the play in front of you. Weak against "Mesh" and short, high-percentage throws.';
      else if(card.id==='spy') text='Hard counter to mobile QBs and Triple Option keepers. Sacrifice pressure for containment.';
    }
  }
  intelText.textContent=text || 'Versatile call. Use based on situational field position and down/distance.';
  
  intel.append(intelH,intelText);
  modal.append(close,title,type,body,intel);
  overlay.appendChild(modal);
  root.appendChild(overlay);
}

function playSvg(id,color){
  var d=PD[id];
  if(!d) return '<div style="width:60px;height:50px;"></div>';
  var dots=d[0],lines=d[1],dashes=d[2];
  var svg='<svg viewBox="0 0 60 50" width="60" height="50" xmlns="http://www.w3.org/2000/svg" style="display:block;">';
  // dashes
  for(var i=0;i<dashes.length;i++){
    var dl=dashes[i];
    if(dl.length===4) svg+='<line x1="'+dl[0]+'" y1="'+dl[1]+'" x2="'+dl[2]+'" y2="'+dl[3]+'" stroke="'+color+'" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>';
    else if(dl.length===6) svg+='<polyline points="'+dl[0]+','+dl[1]+' '+dl[2]+','+dl[3]+' '+dl[4]+','+dl[5]+'" fill="none" stroke="'+color+'" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>';
  }
  // lines
  for(var j=0;j<lines.length;j++){
    var ln=lines[j];
    if(ln.length===4) svg+='<line x1="'+ln[0]+'" y1="'+ln[1]+'" x2="'+ln[2]+'" y2="'+ln[3]+'" stroke="'+color+'" stroke-width="1.5" opacity="0.8"/>';
    else if(ln.length===6) svg+='<polyline points="'+ln[0]+','+ln[1]+' '+ln[2]+','+ln[3]+' '+ln[4]+','+ln[5]+'" fill="none" stroke="'+color+'" stroke-width="1.5" opacity="0.8"/>';
  }
  // dots
  for(var k=0;k<dots.length;k++){
    var r=k===0?3.5:2.5;
    svg+='<circle cx="'+dots[k][0]+'" cy="'+dots[k][1]+'" r="'+r+'" fill="'+color+'" opacity="'+(k===0?'1':'0.7')+'"/>';
  }
  svg+='</svg>';
  return svg;
}

function clockCost(cardId){
  var quick={slant:1,stick:1,shallow_cross:1,bubble_screen:1};
  var short={mesh:1,pa_flat:1};
  var deep={four_verts:1,y_corner:1,go_route:1,pa_post:1};
  if(quick[cardId]) return 8+Math.floor(Math.random()*5);
  if(short[cardId]) return 12+Math.floor(Math.random()*5);
  if(deep[cardId]) return 16+Math.floor(Math.random()*7);
  return 10+Math.floor(Math.random()*9);
}

  commBox.textContent='... BROADCAST BOOTH ...';

  var nextBtn=document.createElement('button');
  nextBtn.className='btn-blitz';
  nextBtn.style.cssText='padding:10px 24px;font-size:10px;opacity:0;pointer-events:none;width:auto;margin-top:10px;';
  nextBtn.textContent='NEXT PLAY \u25B6';

  clash.append(pickPrompt,cardRow,resultArea,nextBtn);

  var snapWrap=document.createElement('div');
  snapWrap.style.cssText='padding:10px;background:#000;flex-shrink:0;';
  var snapBtn=document.createElement('button');
  snapBtn.className='btn-blitz';

  snapBtn.disabled=true;
  snapWrap.appendChild(snapBtn);
  el.appendChild(snapWrap);

  handArea.style.cssText='padding:10px;background:#000;border-top:4px solid #333;display:flex;gap:5px;overflow-x:auto;flex-shrink:0;';

  function typeColor(card){
    if(card.type==='run') return {border:'var(--orange)'};
    if(card.type==='pass') return {border:'var(--cyan)'};
    if(card.type==='agg') return {border:'var(--p-red)'};
    return {border:'var(--l-green)'};
  }
  function renderHand(){
    handArea.innerHTML='';
    myHand.forEach(function(card,i){
      var tc=typeColor(card);
      var isSel=selIdx===i;
      var cel=document.createElement('div');
      cel.className='play-card-blitz'+(isSel?' selected':'');
      cel.style.cssText+='width:80px;flex-shrink:0;transform:scale('+(isSel?0.9:0.8)+');border-color:'+tc.border+';';

        tpBtn.style.padding='10px';
        tpBtn.style.borderColor='var(--a-gold)';
        tpBtn.style.color='var(--a-gold)';
        tpBtn.innerHTML='2-POINT TRY (WIN)<br><span style="font-size:6px;opacity:.7;">45% CHANCE</span>';
        function resolve(two){
          SND.snap();
          convArea.innerHTML='';
          var win=Math.random()<(two?0.45:0.95);
          if(win) offScore+=(two?2:1);
          updateScoreBug();
          var r=document.createElement('div');
          r.style.cssText="font-family:'Bebas Neue',sans-serif;font-size:28px;color:"+(win?'var(--l-green)':'var(--p-red)')+";animation:pop .4s both;";
          r.textContent=win?(two?'2-PT GOOD!':'XP GOOD!'):(two?'2-PT FAILED!':'XP MISSED!');
          convArea.appendChild(r);
          setTimeout(function(){
            var fin;
            if(isOff) fin=offScore>defScore?'win':'loss';
            else fin=offScore<defScore?'win':'loss';
            setGs({screen:'result',team:GS.team,side:GS.side,roster:GS.roster,hand:GS.hand,result:fin,finalScore:{off:offScore,def:defScore},driveStats:stats});
          },1500);
        }
        xpBtn.onclick=function(){resolve(false);};
        tpBtn.onclick=function(){resolve(true);};
        convArea.append(xpBtn,tpBtn);
        resultArea.appendChild(convArea);
      },1000);
      return;
    }
    var finalResult;
    if(isOff) finalResult=result==='td'?'win':'loss';
    else finalResult=result==='td'?'loss':'win';
    setTimeout(function(){setGs({screen:'result',team:GS.team,side:GS.side,roster:GS.roster,hand:GS.hand,result:finalResult,finalScore:{off:offScore,def:defScore},driveStats:stats});},1200);
  }
  snapBtn.onclick=function(){
    if(selIdx<0||animating) return;
    animating=true;
    playNum++;
    SND.snap();
    var myCard=myHand[selIdx];
    var playedIdx=selIdx;
    selIdx=-1;
    var aiCard;
    if(isOff) aiCard=aiPickDefense(opp.id,aiHand,lastAiPlay);
    else aiCard=aiPickOffense(opp.id,aiHand,lastAiPlay);
    lastAiPlay=aiCard?aiCard.id:null;
    var mt,tier,offCard,defCard;
    if(isOff){offCard=myCard;defCard=aiCard;mt=getMatchupTable(team.id,opp.id);}
    else {offCard=aiCard;defCard=myCard;mt=getMatchupTable(opp.id,team.id);}
    tier=mt[offCard.id][defCard.id];
    var yards=rollYards(tier);
    var turnover=isTurnover(tier);
    snapBtn.style.display='none';
    pickPrompt.style.display='none';
    resultArea.innerHTML='';
    mySlot.innerHTML='';
    var myClash=renderClashCard(myCard,true,team.accent);
    myClash.style.cssText+=';animation:sup .3s ease-out both;';
    mySlot.appendChild(myClash);
    setTimeout(function(){aiSlot.innerHTML='';var aiDown=renderClashCard(aiCard,false);aiDown.style.cssText+=';animation:sup .3s ease-out both;';aiSlot.appendChild(aiDown);},300);
    setTimeout(function(){SND.clash();aiSlot.innerHTML='';var aiUp=renderClashCard(aiCard,true,opp.accent);aiUp.style.cssText+=';animation:pop .35s ease-out both;';aiSlot.appendChild(aiUp);},800);
    setTimeout(function(){var yardEl=document.createElement('div');yardEl.style.cssText="font-family:'Bebas Neue',sans-serif;font-size:36px;color:"+(turnover?'var(--p-red)':yards>0?'var(--l-green)':'var(--white)')+';letter-spacing:3px;text-shadow:0 0 16px '+(turnover?'var(--p-red)':'var(--l-green)')+';animation:pop .35s ease-out both;';yardEl.textContent=turnover?'TURNOVER!':(yards>0?'+':'')+yards+' YDS';resultArea.prepend(yardEl);},1100);
    setTimeout(function(){
      var narrText=genNarrative(tier,yards,myCard,aiCard,turnover);
      var narrEl=document.createElement('div');
      narrEl.style.cssText='font-size:13px;color:white;opacity:0;animation:fi .4s ease-out both;max-width:280px;text-align:center;margin-bottom:10px;';
      narrEl.textContent=narrText;
      resultArea.insertBefore(narrEl, commBox);
      
      // Call AI Commentary
      const oId = isOff ? team.id : opp.id;
      const dId = isOff ? opp.id : team.id;
      getAiCommentary(oId, dId, offCard, defCard, yards, turnover).then(commentary => {
        if(commentary) {
          commBox.style.opacity = '1';
          commBox.textContent = '\u201C' + commentary + '\u201D';
        }
      });
    },1400);
    setTimeout(function(){
      if(!turnover){totalYards+=yards;ballOn=Math.max(0,ballOn-yards);}else turnovers++;
      var cost=clockCost(offCard.id);
      clock=Math.max(0,clock-cost);
      var driveOver=false;
      if(ballOn<=0){SND.td();endDrive('td');driveOver=true;}
      else if(turnover){endDrive('turnover');driveOver=true;}
      else if(clock<=0){endDrive('clock');driveOver=true;}
      else {if(yards>=dist){down=1;dist=Math.min(10,ballOn);}else {dist=Math.max(1,dist-Math.max(0,yards));down++;if(down>4){endDrive('downs');driveOver=true;}}}
      if(!driveOver){
        nextBtn.style.opacity='1';nextBtn.style.pointerEvents='auto';
        nextBtn.onclick=function(){
          SND.click();animating=false;
          if(newCardIndices[playedIdx]) delete newCardIndices[playedIdx];
          if(myDeck.length>0){myHand[playedIdx]=myDeck.shift();newCardIndices[playedIdx]=true;}
          else myHand.splice(playedIdx,1);
          var aiIdx=aiHand.indexOf(aiCard);
          if(aiIdx>=0){if(aiDeck.length>0) aiHand[aiIdx]=aiDeck.shift();else aiHand.splice(aiIdx,1);}
          updateScoreBug();updateField();resetClash();renderHand();updateSnapBtn();snapBtn.style.display='block';
        };
      }
    },1700);
  };
  function resetClash(){
    pickPrompt.style.display='block';resultArea.innerHTML='';nextBtn.style.opacity='0';nextBtn.style.pointerEvents='none';
    mySlot.innerHTML='<div style="font-family:\'Press Start 2P\',monospace;font-size:6px;color:var(--muted);">YOU</div>';
    aiSlot.innerHTML='<div style="font-family:\'Press Start 2P\',monospace;font-size:6px;color:var(--muted);">AI</div>';
  }
  renderHand();updateSnapBtn();
  return el;
}

// ===== SCREEN 5: RESULT =====
function buildResult(){
  var el=document.createElement('div');
  el.style.cssText='min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center;background:radial-gradient(circle at 50% 50%,#440088 0%,#050015 100%);position:relative;overflow:hidden;';
  var isWin=GS.result==='win';
  var stats=GS.driveStats||{plays:0,yards:0,turnovers:0};
  var score=GS.finalScore||{off:GS.scenario.offScore,def:GS.scenario.defScore};
  var team=getTeam(GS.team);
  var opp=getOtherTeam(GS.team);
  var streakKey='torch_streak';
  var lastPlayKey='torch_last_play';
  var lastResultKey='torch_last_result';
  var today=new Date().toDateString();
  var lastPlay=localStorage.getItem(lastPlayKey);
  var streak=parseInt(localStorage.getItem(streakKey)||'0',10);
  if(lastPlay!==today){
    if(isWin){streak++;localStorage.setItem(lastResultKey,'win');}
    else{streak=0;localStorage.setItem(lastResultKey,'loss');}
    localStorage.setItem(streakKey,String(streak));localStorage.setItem(lastPlayKey,today);
  }
  var bonusKey='torch_bonus_'+today;
  var bonusSide=GS.side==='offense'?'defense':'offense';
  var alreadyPlayedBonus=localStorage.getItem(bonusKey)==='played';
  var status=document.createElement('div');
  status.style.cssText="font-family:'Press Start 2P',monospace;font-size:10px;color:var(--a-gold);margin-bottom:10px;";
  status.textContent='DRIVE COMPLETE';
  el.appendChild(status);
  var title=document.createElement('div');
  if(isWin){
    SND.td();title.style.cssText="font-family:'Bebas Neue',sans-serif;font-size:80px;font-style:italic;color:var(--l-green);text-shadow:0 0 30px var(--l-green), 4px 4px 0 #000;margin-bottom:20px;animation:pop .5s ease-out both;";
    title.textContent='TORCH LIT';
  } else {
    SND.turnover();title.style.cssText="font-family:'Bebas Neue',sans-serif;font-size:80px;font-style:italic;color:var(--p-red);text-shadow:0 0 30px var(--p-red), 4px 4px 0 #000;margin-bottom:20px;animation:pop .5s ease-out both;";
    title.textContent='TORCH OUT';
  }
  el.appendChild(title);
  var sub=document.createElement('div');
  sub.style.cssText="font-family:'Press Start 2P',monospace;font-size:8px;color:var(--white);opacity:0.8;margin-bottom:30px;";
  sub.textContent=GS.side==='offense'?(isWin?'TOUCHDOWN SCORED':'DEFENSE HELD'):(isWin?'DEFENSE HELD':'TOUCHDOWN ALLOWED');
  el.appendChild(sub);
  function getScoreName(id){
    if(id==='iron_ridge') return 'IRON';
    if(id==='canyon_tech') return 'CANYON';
    return '---';
  }
  var homeTeamName=GS.side==='offense'?getScoreName(team.id):getScoreName(opp.id);
  var awayTeamName=GS.side==='offense'?getScoreName(opp.id):getScoreName(team.id);
  var statsBox=document.createElement('div');
  statsBox.style.cssText='width:100%;max-width:300px;margin-bottom:30px;';
  function makeRow(lbl,val,color){
    var r=document.createElement('div');
    r.style.cssText='display:flex;justify-content:space-between;padding:15px;border-bottom:1px solid var(--glass);font-family:\'Press Start 2P\',monospace;font-size:10px;';
    r.innerHTML='<span>'+lbl+'</span><span style="color:'+(color||'white')+';">'+val+'</span>';
    return r;
  }
  statsBox.appendChild(makeRow('FINAL SCORE',homeTeamName+' '+score.off+' - '+score.def+' '+awayTeamName,'var(--a-gold)'));
  statsBox.appendChild(makeRow('TOTAL YARDS',((stats.yards>0?'+':'')+stats.yards+' YDS')));
  statsBox.appendChild(makeRow('PLAYS',String(stats.plays)));
  if(streak>0) statsBox.appendChild(makeRow('STREAK','+1 ('+streak+')','var(--l-green)'));
  else statsBox.appendChild(makeRow('STREAK','RESET','var(--p-red)'));
  el.appendChild(statsBox);
  var btnWrap=document.createElement('div');
  btnWrap.style.cssText='width:100%;max-width:300px;display:flex;flex-direction:column;gap:15px;';
  var shareBtn=document.createElement('button');
  shareBtn.className='btn-blitz';
  shareBtn.textContent='SHARE RESULT';
  shareBtn.onclick=function(){
    SND.click();
    var emoji=isWin?'\uD83D\uDD25':'\uD83D\uDCA8';
    var shareText='TORCH '+emoji+' '+(isWin?'LIT':'OUT')+'\n'+homeTeamName+' '+score.off+' - '+score.def+' '+awayTeamName+'\n'+stats.plays+' plays | '+stats.yards+' yds | '+stats.turnovers+' TO\n'+(streak>0?'\uD83D\uDD25 Streak: '+streak+'\n':'')+'torch-two.vercel.app';
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(shareText).then(function(){shareBtn.textContent='COPIED!';setTimeout(function(){shareBtn.textContent='SHARE RESULT';},2000);});}
    else{var ta=document.createElement('textarea');ta.value=shareText;ta.style.cssText='position:fixed;left:-9999px;';document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();shareBtn.textContent='COPIED!';setTimeout(function(){shareBtn.textContent='SHARE RESULT';},2000);}
  };
  btnWrap.appendChild(shareBtn);
  if(isWin&&!alreadyPlayedBonus){
    var bonusBtn=document.createElement('button');
    bonusBtn.className='btn-blitz';
    bonusBtn.style.cssText='border-color:var(--a-gold);color:var(--a-gold);box-shadow:4px 4px 0 var(--a-gold);';
    bonusBtn.textContent='BONUS: PLAY '+bonusSide.toUpperCase();
    bonusBtn.onclick=function(){SND.snap();localStorage.setItem(bonusKey,'played');setGs({screen:'setup',team:null,side:null,bonusSide:bonusSide});};
    btnWrap.appendChild(bonusBtn);
  }
  var homeBtn=document.createElement('button');
  homeBtn.className='btn-blitz';
  homeBtn.style.cssText='background:transparent;color:#fff;border-color:#444;box-shadow:none;';
  homeBtn.textContent='HOME';
  homeBtn.onclick=function(){SND.click();GS=null;render();};
  btnWrap.appendChild(homeBtn);
  el.appendChild(btnWrap);
  return el;
}

// ===== AI COMMENTARY SYSTEM =====
async function getAiCommentary(offTeamId, defTeamId, offCard, defCard, yards, isTurnover) {
  try {
    const offTeam = getTeam(offTeamId);
    const defTeam = getTeam(defTeamId);
    
    const systemPrompt = `You are a legendary 90s arcade football announcer. 
    Exciting, punchy, high energy. One short sentence of play-by-play and one short sentence of expert analysis. 
    Reference the specific play cards used: ${offCard.name} and ${defCard.name}. 
    Result was ${yards} yards ${isTurnover ? 'and a TURNOVER!' : ''}.`;

    const response = await fetch('/api/commentary', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: systemPrompt,
        messages: [{ role: 'user', content: 'Call the play.' }]
      })
    });

    if (!response.ok) throw new Error('API failed');
    const data = await response.json();
    return data.content[0].text;
  } catch (err) {
    console.error('Commentary error:', err);
    return null;
  }
}

// ===== INIT =====
render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js');}
