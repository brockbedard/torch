<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TORCH — Real Component Comparison</title>
<link rel="stylesheet" href="/src/style.css">
<style>
  body {
    background: #050402;
    padding: 40px;
    display: flex; flex-direction: column; align-items: center;
    font-family: 'Barlow Condensed', sans-serif;
  }
  .comp-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 80px; width: 100%; max-width: 1000px;
    margin-bottom: 80px;
  }
  .header-label {
    font-family: 'Oswald'; font-size: 14px; letter-spacing: 4px;
    color: #888; text-align: center; margin-bottom: 30px;
    border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;
  }
  .example-wrap {
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }
  .section-tag {
    font-family: 'Rajdhani'; font-size: 12px; font-weight: 700; color: #EBB010;
    letter-spacing: 2px; text-transform: uppercase;
  }
  
  /* Research Overrides (Applied to the RIGHT column) */
  .research-enhance .madden-player-card {
     /* We will inject these via JS to override the inline styles */
  }

  /* Glass Scorebug Simulation (using game fonts/sizes) */
  .glass-bug {
    width: 340px;
    background: rgba(10, 8, 4, 0.7);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 12px;
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>

  <h1 style="font-family:'Teko'; font-size:42px; color:#EBB010; letter-spacing:5px;">REAL COMPONENT AUDIT</h1>
  <p style="color:#666; font-family:'Rajdhani'; letter-spacing:1px; margin-bottom:50px;">Using actual /src/ui/components/cards.js logic</p>

  <div class="comp-row">
    <div class="header-label">CLASSIC (v0.33)</div>
    <div class="header-label">RESEARCH-ENHANCED</div>

    <!-- 1. PLAYER CARD -->
    <div class="example-wrap">
      <div class="section-tag">MADDEN PLAYER CARD</div>
      <div id="classic-player"></div>
    </div>
    <div class="example-wrap research-enhance">
      <div class="section-tag">PRECISION LUMINANCE</div>
      <div id="res-player"></div>
    </div>

    <!-- 2. PLAY CARD -->
    <div class="example-wrap">
      <div class="section-tag">PLAY CARD</div>
      <div id="classic-play"></div>
    </div>
    <div class="example-wrap research-enhance">
      <div class="section-tag">PRECISION LUMINANCE</div>
      <div id="res-play"></div>
    </div>

    <!-- 3. TORCH CARD -->
    <div class="example-wrap">
      <div class="section-tag">GOLD TORCH CARD</div>
      <div id="classic-torch"></div>
    </div>
    <div class="example-wrap research-enhance">
      <div class="section-tag">PRECISION LUMINANCE</div>
      <div id="res-torch"></div>
    </div>

  </div>

  <script type="module">
    import { buildMaddenPlayer, buildPlayV1, buildTorchCard } from '/src/ui/components/cards.js';
    import { TEAMS } from '/src/data/teams.js';

    const samplePlayer = {
      name: 'MARCUS HENDERSON',
      pos: 'QB',
      num: 12,
      stars: 5,
      isStar: true,
      trait: 'DEEP BALL',
      teamColor: '#8B0000'
    };

    const samplePlay = {
      name: 'VERTICALS',
      playType: 'DEEP',
      isRun: false,
      risk: 'high',
      strength: '+15 PASS YDS'
    };

    const sampleTorch = {
      name: 'HOT READ',
      tier: 'GOLD',
      category: 'information',
      iconKey: 'eye',
      effect: 'Reveals the opponent\'s play and adds +2 to all outcome rolls.'
    };

    // Render Classic
    document.getElementById('classic-player').appendChild(buildMaddenPlayer(samplePlayer, 120, 168));
    document.getElementById('classic-play').appendChild(buildPlayV1(samplePlay, 110, 150));
    document.getElementById('classic-torch').appendChild(buildTorchCard(sampleTorch, 110, 154));

    // Render Research-Enhanced (Copies of components with style overrides)
    const resPlayer = buildMaddenPlayer(samplePlayer, 120, 168);
    const resPlay = buildPlayV1(samplePlay, 110, 150);
    const resTorch = buildTorchCard(sampleTorch, 110, 154);

    // Apply "Luminance Stacking" Research overrides
    // 1. Remove heavy team-color gradients
    // 2. Add precision borders (0.08)
    // 3. Set background to 0.08 - 0.12 luminance
    
    function enhance(el, tier = 'standard') {
      const isGold = tier === 'gold';
      el.style.background = isGold ? 'rgba(235, 176, 16, 0.12)' : 'rgba(255, 255, 255, 0.08)';
      el.style.border = '1px solid rgba(255, 255, 255, 0.08)';
      el.style.boxShadow = isGold ? '0 8px 32px rgba(235, 176, 16, 0.2)' : '0 4px 16px rgba(0,0,0,0.4)';
      
      // Target inner elements (shimmers, headers)
      const shimmer = el.querySelector('div[style*="animation:cardShimmer"]');
      if (shimmer) shimmer.style.opacity = '0.3';
    }

    enhance(resPlayer, 'gold');
    enhance(resPlay);
    enhance(resTorch, 'gold');

    document.getElementById('res-player').appendChild(resPlayer);
    document.getElementById('res-play').appendChild(resPlay);
    document.getElementById('res-torch').appendChild(resTorch);

  </script>
</body>
</html>
