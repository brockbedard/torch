<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TORCH — Season 2 Identity Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;500;700;900&family=Rajdhani:wght@500;600;700&family=Barlow+Condensed:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0A0804;
    --torch: #FF4511;
    --gold: #EBB010;
    --glass: rgba(255, 255, 255, 0.05);
    --border: rgba(255, 255, 255, 0.1);
    
    /* Team Colors (Premium Palettes) */
    --pronghorn-1: #166534; --pronghorn-2: #F59E0B; --pronghorn-bg: #062014;
    --salamander-1: #2ECC71; --salamander-2: #E84393; --salamander-bg: #186A3B;
    --maple-1: #7A1E2E; --maple-2: #D97706; --maple-bg: #2E0A14;
    --raccoon-1: #D4D4D8; --raccoon-2: #FF8C00; --raccoon-bg: #27272A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    padding: 0;
    overflow-x: hidden;
  }

  .reveal-container {
    max-width: 430px;
    margin: 0 auto;
    background: #000;
    min-height: 100vh;
    position: relative;
    border-left: 1px solid #222;
    border-right: 1px solid #222;
    overflow: hidden;
  }

  header {
    padding: 40px 20px 20px;
    text-align: center;
    background: linear-gradient(to bottom, #111, transparent);
  }

  .torch-logo {
    font-family: 'Teko', sans-serif;
    font-size: 64px;
    font-weight: 900;
    letter-spacing: 8px;
    color: var(--torch);
    text-transform: uppercase;
    line-height: 0.8;
    margin-bottom: 5px;
    text-shadow: 0 0 20px rgba(255, 69, 17, 0.4);
  }

  .season-tag {
    font-family: 'Teko', sans-serif;
    font-size: 24px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
  }

  .matchup-card {
    margin: 40px 15px;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    position: relative;
  }

  .matchup-header {
    background: rgba(255,255,255,0.05);
    padding: 10px;
    text-align: center;
    font-family: 'Teko', sans-serif;
    letter-spacing: 2px;
    color: #888;
    border-bottom: 1px solid var(--border);
  }

  .matchup-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 30px 15px;
    position: relative;
  }

  .team-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    z-index: 2;
  }

  .vs-badge {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 50px;
    height: 50px;
    background: #fff;
    color: #000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Teko', sans-serif;
    font-weight: 900;
    font-size: 24px;
    box-shadow: 0 0 30px rgba(255,255,255,0.3);
    z-index: 3;
    font-style: italic;
  }

  .logo-shield {
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
  }

  .logo-shield svg {
    width: 100%;
    height: 100%;
  }

  .team-info {
    text-align: center;
  }

  .school-name {
    font-size: 10px;
    letter-spacing: 1px;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .mascot-name {
    font-family: 'Teko', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    line-height: 1;
    text-transform: uppercase;
  }

  .ovr-box {
    margin-top: 8px;
    background: rgba(255,255,255,0.1);
    padding: 4px 10px;
    border-radius: 4px;
    font-family: 'Teko', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
  }

  .section-title {
    font-family: 'Teko', sans-serif;
    font-size: 22px;
    padding: 0 20px;
    margin-bottom: 15px;
    color: var(--gold);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(235, 176, 16, 0.3), transparent);
  }

  .identity-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    padding: 0 15px 40px;
  }

  .identity-card {
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .card-logo {
    width: 80px;
    height: 80px;
  }

  .card-logo svg {
    width: 100%;
    height: 100%;
  }

  .card-name {
    font-family: 'Teko', sans-serif;
    font-size: 20px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .card-swatches {
    display: flex;
    gap: 4px;
  }

  .swatch {
    width: 20px;
    height: 20px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.1);
  }

  /* Helmet Concepts */
  .helmet-concept {
    width: 100%;
    height: 200px;
    position: relative;
    background-size: cover;
    background-position: center;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .helmet-shell {
    width: 140px;
    height: 120px;
    border-radius: 60px 60px 20px 20px;
    position: relative;
    box-shadow: inset -10px -10px 30px rgba(0,0,0,0.5), 0 20px 40px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .helmet-stripe {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 100%;
    background: rgba(255,255,255,0.2);
  }

  .helmet-logo {
    width: 60px;
    height: 60px;
    z-index: 2;
    transform: rotate(5deg);
  }

  .facemask {
    position: absolute;
    bottom: -10px;
    right: -20px;
    width: 80px;
    height: 60px;
    border: 6px solid #ccc;
    border-radius: 0 0 30px 10px;
    z-index: 3;
    border-top: none;
    border-left: none;
  }

  /* Specific Team Styling Overrides */
  .t-pronghorn .helmet-shell { background: var(--pronghorn-bg); }
  .t-pronghorn .helmet-stripe { background: var(--pronghorn-2); }
  .t-pronghorn .facemask { border-color: #757677; }
  
  .t-salamander .helmet-shell { background: var(--salamander-bg); }
  .t-salamander .helmet-stripe { background: var(--salamander-2); }
  .t-salamander .facemask { border-color: #524956; }

  .t-maple .helmet-shell { background: var(--maple-bg); }
  .t-maple .helmet-stripe { background: var(--maple-2); }
  .t-maple .facemask { border-color: #872a00; }

  .t-raccoon .helmet-shell { background: var(--raccoon-bg); }
  .t-raccoon .helmet-stripe { background: var(--raccoon-2); }
  .t-raccoon .facemask { border-color: #333; }

</style>
</head>
