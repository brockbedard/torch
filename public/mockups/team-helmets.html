<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>TORCH — Official Team Helmets</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet" />
<style>
  body { background: #050403; color: #fff; font-family: 'Rajdhani'; padding: 40px; display: flex; flex-direction: column; align-items: center; }
  h1 { font-family: 'Teko'; font-size: 48px; color: #EBB010; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 4px; }
  
  .helmet-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; max-width: 900px; }
  .helmet-card { background: #0A0804; border: 1px solid #1a1a1a; padding: 30px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; transition: transform 0.3s; }
  .helmet-card:hover { transform: scale(1.05); border-color: #EBB010; }
  
  .helmet-svg { width: 320px; height: 320px; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.9)); }
  
  .team-info { margin-top: 20px; text-align: center; }
  .team-name { font-family: 'Teko'; font-size: 32px; color: #fff; line-height: 1; letter-spacing: 2px; }
  .team-school { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }
</style>
</head>

        id: 'sentinels',
        name: 'BOARS',
        school: 'Ridgemont',
        primary: '#8B0000',

        name: 'DOLPHINS',
        school: 'Coral Bay',
        primary: '#E8548F',
        secondary: '#FF7EB3'
      },
      {
        id: 'stags',
        name: 'SPECTRES',
        school: 'Hollowridge',
        primary: '#5DADE2',
        secondary: '#1B4F72'
      },
      {
        id: 'serpents',
        name: 'SERPENTS',
        school: 'Blackwater State',
        primary: '#2E0854',
        secondary: '#39FF14'
      }
    ];

    function createHelmet(team) {
      const container = document.createElement('div');
      container.className = 'helmet-card';
      
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" class="helmet-svg">
          <g fill="none" stroke-linejoin="round" stroke-width="1.5">
            <!-- Main Shell - FLAT COLOR -->
            <path d="M22.662 9A26.374 26.374 0 0 1 35 6c15.477 0 28 11.182 28 25v.639a24.02 24.02 0 0 1-.923 6.593l-.22.768" 
                  fill="${team.primary}" stroke="${team.secondary}" stroke-width="1" />
            
            <!-- Ear Hole Area -->
            <path d="M50 52c-4.161 0-8.322 2.886-10.482 4.655A5.961 5.961 0 0 1 35.734 58H34c-8.291 0-14-5.578-14-10v-3.81a4 4 0 0 1 1.845-3.37l.929-.594A4.184 4.184 0 0 0 24 37.267a4.186 4.186 0 0 0-.7-2.321 6.567 6.567 0 0 0-3.532-2.634L9 29v-6a34.385 34.385 0 0 1 8-10.129"
                  fill="${team.primary}" stroke="${team.secondary}" stroke-width="0.5" />

            <!-- Team Logo Inserted as SVG paths -->
            <g transform="translate(32, 12)">
              ${LOGOS[team.id]}
            </g>

            <!-- Facemask Details -->
            <g stroke="${team.secondary}" stroke-width="2">
              <path d="M18.077 34 15 54l-9.195 1.672a2 2 0 0 1-2.288-1.442L1 45v-2.34a2 2 0 0 1 1.631-1.966L17 38M19 28l-.923 6.001" />
              <path d="M1 45c0 1.1 8.709 1 17 1l11-2 3-2-7-12-18.158-4.778A1.131 1.131 0 0 1 6 24.129 1.13 1.13 0 0 1 7.129 23H9" />
              <path d="m19.535 39.544 2-3.194A5 5 0 0 1 25.771 34H27M1 42h13M4 55l8-4c1.789-.894 4-5 4-5m47-13s-1.015 3-6 3H42l-13 8c-1.279 1.256-1.3 3.2 0 3.965l4.519 2.535a3.9 3.9 0 0 0 3.244.269L52 45" />
              <path d="M12 30v-4.518a3.883 3.883 0 0 1 1.212-2.715 2.375 2.375 0 0 0 0-3.534L12 18" />
            </g>
            
            <circle cx="32" cy="29" r="2" fill="${team.secondary}" />
          </g>
        </svg>
      `;
      
      container.innerHTML = `
        ${svg}
        <div class="team-info">
          <div class="team-name">${team.name}</div>
          <div class="team-school">${team.school}</div>
        </div>
      `;
      return container;
    }

    const grid = document.getElementById('grid');
    TEAMS.forEach(t => grid.appendChild(createHelmet(t)));
  </script>
</body>
</html>
