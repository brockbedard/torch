<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORCH — Field Arrows Mockup</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #050a08;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #EBB010;
            font-family: 'Teko', sans-serif;
        }
        canvas {
            background: #050a08;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }
        .controls {
            margin-top: 20px;
            text-align: center;
            max-width: 400px;
        }
        h1 { margin: 0 0 10px; letter-spacing: 2px; }
        p { color: #888; font-size: 18px; margin: 0; }
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 14px;
            color: #555;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>FIELD ARROW FIX</h1>
    <p>Standard Football: Arrows point to nearest goal</p>
    
    <div class="legend">
        <span>Yard 10: Top Goal</span>
        <span>Yard 60: 50 Yard Line</span>
        <span>Yard 110: Bottom Goal</span>
    </div>

    <canvas id="fieldCanvas" width="360" height="640"></canvas>

    <div class="controls">
        <p>Arrows for yards &lt; 60 now point <b>UP</b></p>
        <p>Arrows for yards &gt; 60 now point <b>DOWN</b></p>
    </div>

    <script>
        const canvas = document.getElementById('fieldCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;

        const CFG = {
            bg: '#050a08',
            yard: { color: 'rgba(255,255,255,0.15)', w: 1 },
            num: { color: 'rgba(255,245,220,0.30)', font: "700 48px 'Teko'", gap: 4, arrowOff: 30, arrowSz: 8, arrowColor: 'rgba(255,120,20,0.4)' }
        };

        function drawNumPortrait(c, num, cx, cy, absYard, mirrored) {
            c.save();
            c.translate(cx, cy);
            c.rotate(mirrored ? Math.PI / 2 : -Math.PI / 2);

            c.font = CFG.num.font;
            c.textBaseline = 'middle';
            var s = num.toString();
            var d0 = s[0], d1 = s[1] || '0';

            // Numbers
            c.fillStyle = CFG.num.color;
            c.textAlign = 'right'; c.fillText(d0, -CFG.num.gap, 0);
            c.textAlign = 'left'; c.fillText(d1, CFG.num.gap, 0);

            // Directional arrows
            if (num !== 50) {
                // FIXED LOGIC
                var pointsTop = absYard < 60;
                var adir = (!mirrored) ? (pointsTop ? 1 : -1) : (pointsTop ? -1 : 1);
                var ax = adir * CFG.num.arrowOff;

                c.fillStyle = CFG.num.arrowColor;
                c.beginPath();
                c.moveTo(ax, -CFG.num.arrowSz);
                c.lineTo(ax + adir * CFG.num.arrowSz * 1.2, 0);
                c.lineTo(ax, CFG.num.arrowSz);
                c.fill();
            }
            c.restore();
        }

        function render() {
            ctx.fillStyle = CFG.bg;
            ctx.fillRect(0, 0, width, height);

            // Draw yard lines and numbers
            // 40 line (abs 50), 50 line (abs 60), 40 line (abs 70)
            const yards = [
                { abs: 40, label: 30, y: 100 },
                { abs: 50, label: 40, y: 250 },
                { abs: 60, label: 50, y: 400 },
                { abs: 70, label: 40, y: 550 }
            ];

            yards.forEach(y => {
                // Yard line
                ctx.strokeStyle = CFG.yard.color;
                ctx.lineWidth = CFG.yard.w;
                ctx.beginPath();
                ctx.moveTo(0, y.y);
                ctx.lineTo(width, y.y);
                ctx.stroke();

                // Numbers
                drawNumPortrait(ctx, y.label, width * 0.2, y.y, y.abs, false);
                drawNumPortrait(ctx, y.label, width * 0.8, y.y, y.abs, true);
            });

            // Decorative labels
            ctx.fillStyle = 'rgba(255,255,255,0.05)';
            ctx.font = '20px Teko';
            ctx.textAlign = 'center';
            ctx.fillText('NEAR TOP GOAL (YARD 10)', width/2, 40);
            ctx.fillText('NEAR BOTTOM GOAL (YARD 110)', width/2, height - 20);
        }

        // Wait for font
        document.fonts.ready.then(render);
    </script>
</body>
</html>
