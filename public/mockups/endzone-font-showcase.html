<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORCH — Endzone Font & Field Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@700;900&family=Rajdhani:wght@600;700&family=Bebas+Neue&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #050a08;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            color: #EBB010;
            font-family: 'Rajdhani', sans-serif;
        }
        .showcase-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .field-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        canvas {
            background: #050a08;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            border-radius: 4px;
        }
        h1 { font-family: 'Teko'; margin: 0 0 10px; letter-spacing: 4px; font-size: 36px; text-transform: uppercase; }
        .font-label { font-family: 'Teko'; font-size: 24px; letter-spacing: 2px; color: #fff; }
        .desc { color: #888; margin-bottom: 30px; text-align: center; max-width: 600px; }
    </style>
</head>
<body>

    <h1>ENDZONE FONT SHOWCASE</h1>
    <p class="desc">Evaluating typography across the full "Digital Glass" field. All fields show exact mathematical centering and herringbone turf patterns.</p>
    
    <div class="showcase-container">
        <!-- TEKO -->
        <div class="field-card">
            <span class="font-label">1. TEKO (Current)</span>
            <canvas id="canvasTeko" width="240" height="500"></canvas>
        </div>

        <!-- BEBAS NEUE -->
        <div class="field-card">
            <span class="font-label">2. BEBAS NEUE</span>
            <canvas id="canvasBebas" width="240" height="500"></canvas>
        </div>

        <!-- OSWALD -->
        <div class="field-card">
            <span class="font-label">3. OSWALD</span>
            <canvas id="canvasOswald" width="240" height="500"></canvas>
        </div>

        <!-- RAJDHANI -->
        <div class="field-card">
            <span class="font-label">4. RAJDHANI</span>
            <canvas id="canvasRajdhani" width="240" height="500"></canvas>
        </div>
    </div>

    <script>
        const TEAMS = {
            sentinels: { name: 'BOARS', primary: '#8B0000', accent: '#C4A265' },
            wolves: { name: 'DOLPHINS', primary: '#E8548F', accent: '#FF7EB3' }
        };

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return [r, g, b];
        }

        function drawFieldBase(c, w, h) {
            c.fillStyle = '#050a08';
            c.fillRect(0, 0, w, h);
            
            // Yard lines
            c.strokeStyle = 'rgba(255,255,255,0.05)';
            c.lineWidth = 1;
            for(let i=0; i<=h; i+=40) {
                c.beginPath(); c.moveTo(0, i); c.lineTo(w, i); c.stroke();
            }

            // Sidelines
            c.strokeStyle = 'rgba(255,255,255,0.1)';
            c.strokeRect(5, 5, w-10, h-10);
        }

        function drawEndZone(c, w, y, ezH, team, fontCfg, isTop) {
            const rgb = hexToRgb(team.primary);
            const acc = hexToRgb(team.accent);
            
            // Base
            const grad = c.createLinearGradient(0, y, 0, y + ezH);
            grad.addColorStop(0, `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0.1)`);
            grad.addColorStop(0.5, `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0.15)`);
            grad.addColorStop(1, `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0.08)`);
            c.fillStyle = grad;
            c.fillRect(0, y, w, ezH);

            // Herringbone
            c.save();
            c.beginPath(); c.rect(0, y, w, ezH); c.clip();
            c.strokeStyle = `rgba(${acc[0]}, ${acc[1]}, ${acc[2]}, 0.04)`;
            c.lineWidth = 10;
            for (let i = -w; i < w + ezH; i += 20) {
                c.beginPath(); c.moveTo(0, y + i); c.lineTo(w, y + i + w); c.stroke();
                c.strokeStyle = `rgba(${acc[0]}, ${acc[1]}, ${acc[2]}, 0.02)`;
                c.beginPath(); c.moveTo(0, y + i + 10); c.lineTo(w, y + i - w + 10); c.stroke();
            }
            c.restore();

            // Goal Line Glow
            const goalY = isTop ? y + ezH : y;
            const glow = c.createLinearGradient(0, goalY - 15, 0, goalY + 15);
            glow.addColorStop(0, 'transparent');
            glow.addColorStop(0.5, `rgba(${acc[0]}, ${acc[1]}, ${acc[2]}, 0.25)`);
            glow.addColorStop(1, 'transparent');
            c.fillStyle = glow;
            c.fillRect(0, goalY - 15, w, 30);

            c.strokeStyle = `rgba(${acc[0]}, ${acc[1]}, ${acc[2]}, 0.6)`;
            c.lineWidth = 2;
            c.beginPath(); c.moveTo(0, goalY); c.lineTo(w, goalY); c.stroke();

            // Typography
            c.save();
            const spacing = fontCfg.spacing || 8;
            c.font = fontCfg.font;
            c.textAlign = 'center'; // Use center align for base
            c.textBaseline = 'middle';
            c.letterSpacing = spacing + 'px';

            // Horizontal centering adjustment: letterSpacing adds space AFTER every character.
            // When using textAlign='center', the text is shifted right by half of that trailing space.
            // To compensate, we shift the center-point LEFT by half of the spacing.
            const hOffset = -spacing / 2;
            const centerY = y + ezH / 2 + (fontCfg.vOffset || 0);

            c.translate(w / 2 + hOffset, centerY);
            if (!isTop) {
                // Upside down for bottom endzone
                c.rotate(Math.PI);
            }

            c.fillStyle = `rgba(${acc[0]}, ${acc[1]}, ${acc[2]}, 0.25)`;
            c.fillText(team.name, 0, 0);
            c.strokeStyle = `rgba(${acc[0]}, ${acc[1]}, ${acc[2]}, 0.15)`;
            c.lineWidth = 1;
            c.strokeText(team.name, 0, 0);
            c.restore();
        }

        function setupCanvas(id, fontCfg) {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            const ezH = 80;

            drawFieldBase(ctx, w, h);
            
            // Top Endzone (Wolves)
            drawEndZone(ctx, w, 0, ezH, TEAMS.wolves, fontCfg, true);
            
            // Bottom Endzone (Sentinels)
            drawEndZone(ctx, w, h - ezH, ezH, TEAMS.sentinels, fontCfg, false);

            // Midfield Logo (Flame)
            ctx.save();
            ctx.translate(w/2, h/2);
            ctx.fillStyle = 'rgba(255,69,17,0.08)';
            ctx.beginPath();
            // Simple diamond placeholder for midfield
            ctx.moveTo(0, -30); ctx.lineTo(20, 0); ctx.lineTo(0, 30); ctx.lineTo(-20, 0);
            ctx.fill();
            ctx.restore();
        }

        function renderAll() {
            setupCanvas('canvasTeko',     { font: "900 44px 'Teko'", vOffset: 4, spacing: 10 });
            setupCanvas('canvasBebas',    { font: "400 44px 'Bebas Neue'", vOffset: 4, spacing: 8 });
            setupCanvas('canvasOswald',   { font: "700 36px 'Oswald'", vOffset: 0, spacing: 6 });
            setupCanvas('canvasRajdhani', { font: "700 36px 'Rajdhani'", vOffset: 0, spacing: 12 });
        }

        document.fonts.ready.then(renderAll);
    </script>
</body>
</html>
