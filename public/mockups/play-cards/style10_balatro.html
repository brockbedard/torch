<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balatro-Max Mockup: Hail Mary</title>
    <style>
        :root {
            --bg-color: #0d0211;
            --vivid-pink: #ff00ff;
            --vivid-cyan: #00ffff;
            --vivid-yellow: #ffff00;
            --vivid-red: #ff3131;
            --vivid-green: #39ff14;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        .card-container {
            position: relative;
            width: 120px;
            height: 168px;
            background: var(--bg-color);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4), 0 0 40px rgba(0, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            user-select: none;
        }

        /* Shifting Gradient Background */
        .card-bg {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                rgba(255, 0, 255, 0.2),
                rgba(0, 255, 255, 0.2),
                rgba(255, 255, 0, 0.1),
                rgba(255, 0, 255, 0.2)
            );
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            z-index: 1;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Scanlines/CRT effect */
        .crt-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1) 0px,
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 10;
        }

        /* Card Content */
        .card-inner {
            position: relative;
            z-index: 5;
            height: 100%;
            padding: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: white;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .rank-suit {
            font-size: 18px;
            font-weight: bold;
            line-height: 1;
            color: var(--vivid-red);
        }

        .power-icon {
            width: 24px;
            height: 24px;
            background: var(--vivid-yellow);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: pulse 2s infinite ease-in-out;
            box-shadow: 0 0 10px var(--vivid-yellow);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.3); }
        }

        .play-name {
            font-size: 10px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 4px;
            border-radius: 4px;
            color: var(--vivid-cyan);
            border: 1px solid var(--vivid-cyan);
            box-shadow: 0 0 5px var(--vivid-cyan);
            margin-top: 4px;
        }

        .main-pips {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Floating Pips */
        .pip {
            position: absolute;
            font-size: 24px;
            color: var(--vivid-red);
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(3px, -5px) rotate(5deg); }
            66% { transform: translate(-3px, 3px) rotate(-5deg); }
        }

        .stats {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--vivid-pink);
            padding: 4px;
            font-size: 10px;
            border-radius: 2px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-line {
            display: flex;
            justify-content: space-between;
        }

        .stat-val {
            font-weight: bold;
            color: var(--vivid-pink);
        }

        .footer-rank {
            align-self: flex-end;
            transform: rotate(180deg);
            font-size: 18px;
            font-weight: bold;
            color: var(--vivid-red);
        }

        /* Glitch Effect on Title */
        .glitch-text {
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { transform: skew(0deg); }
            20% { transform: skew(0deg); }
            21% { transform: skew(10deg); color: var(--vivid-green); }
            22% { transform: skew(-10deg); color: var(--vivid-pink); }
            23% { transform: skew(0deg); color: var(--vivid-cyan); }
            100% { transform: skew(0deg); }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card-bg"></div>
        <div class="crt-overlay"></div>
        
        <div class="card-inner">
            <div class="header">
                <div class="rank-suit">A<br>&hearts;</div>
                <div class="power-icon"></div>
            </div>

            <div class="main-pips">
                <div class="pip">&hearts;</div>
                <div class="play-name glitch-text">Hail Mary</div>
            </div>

            <div class="stats">
                <div class="stat-line">
                    <span>MULT</span>
                    <span class="stat-val">x100</span>
                </div>
                <div class="stat-line">
                    <span>CHIP</span>
                    <span class="stat-val">+500</span>
                </div>
                <div class="stat-line" style="color: var(--vivid-yellow); font-size: 8px; margin-top: 2px;">
                    <span>ALL-IN RISK</span>
                </div>
            </div>

            <div class="footer-rank">A<br>&hearts;</div>
        </div>
    </div>

</body>
</html>
