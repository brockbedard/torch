<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Card - Cyberpunk Neon</title>
    <style>
        :root {
            --bg-color: #050505;
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff00ff;
            --neon-green: #39ff14;
            --glow-cyan: 0 0 5px #00f3ff, 0 0 10px #00f3ff;
            --glow-magenta: 0 0 5px #ff00ff, 0 0 10px #ff00ff;
            --scan-line: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }

        .play-card {
            width: 120px;
            height: 168px;
            background-color: var(--bg-color);
            border: 1px solid var(--neon-cyan);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            box-shadow: var(--glow-cyan);
            display: flex;
            flex-direction: column;
            padding: 8px;
            box-sizing: border-box;
        }

        /* Scan line texture */
        .play-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 1px,
                var(--scan-line) 2px
            );
            pointer-events: none;
            z-index: 10;
        }

        /* Glitchy header */
        .header {
            font-size: 10px;
            color: var(--neon-magenta);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-shadow: var(--glow-magenta);
            border-bottom: 1px solid var(--neon-magenta);
            padding-bottom: 2px;
            text-align: center;
        }

        .diagram {
            flex-grow: 1;
            position: relative;
            border: 1px dashed rgba(0, 243, 255, 0.3);
            margin-bottom: 4px;
        }

        /* Players */
        .player {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--neon-cyan);
            box-shadow: var(--glow-cyan);
        }

        .qb {
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--neon-magenta);
            box-shadow: var(--glow-magenta);
        }

        .wr {
            bottom: 20px;
        }

        .wr-1 { left: 10%; }
        .wr-2 { left: 30%; }
        .wr-3 { left: 70%; }
        .wr-4 { left: 90%; }

        /* Routes (Four Verts) */
        .route {
            position: absolute;
            width: 1px;
            height: 80px;
            background-color: var(--neon-green);
            box-shadow: 0 0 5px var(--neon-green);
            bottom: 26px;
        }

        .route::after {
            content: "";
            position: absolute;
            top: -5px;
            left: -2px;
            width: 0;
            height: 0;
            border-left: 3px solid transparent;
            border-right: 3px solid transparent;
            border-bottom: 5px solid var(--neon-green);
        }

        .route-1 { left: 12.5%; }
        .route-2 { left: 32.5%; }
        .route-3 { left: 72.5%; }
        .route-4 { left: 92.5%; }

        .footer {
            font-size: 8px;
            color: var(--neon-cyan);
            opacity: 0.7;
            text-align: right;
            text-transform: uppercase;
        }

        /* Ambient glow in background */
        .ambient-glow {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 0, 255, 0.2) 0%, transparent 70%);
            bottom: -10px;
            right: -10px;
            z-index: 1;
        }

    </style>
</head>
<body>
    <div class="play-card">
        <div class="ambient-glow"></div>
        <div class="header">Four Verts</div>
        <div class="diagram">
            <!-- QB -->
            <div class="player qb"></div>
            
            <!-- WRs -->
            <div class="player wr wr-1"></div>
            <div class="player wr wr-2"></div>
            <div class="player wr wr-3"></div>
            <div class="player wr wr-4"></div>

            <!-- Routes -->
            <div class="route route-1"></div>
            <div class="route route-2"></div>
            <div class="route route-3"></div>
            <div class="route route-4"></div>
        </div>
        <div class="footer">SYS_V2.0.4</div>
    </div>
</body>
</html>
