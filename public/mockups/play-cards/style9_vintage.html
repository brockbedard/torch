<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Newspaper Play Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT:ital,wght@0,400;0,700;1,400&family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper-color: #f4ecd8;
            --ink-color: #1a1a1a;
            --halftone-color: rgba(0, 0, 0, 0.05);
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 120px;
            height: 168px;
            background-color: var(--paper-color);
            position: relative;
            box-sizing: border-box;
            border: 1px solid #c8bba0;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.5), inset 0 0 40px rgba(0,0,0,0.05);
            font-family: 'Old Standard TT', serif;
            color: var(--ink-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 6px;
        }

        /* Halftone Pattern Overlay */
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(var(--halftone-color) 1px, transparent 0);
            background-size: 3px 3px;
            pointer-events: none;
            z-index: 1;
        }

        /* Paper Grain/Stains */
        .card::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0,0,0,0.02) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0,0,0,0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 2;
        }

        .border-inner {
            border: 2px solid var(--ink-color);
            border-style: double;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 4px;
            z-index: 3;
            position: relative;
        }

        header {
            text-align: center;
            border-bottom: 1px solid var(--ink-color);
            margin-bottom: 6px;
            padding-bottom: 2px;
        }

        .play-title {
            font-family: 'UnifrakturMaguntia', cursive;
            font-size: 14px;
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
        }

        .edition-info {
            font-size: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: bold;
        }

        .diagram-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 4px 0;
        }

        .diagram {
            width: 100%;
            height: 80px;
            stroke: var(--ink-color);
            stroke-width: 1.5;
            fill: none;
            stroke-linecap: round;
            filter: contrast(150%) brightness(80%);
        }

        .labels {
            font-size: 7px;
            font-weight: bold;
            font-style: italic;
            text-align: center;
            border-top: 1px solid var(--ink-color);
            padding-top: 4px;
        }

        .stat {
            font-size: 8px;
            display: flex;
            justify-content: space-between;
            margin-top: 2px;
        }

        /* SVG Play Symbols */
        .qb { fill: var(--ink-color); stroke: none; }
        .wr { stroke: var(--ink-color); stroke-width: 1; }
        .route { stroke-dasharray: 2 1; }
        .handoff { stroke: var(--ink-color); stroke-width: 1; }
    </style>
</head>
<body>

    <div class="card">
        <div class="border-inner">
            <header>
                <div class="edition-info">Extra Edition - 1924</div>
                <h1 class="play-title">Statue of Liberty</h1>
            </header>

            <div class="diagram-container">
                <svg class="diagram" viewBox="0 0 100 80">
                    <!-- Offensive Line -->
                    <circle cx="35" cy="65" r="2" />
                    <circle cx="42" cy="65" r="2" />
                    <circle cx="50" cy="65" r="2" />
                    <circle cx="58" cy="65" r="2" />
                    <circle cx="65" cy="65" r="2" />

                    <!-- Quarterback (Fake Pass) -->
                    <path class="qb" d="M 50 72 L 48 76 L 52 76 Z" />
                    <path class="route" d="M 50 72 Q 70 40 85 30" />
                    <path d="M 82 28 L 88 30 L 84 34" /> <!-- Arrowhead -->

                    <!-- Running Back (The Actual Play) -->
                    <circle cx="35" cy="75" r="3" />
                    <path d="M 35 75 Q 50 75 50 72" /> <!-- Handoff line behind back -->
                    <path d="M 50 72 Q 40 50 15 45" /> <!-- RB Run Route -->
                    <path d="M 18 43 L 12 45 L 18 48" /> <!-- Arrowhead -->
                    
                    <text x="75" y="25" font-size="6" fill="currentColor" font-style="italic">Fake</text>
                    <text x="10" y="40" font-size="6" fill="currentColor" font-weight="bold">GO!</text>
                </svg>
            </div>

            <div class="labels">
                The Great Deception
            </div>
            
            <div class="stat">
                <span>VOL. IX</span>
                <span>NO. 120</span>
            </div>
        </div>
    </div>

</body>
</html>
