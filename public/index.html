@keyframes pop{0%{transform:scale(.2);opacity:0;}65%{transform:scale(1.16);}100%{transform:scale(1);opacity:1;}}

.btn:disabled{cursor:not-allowed;opacity:.4;}
.bg{background:#001600;color:var(--green);border-color:var(--green);box-shadow:0 5px 0 #003000;font-size:10px;}
.bo{background:#160f00;color:var(--gold);border-color:var(--gold);box-shadow:0 5px 0 #362600;font-size:10px;}

.bsnap{background:#200b00;color:var(--orange);border-color:var(--orange);box-shadow:0 5px 0 #501c00;font-size:10px;}

// ===== SOUND ENGINE =====
var SND=(function(){
  var ctx=null;var crowdNode=null;var crowdGain=null;
  function ac(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();return ctx;}
  function tone(f,dur,type,vol,t0){
    try{var c=ac(),now=c.currentTime,o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type=type||'square';o.frequency.value=f;
      g.gain.setValueAtTime(vol||.1,now+(t0||0));
      g.gain.exponentialRampToValueAtTime(0.001,now+(t0||0)+dur);
      o.start(now+(t0||0));o.stop(now+(t0||0)+dur+.02);}catch(e){}}
  function noise(dur,vol,t0){
    try{var c=ac(),sr=c.sampleRate,buf=c.createBuffer(1,Math.floor(sr*dur),sr),data=buf.getChannelData(0);
      for(var i=0;i<data.length;i++)data[i]=Math.random()*2-1;
      var s=c.createBufferSource(),g=c.createGain();s.buffer=buf;s.connect(g);g.connect(c.destination);
      g.gain.setValueAtTime(vol||.1,c.currentTime+(t0||0));
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+(t0||0)+dur);
      s.start(c.currentTime+(t0||0));}catch(e){}}
  return{
    click:function(){tone(440,.06,'square',.08);tone(880,.04,'square',.05,.05);},
    select:function(){tone(523,.05,'triangle',.1);tone(659,.07,'triangle',.11,.06);},
    snap:function(){noise(.12,.28);tone(80,.2,'sawtooth',.22,.02);tone(160,.1,'sawtooth',.14,.08);},
    menu:function(){[262,330,392,523].forEach(function(f,i){tone(f,.14,'square',.12,i*.1);});},
    td:function(){[523,659,784,1047,784,659,784,1047,1319].forEach(function(f,i){tone(f,.18,'square',.18,i*.1);});},
    turnover:function(){[330,247,196,147,110].forEach(function(f,i){tone(f,.2,'sawtooth',.18-i*.02,i*.13);});},
    clash:function(){noise(.14,.32);[110,220,440,880].forEach(function(f,i){tone(f,.12,'square',.18,i*.03);});tone(1320,.4,'square',.2,.2);},
    draft:function(){tone(330,.04,'square',.1);tone(550,.05,'square',.12,.05);tone(880,.1,'square',.14,.1);},
    flip:function(){for(var i=0;i<4;i++)tone(1200+i*200,.02,'square',.04,i*.04);},
    crowdStart:function(){
      try{var c=ac();if(crowdNode)return;
        var sr=c.sampleRate,dur=4,buf=c.createBuffer(1,Math.floor(sr*dur),sr),data=buf.getChannelData(0);
        for(var i=0;i<data.length;i++)data[i]=Math.random()*2-1;
        crowdNode=c.createBufferSource();crowdNode.buffer=buf;crowdNode.loop=true;
        var bp=c.createBiquadFilter();bp.type='bandpass';bp.frequency.value=400;bp.Q.value=0.5;
        crowdGain=c.createGain();crowdGain.gain.setValueAtTime(0.025,c.currentTime);
        var lfo=c.createOscillator();lfo.frequency.value=0.3;var lfoGain=c.createGain();lfoGain.gain.value=0.008;
        lfo.connect(lfoGain);lfoGain.connect(crowdGain.gain);lfo.start();
        crowdNode.connect(bp);bp.connect(crowdGain);crowdGain.connect(c.destination);crowdNode.start();
      }catch(e){}},
    crowdStop:function(){
      try{if(crowdGain){crowdGain.gain.exponentialRampToValueAtTime(0.001,ac().currentTime+0.5);}
        setTimeout(function(){if(crowdNode){crowdNode.stop();crowdNode=null;crowdGain=null;}},600);
      }catch(e){crowdNode=null;crowdGain=null;}},
  };
})();

function rollYards(tier){
  if(tier==='O+') return 8+Math.floor(Math.random()*13);
  if(tier==='N')  return 2+Math.floor(Math.random()*5);
  if(tier==='D+') return -2+Math.floor(Math.random()*5);
  if(tier==='TO') return -2+Math.floor(Math.random()*3);
  return 3;
}
function isTurnover(tier){return tier==='TO'&&Math.random()<0.2;}

function getTeam(id){return TEAMS.find(function(t){return t.id===id;})||TEAMS[0];}
function getOtherTeam(id){return TEAMS.find(function(t){return t.id!==id;})||TEAMS[1];}
function getOffCards(teamId){return teamId==='canyon_tech'?CT_OFF_CARDS:IR_OFF_CARDS;}
function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function fmtClock(sec){var m=Math.floor(sec/60);var s=sec%60;return m+':'+(s<10?'0':'')+s;}

// ===== RENDER =====
function render(){
  SND.crowdStop();
  root.innerHTML='';
  var content;
  if(!GS) content=buildHome();
  else if(GS.screen==='setup') content=buildSetup();
  else if(GS.screen==='players') content=buildPlayers();
  else if(GS.screen==='draft') content=buildDraft();
  else if(GS.screen==='play') content=buildPlay();
  else if(GS.screen==='result') content=buildResult();
  else content=buildHome();
  if(content) root.appendChild(content);
  root.scrollTop=0;
}

// ===== SCOREBOARD BUILDER =====
function buildScoreboard(homeTeam,awayTeam){
  var sb=document.createElement('div');
  sb.className='sb';

  // Scanlines overlay
  var scan=document.createElement('div');
  scan.style.cssText='position:absolute;inset:0;border-radius:9px;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 3px);pointer-events:none;z-index:1;';
  sb.appendChild(scan);

  // Quarter + Time row
  var topRow=document.createElement('div');
  topRow.style.cssText='display:flex;justify-content:center;align-items:baseline;gap:12px;margin-bottom:8px;';
  topRow.innerHTML='<span class="sb-label">4TH</span><span class="sb-led" style="font-size:18px;">'+fmtClock(SCENARIO.clock)+'</span>';
  sb.appendChild(topRow);

  // Teams + Scores
  var scoreRow=document.createElement('div');
  scoreRow.style.cssText='display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:10px;';

  // Home side
  var homeDiv=document.createElement('div');
  homeDiv.style.cssText='flex:1;text-align:center;';
  var homeLabel=document.createElement('div');
  homeLabel.className='sb-label';
  homeLabel.style.cssText+='margin-bottom:4px;font-size:4px;';
  homeLabel.textContent='HOME';
  var homeName=document.createElement('div');
  homeName.style.cssText='font-family:\'Press Start 2P\',monospace;font-size:7px;color:#fff;letter-spacing:1px;min-height:14px;display:flex;justify-content:center;';
  var homeScore=document.createElement('div');
  homeScore.className='sb-led-gold';
  homeScore.style.cssText+='font-size:28px;margin-top:2px;';

  // Dash
  var dash=document.createElement('div');
  dash.className='sb-led';
  dash.style.cssText+='font-size:20px;flex-shrink:0;padding:0 4px;margin-top:14px;';
  dash.textContent='-';

  // Away side
  var awayDiv=document.createElement('div');
  awayDiv.style.cssText='flex:1;text-align:center;';
  var awayLabel=document.createElement('div');
  awayLabel.className='sb-label';
  awayLabel.style.cssText+='margin-bottom:4px;font-size:4px;';
  awayLabel.textContent='AWAY';
  var awayName=document.createElement('div');
  awayName.style.cssText='font-family:\'Press Start 2P\',monospace;font-size:7px;color:#fff;letter-spacing:1px;min-height:14px;display:flex;justify-content:center;';
  var awayScore=document.createElement('div');
  awayScore.className='sb-led-gold';
  awayScore.style.cssText+='font-size:28px;margin-top:2px;';

  function renderFlap(container,text){
    container.innerHTML='';
    var wrap=document.createElement('span');
    wrap.className='flap-wrap';
    wrap.style.cssText='font-family:\'Press Start 2P\',monospace;font-size:7px;letter-spacing:1px;';
    for(var i=0;i<text.length;i++){
      var ch=document.createElement('span');
      ch.className='flap-char';
      if(text[i]===' '){ch.style.width='.3em';ch.style.background='transparent';ch.style.border='none';}
      else{
        var top=document.createElement('div');top.className='flap-top';
        var ts=document.createElement('span');ts.textContent=text[i];ts.style.color='#fff';top.appendChild(ts);
        var bot=document.createElement('div');bot.className='flap-bot';
        var bs=document.createElement('span');bs.textContent=text[i];bs.style.color='#fff';bot.appendChild(bs);
        ch.append(top,bot);
      }
      wrap.appendChild(ch);
    }
    container.appendChild(wrap);
  }

  function flipTo(container,newText){
    var oldChars=container.querySelectorAll('.flap-char');
    var padded=newText;
    while(padded.length<12)padded+=' ';
    renderFlap(container,padded);
    var newChars=container.querySelectorAll('.flap-char');
    newChars.forEach(function(ch,i){
      if(padded[i]===' ')return;
      var topDiv=ch.querySelector('.flap-top');
      var botDiv=ch.querySelector('.flap-bot');
      if(topDiv&&botDiv){
        topDiv.style.opacity='0';botDiv.style.opacity='0';
        setTimeout(function(){
          topDiv.classList.add('flap-anim-top');
          topDiv.style.opacity='1';
          setTimeout(function(){
            botDiv.classList.add('flap-anim-bot');
            botDiv.style.opacity='1';
          },80);
        },i*40);
      }
    });
    SND.flip();
  }

  homeDiv.append(homeLabel,homeName,homeScore);
  awayDiv.append(awayLabel,awayName,awayScore);
  scoreRow.append(homeDiv,dash,awayDiv);
  sb.appendChild(scoreRow);

  // Initialize names
  if(homeTeam){flipTo(homeName,homeTeam);homeScore.textContent=String(SCENARIO.offScore);}
  else{renderFlap(homeName,'---         ');homeScore.textContent='--';}
  if(awayTeam){flipTo(awayName,awayTeam);awayScore.textContent=String(SCENARIO.defScore);}
  else{renderFlap(awayName,'---         ');awayScore.textContent='--';}

  // Info bar: Down, Distance, Ball, Timeouts
  var infoRow=document.createElement('div');
  infoRow.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:6px 0 0;border-top:1px solid #14122a;';

  var downs=['','1ST','2ND','3RD','4TH'];
  var cells=[
    {label:'DOWN',val:downs[SCENARIO.down]+' & '+SCENARIO.dist},
    {label:'BALL ON',val:'DEF '+SCENARIO.ballOn},
    {label:'TIMEOUTS',val:String(SCENARIO.timeouts)},
  ];
  cells.forEach(function(c){
    var cell=document.createElement('div');
    cell.style.cssText='text-align:center;flex:1;';
    cell.innerHTML='<div class="sb-label" style="margin-bottom:2px;">'+c.label+'</div><div class="sb-led" style="font-size:9px;">'+c.val+'</div>';
    infoRow.appendChild(cell);
  });
  sb.appendChild(infoRow);

  // Expose update method
  sb._update=function(ht,at){
    if(ht){flipTo(homeName,ht);homeScore.textContent=String(SCENARIO.offScore);}
    if(at){flipTo(awayName,at);awayScore.textContent=String(SCENARIO.defScore);}
  };

  return sb;
}

function buildSetup(){
  SND.crowdStart();
  var el=document.createElement('div');el.className='sup';

  // Header
  var hdr=document.createElement('div');
  hdr.style.cssText='background:linear-gradient(135deg,#0a0820,#10082a);border-bottom:2px solid rgba(204,68,255,.3);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;';

  var content=document.createElement('div');

  // GO button

      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">'+
        '<div style="font-family:\'Press Start 2P\',monospace;font-size:5px;color:var(--muted);">'+pl.pos+'</div>'+
        '<div style="font-family:\'Press Start 2P\',monospace;font-size:8px;color:'+ovrColor+';text-shadow:0 0 6px '+ovrColor+'66;">'+pl.ovr+'</div>'+
      '</div>'+
      '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:18px;color:'+(isSel?team.accent:'#fff')+';letter-spacing:1px;line-height:1;">'+pl.name+'</div>'+
      '<div style="font-family:\'Press Start 2P\',monospace;font-size:5px;color:'+team.accent+';margin-top:3px;letter-spacing:1px;">"'+pl.nick+'"</div>'+
      '<div style="font-size:11px;color:var(--muted);margin-top:6px;font-weight:600;line-height:1.4;font-style:italic;">'+pl.desc+'</div>';
    return c;
  }

  function refreshQBs(){
    qbGrid.innerHTML='';
    qbs.forEach(function(pl){
      var isSel=selQB===pl.id;
      var c=renderPlayerCard(pl,isSel);
      c.onclick=function(){SND.select();selQB=pl.id;refreshQBs();refreshGoBtn();};
      qbGrid.appendChild(c);
    });
  }
  content.appendChild(qbGrid);

  // Skill section
  var skillLabel=document.createElement('div');
  skillLabel.style.cssText="font-family:'Press Start 2P',monospace;font-size:5px;color:"+team.accent+";letter-spacing:2px;text-align:center;margin-top:6px;";
  skillLabel.textContent='\u25B8 SKILL PLAYERS (PICK 3)';
  content.appendChild(skillLabel);

  var skillGrid=document.createElement('div');skillGrid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;';

  function refreshSkills(){
    skillGrid.innerHTML='';
    var count=Object.keys(selSkill).length;
    skills.forEach(function(pl){
      var isSel=!!selSkill[pl.id];
      var c=renderPlayerCard(pl,isSel);
      if(!isSel&&count>=3) c.style.opacity='.4';
      c.onclick=function(){
        SND.select();
        if(selSkill[pl.id]){delete selSkill[pl.id];}
        else if(Object.keys(selSkill).length<3){selSkill[pl.id]=true;}
        refreshSkills();refreshGoBtn();
      };
      skillGrid.appendChild(c);
    });
  }
  content.appendChild(skillGrid);

  // Pick for me + Go buttons
  var btnRow=document.createElement('div');btnRow.style.cssText='display:flex;gap:8px;padding:8px 0 16px;';

  var pickForMe=document.createElement('button');
  pickForMe.className='btn bo';
  pickForMe.style.cssText+='flex:1;padding:14px;font-size:7px;';
  pickForMe.textContent='\uD83C\uDFB2 PICK FOR ME';
  pickForMe.onclick=function(){
    SND.draft();
    selQB=qbs[Math.floor(Math.random()*qbs.length)].id;
    selSkill={};
    var shuffled=shuffle(skills);
    for(var i=0;i<3;i++) selSkill[shuffled[i].id]=true;
    refreshQBs();refreshSkills();refreshGoBtn();
  };

  var goBtn=document.createElement('button');

  function refreshGoBtn(){
    var ready=selQB&&Object.keys(selSkill).length===3;
    goBtn.className='btn '+(ready?'bsnap':'bm');
    goBtn.style.cssText='flex:1.5;padding:14px;font-size:8px;'+(ready?'':'cursor:not-allowed;opacity:.3;');
    goBtn.disabled=!ready;
    goBtn.textContent=ready?'\uD83C\uDCCF DRAFT PLAYS \u2192':'PICK YOUR SQUAD';
    goBtn.onclick=ready?function(){
      SND.snap();
      var roster=[selQB].concat(Object.keys(selSkill));
      setGs({screen:'draft',team:GS.team,side:GS.side,roster:roster});
    }:null;
  }

  btnRow.append(pickForMe,goBtn);
  content.appendChild(btnRow);
  el.appendChild(content);

  refreshQBs();refreshSkills();refreshGoBtn();
  return el;
}

// ===== SCREEN 4: CARD DRAFT =====
function buildDraft(){
  var el=document.createElement('div');el.className='sup';
  el.style.cssText='min-height:100vh;display:flex;flex-direction:column;background:var(--bg);';

  var team=getTeam(GS.team);
  var isOffense=GS.side==='offense';
  var pool=isOffense?getOffCards(GS.team):DEF_CARDS;

  // Header
  var hdr=document.createElement('div');
  hdr.style.cssText='background:linear-gradient(135deg,#0a0820,#10082a);border-bottom:2px solid '+team.accent+'55;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;';
  hdr.innerHTML='<div style="display:flex;align-items:center;gap:8px;"><span style="font-size:20px;">'+team.icon+'</span><span style="font-family:\'Bebas Neue\',sans-serif;font-size:20px;color:'+team.accent+';letter-spacing:2px;">'+team.name+'</span><span style="font-family:\'Press Start 2P\',monospace;font-size:5px;color:var(--muted);letter-spacing:1px;">'+GS.side.toUpperCase()+'</span></div>';
  var backBtn=document.createElement('button');backBtn.className='btn bm';
  backBtn.style.cssText='font-size:6px;padding:6px 10px;cursor:pointer;color:var(--muted);';
  backBtn.textContent='\u2190 BACK';
  backBtn.onclick=function(){SND.click();setGs({screen:'players',team:GS.team,side:GS.side,roster:GS.roster});};
  hdr.appendChild(backBtn);
  el.appendChild(hdr);

  var content=document.createElement('div');
  content.style.cssText='flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;';

  var inst=document.createElement('div');
  inst.style.cssText='text-align:center;padding:4px 0;';
  inst.innerHTML='<div style="font-family:\'Bebas Neue\',sans-serif;font-size:26px;color:var(--text);letter-spacing:2px;">DRAFT YOUR PLAYS</div><div style="font-size:13px;color:var(--muted);font-weight:600;margin-top:2px;">Pick 5 cards for your game plan</div>';
  content.appendChild(inst);

  // Counter
  var counter=document.createElement('div');
  counter.style.cssText="font-family:'Press Start 2P',monospace;font-size:8px;text-align:center;color:var(--cyan);";
  content.appendChild(counter);

  var selected={};

  var cardGrid=document.createElement('div');
  cardGrid.style.cssText='display:flex;flex-direction:column;gap:6px;';

  function typeColor(card){
    if(card.type==='run') return {border:'#cc5522',bg:'linear-gradient(135deg,#1a0800,#0e0400)',label:'RUN',labelBg:'#331100'};
    if(card.type==='pass') return {border:'#2255cc',bg:'linear-gradient(135deg,#0c1535,#06091a)',label:'PASS',labelBg:'#0a1030'};
    if(card.type==='agg') return {border:'#ff2424',bg:'linear-gradient(135deg,#220000,#140000)',label:'AGG',labelBg:'#330000'};
    return {border:'#00aacc',bg:'linear-gradient(135deg,#001822,#000a14)',label:'CON',labelBg:'#001020'};
  }

  function refreshCards(){
    cardGrid.innerHTML='';
    var count=Object.keys(selected).length;
    counter.textContent=count+' / 5 SELECTED';
    counter.style.color=count===5?'var(--green)':'var(--cyan)';

    pool.forEach(function(card,idx){
      var isSel=!!selected[card.id+'_'+idx];
      var tc=typeColor(card);
      var row=document.createElement('div');
      row.style.cssText='cursor:pointer;border:2px solid '+(isSel?'var(--gold)':tc.border+'66')+';background:'+tc.bg+';border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;transition:all .12s;position:relative;overflow:hidden;'+(isSel?'box-shadow:0 0 16px rgba(255,215,0,.25);transform:translateX(4px);':'');
      row.style.animationDelay=(idx*0.04)+'s';

      var iconDiv=document.createElement('div');
      iconDiv.style.cssText='font-size:22px;flex-shrink:0;width:32px;text-align:center;';
      iconDiv.textContent=card.icon;

      var info=document.createElement('div');info.style.cssText='flex:1;min-width:0;';
      info.innerHTML=
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;">'+
          '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:17px;color:'+(isSel?'var(--gold)':'#fff')+';letter-spacing:1px;">'+card.name+'</div>'+
          '<div style="font-family:\'Press Start 2P\',monospace;font-size:4px;padding:2px 4px;background:'+tc.labelBg+';color:'+tc.border+';border-radius:2px;letter-spacing:1px;">'+card.cat+'</div>'+
        '</div>'+
        '<div style="font-size:11px;color:var(--muted);font-weight:600;line-height:1.3;">'+card.desc+'</div>';

      var check=document.createElement('div');
      check.style.cssText='flex-shrink:0;width:24px;height:24px;border:2px solid '+(isSel?'var(--gold)':'var(--bdr)')+';border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;background:'+(isSel?'rgba(255,215,0,.15)':'transparent')+';';
      check.textContent=isSel?'\u2713':'';
      check.style.color=isSel?'var(--gold)':'';

      row.append(iconDiv,info,check);

      if(!isSel&&count>=5) row.style.opacity='.35';
      row.onclick=function(){
        SND.click();
        var key=card.id+'_'+idx;
        if(selected[key]) delete selected[key];
        else if(Object.keys(selected).length<5) selected[key]=card;
        refreshCards();refreshGoBtn();
      };
      cardGrid.appendChild(row);
    });
  }
  content.appendChild(cardGrid);

  // Buttons
  var btnRow=document.createElement('div');btnRow.style.cssText='display:flex;gap:8px;padding:8px 0 16px;';

  var pickForMe=document.createElement('button');
  pickForMe.className='btn bo';
  pickForMe.style.cssText+='flex:1;padding:14px;font-size:7px;';
  pickForMe.textContent='\uD83C\uDFB2 PICK FOR ME';
  pickForMe.onclick=function(){
    SND.draft();
    selected={};
    var indices=shuffle(pool.map(function(_,i){return i;})).slice(0,5);
    indices.forEach(function(i){selected[pool[i].id+'_'+i]=pool[i];});
    refreshCards();refreshGoBtn();
  };

  var goBtn=document.createElement('button');

  function refreshGoBtn(){
    var ready=Object.keys(selected).length===5;
    goBtn.className='btn '+(ready?'bsnap':'bm');
    goBtn.style.cssText='flex:1.5;padding:14px;font-size:8px;'+(ready?'':'cursor:not-allowed;opacity:.3;');
    goBtn.disabled=!ready;
    goBtn.textContent=ready?'\uD83C\uDFC8 START DRIVE \u2192':'PICK 5 CARDS';
    goBtn.onclick=ready?function(){
      SND.snap();
      var hand=Object.keys(selected).map(function(k){return selected[k];});
      setGs({screen:'play',team:GS.team,side:GS.side,roster:GS.roster,hand:hand});
    }:null;
  }

  btnRow.append(pickForMe,goBtn);
  content.appendChild(btnRow);
  el.appendChild(content);

  refreshCards();refreshGoBtn();
  return el;
}

// ===== PLACEHOLDER SCREENS =====
function buildPlay(){
  var el=document.createElement('div');
  el.style.cssText='min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;';
  el.innerHTML=
    '<div style="font-size:48px;margin-bottom:16px;">\uD83C\uDFC8</div>'+
    '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:36px;color:var(--cyan);letter-spacing:3px;">GAMEPLAY</div>'+
    '<div style="font-size:14px;color:var(--muted);margin-top:8px;font-weight:600;">Coming next \u2014 the clash</div>'+
    '<div style="font-size:12px;color:var(--muted);margin-top:4px;">Team: '+GS.team+' \u00B7 Side: '+GS.side+' \u00B7 Hand: '+GS.hand.length+' cards</div>';
  var back=document.createElement('button');back.className='btn bp';
  back.style.cssText='margin-top:24px;padding:14px 28px;font-size:8px;';
  back.textContent='\u2190 BACK TO DRAFT';
  back.onclick=function(){SND.click();setGs({screen:'draft',team:GS.team,side:GS.side,roster:GS.roster});};
  el.appendChild(back);
  return el;
}

function buildResult(){
  var el=document.createElement('div');
  el.style.cssText='min-height:100vh;display:flex;align-items:center;justify-content:center;';
  el.innerHTML='<div style="font-family:\'Bebas Neue\',sans-serif;font-size:36px;color:var(--green);">RESULT \u2014 COMING SOON</div>';
  return el;
}

// ===== INIT =====
render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js');}
</script>
