<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#07050e">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🔥 TORCH — The Football Card Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Press+Start+2P&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07050e;--bg2:#0d0b1e;--bg3:#131128;
  --cyan:#00d4ff;--gold:#ffd700;--green:#00ff88;
  --orange:#ff6633;--danger:#ff2424;--purple:#cc44ff;
  --text:#e8e4ff;--muted:#3e3c60;--bdr:#1c1930;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);width:100%;height:100%;}
body{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--text);display:flex;justify-content:center;}
#root{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative;}
.bn{font-family:'Bebas Neue',sans-serif;}
.px{font-family:'Press Start 2P',monospace;}
/* FIELD GRID BACKGROUND */
#root::before{content:'';position:fixed;inset:0;width:100%;max-width:430px;left:50%;transform:translateX(-50%);
  background-image:linear-gradient(rgba(0,212,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.018) 1px,transparent 1px);
  background-size:36px 36px;pointer-events:none;z-index:0;}
/* ANIMATIONS */
@keyframes gGold{0%,100%{text-shadow:0 0 14px var(--gold),0 0 40px rgba(255,215,0,.4);}50%{text-shadow:0 0 4px var(--gold);}}
@keyframes gGreen{0%,100%{text-shadow:0 0 12px var(--green),0 0 32px rgba(0,255,136,.35);}50%{text-shadow:0 0 3px var(--green);}}
@keyframes gCyan{0%,100%{text-shadow:0 0 12px var(--cyan),0 0 28px rgba(0,212,255,.32);}50%{text-shadow:0 0 3px var(--cyan);}}
@keyframes sup{from{transform:translateY(26px);opacity:0;}to{transform:none;opacity:1;}}
@keyframes pop{0%{transform:scale(.2);opacity:0;}65%{transform:scale(1.16);}100%{transform:scale(1);opacity:1;}}
@keyframes shk{0%,100%{transform:none;}15%{transform:translateX(-8px) rotate(-1deg);}35%{transform:translateX(8px) rotate(1deg);}55%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
@keyframes tdb{0%,100%{transform:none;}20%{transform:scale(1.22) rotate(-3deg);}40%{transform:scale(1.35) rotate(3deg);}60%{transform:scale(1.15) rotate(-1.5deg);}80%{transform:scale(1.26) rotate(1.5deg);}}
@keyframes deal{from{transform:translateY(50px) rotate(6deg);opacity:0;}to{transform:none;opacity:1;}}
@keyframes xpulse{0%,100%{box-shadow:none;background:transparent;}50%{box-shadow:0 0 20px rgba(0,255,136,.9),inset 0 0 8px rgba(0,255,136,.25);background:rgba(0,255,136,.13);}}
@keyframes cpulse{0%,100%{box-shadow:none;}50%{box-shadow:0 0 20px rgba(255,36,36,.85),inset 0 0 8px rgba(255,36,36,.2);background:rgba(255,36,36,.12);}}
@keyframes selCard{0%,100%{border-color:var(--gold);box-shadow:0 0 22px rgba(255,215,0,.5),0 -6px 0 rgba(255,215,0,.18);}50%{border-color:var(--orange);box-shadow:0 0 32px rgba(255,102,51,.6),0 -6px 0 rgba(255,102,51,.18);}}
@keyframes snapPulse{0%{box-shadow:0 5px 0 #6a2000,0 0 0 0 rgba(255,102,51,.6);}70%{box-shadow:0 5px 0 #6a2000,0 0 0 16px rgba(255,102,51,0);}100%{box-shadow:0 5px 0 #6a2000,0 0 0 0 rgba(255,102,51,0);}}
@keyframes fire{0%,100%{transform:scaleY(1) scaleX(1);}33%{transform:scaleY(1.12) scaleX(.93);}66%{transform:scaleY(.93) scaleX(1.09);}}
@keyframes aiLoad{0%,100%{opacity:.2;}50%{opacity:1;}}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
@keyframes sweep{from{width:0;}to{width:100%;}}
/* CLASSES */
.gg{animation:gGold 2s ease-in-out infinite;color:var(--gold);}
.gn{animation:gGreen 2s ease-in-out infinite;color:var(--green);}
.gc{animation:gCyan 2s ease-in-out infinite;color:var(--cyan);}
.sup{animation:sup .38s ease-out both;}
.pop{animation:pop .48s cubic-bezier(.34,1.56,.64,1) both;}
.shk{animation:shk .45s;}
.tdb{animation:tdb .65s ease-in-out 3;}
.fire{animation:fire 1.35s ease-in-out infinite;display:inline-block;}
.d1{animation:deal .3s .04s ease-out both;}.d2{animation:deal .3s .09s ease-out both;}
.d3{animation:deal .3s .14s ease-out both;}.d4{animation:deal .3s .19s ease-out both;}
.d5{animation:deal .3s .24s ease-out both;}.d6{animation:deal .3s .29s ease-out both;}
.xp{animation:xpulse .55s ease-in-out 5;}
.cp{animation:cpulse .55s ease-in-out 5;}
.aib{animation:aiLoad 1s ease-in-out infinite;}
.fi{animation:fi .45s ease-out both;}
@keyframes cardTap{0%{transform:scale(.93) translateY(3px);filter:brightness(2.2);}60%{transform:scale(1.04) translateY(-2px);}100%{transform:none;filter:none;}}
/* CARDS */
.card{cursor:pointer;transition:transform .13s,box-shadow .13s;user-select:none;
  border-radius:8px;display:flex;flex-direction:column;flex-shrink:0;
  width:88px;min-height:130px;overflow:hidden;border:2px solid;position:relative;}
.card:hover:not(.dis){transform:translateY(-14px) scale(1.06);z-index:5;}
.card.sel{transform:translateY(-20px) scale(1.08)!important;animation:selCard .8s ease-in-out infinite;z-index:10;}
.card.tap{animation:cardTap .18s ease-out!important;}
.card.bon{border-color:var(--purple)!important;box-shadow:0 0 20px rgba(204,68,255,.55)!important;}
.card.dis{opacity:.32;cursor:not-allowed;}
/* BUTTONS */
.btn{font-family:'Press Start 2P',monospace;padding:12px 18px;cursor:pointer;border:2px solid;text-transform:uppercase;transition:all .11s;letter-spacing:.06em;border-radius:4px;position:relative;top:0;line-height:1.5;}
.btn:hover:not(:disabled):not(.bm){top:-2px;filter:brightness(1.2);}
.btn:active:not(:disabled):not(.bm){top:3px;}
.btn:disabled,.bm{cursor:not-allowed;}
.bg{background:#001600;color:var(--green);border-color:var(--green);box-shadow:0 5px 0 #003000;font-size:10px;}
.bg:hover:not(:disabled){background:#002500;box-shadow:0 5px 0 #004200,0 0 18px rgba(0,255,136,.2);}
.bo{background:#160f00;color:var(--gold);border-color:var(--gold);box-shadow:0 5px 0 #362600;font-size:10px;}
.bo:hover:not(:disabled){background:#1f1500;box-shadow:0 5px 0 #463400,0 0 18px rgba(255,215,0,.2);}
.br{background:#160000;color:var(--danger);border-color:var(--danger);box-shadow:0 5px 0 #340000;font-size:10px;}
.br:hover:not(:disabled){background:#220000;box-shadow:0 5px 0 #460000,0 0 18px rgba(255,36,36,.2);}
.bp{background:#110020;color:var(--purple);border-color:var(--purple);box-shadow:0 5px 0 #260048;font-size:10px;}
.bp:hover:not(:disabled){background:#180030;box-shadow:0 5px 0 #340060,0 0 18px rgba(204,68,255,.2);}
.bm{background:#08071a;color:#28264a;border-color:#18162e;font-size:9px;}
.bsnap{background:#200b00;color:var(--orange);border-color:var(--orange);box-shadow:0 5px 0 #501c00;animation:snapPulse 1.5s infinite;font-size:10px;}
.bsnap:hover:not(:disabled){background:#300f00;box-shadow:0 5px 0 #6a2400,0 0 20px rgba(255,102,51,.3);}
.bsnap:active:not(:disabled){top:3px;}
/* HUD */
.hud{background:linear-gradient(135deg,#09061a,#0d0b22);border-bottom:2px solid var(--bdr);padding:9px 14px;position:relative;z-index:10;}
.hud::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.35;}
/* FIELD BAR */
.fbwrap{padding:6px 12px 5px;background:var(--bg);}
.fbar{height:14px;background:#0a091c;border:1px solid var(--bdr);border-radius:3px;overflow:hidden;}
.fbfill{height:100%;background:linear-gradient(90deg,var(--green),#77ff44);transition:width .7s cubic-bezier(.25,.46,.45,.94);box-shadow:0 0 10px rgba(0,255,136,.42);border-radius:2px;}
/* MISC */
.scrollx{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;padding-right:28px;scroll-padding-right:28px;}
.scrollx::-webkit-scrollbar{height:3px;}
.scrollx::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px;}
.scrollx-wrap{position:relative;overflow:hidden;}
.scrollx-wrap::after{content:'';position:absolute;right:0;top:0;bottom:6px;width:36px;background:linear-gradient(to right,transparent,var(--bg));pointer-events:none;z-index:2;}
.plog{max-height:58px;overflow-y:auto;scrollbar-width:thin;}
.tab-row{display:flex;border-bottom:2px solid var(--bdr);background:var(--bg);}
.tab{flex:1;padding:10px 3px;cursor:pointer;background:transparent;border:none;border-bottom:3px solid transparent;font-family:'Press Start 2P',monospace;font-size:5.5px;text-transform:uppercase;transition:all .15s;color:var(--muted);letter-spacing:.04em;margin-bottom:-2px;}
.tab.on{background:rgba(0,212,255,.05);border-bottom-color:var(--cyan);color:var(--cyan);}
.aib2{border-radius:6px;padding:10px 12px;margin:4px 12px;}
.acm{background:#030c03;border:1px solid rgba(0,255,136,.18);}
.adc{background:#0c0420;border:1px solid rgba(204,68,255,.22);}

/* ── RICH CARD SYSTEM ── */
.card{min-height:148px;width:96px;}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:400% 0;}}
.card.shimmer::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.11) 50%,transparent 65%);background-size:200% 100%;animation:shimmer 4s ease-in-out infinite;pointer-events:none;border-radius:6px;z-index:1;}
/* SCHEME CARDS */
.schm{cursor:pointer;border:2px solid;border-radius:10px;padding:13px 11px;transition:all .15s;position:relative;overflow:hidden;background:var(--bg2);}
.schm:hover:not(.dis){transform:translateY(-3px);filter:brightness(1.12);}
.schm.sch-sel{transform:translateY(-3px);}
/* SIDE SELECTOR */
.side-opt{flex:1;cursor:pointer;border:2px solid;border-radius:10px;padding:18px 10px;text-align:center;transition:all .15s;background:var(--bg2);}
.side-opt:hover{transform:translateY(-2px);filter:brightness(1.1);}
.side-opt.act{transform:translateY(-2px);}
/* DEFENSE CARD LIST */
.dcard{cursor:pointer;border:2px solid;border-radius:8px;padding:10px 12px;transition:all .12s;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;margin-bottom:7px;}
.dcard:hover:not(.dis){transform:translateX(3px);filter:brightness(1.08);}
.dcard.sel{border-left-width:4px;}
.dcard.dis{opacity:.35;cursor:not-allowed;}
/* DEF MODE BADGE */
.def-badge{background:linear-gradient(135deg,#800000,#cc0000);color:#fff;font-family:'Press Start 2P',monospace;font-size:5.5px;padding:3px 7px;border-radius:3px;letter-spacing:.1em;}
.off-badge{background:linear-gradient(135deg,#003300,#006600);color:var(--green);font-family:'Press Start 2P',monospace;font-size:5.5px;padding:3px 7px;border-radius:3px;letter-spacing:.1em;}
/* DEF GRID — now a visual football field */
.defgrid{background:#06040e;border:1px solid;border-radius:10px;overflow:hidden;}
@keyframes playerPop{0%{transform:scale(0) rotate(-10deg);opacity:0;}70%{transform:scale(1.2) rotate(3deg);}100%{transform:scale(1) rotate(0deg);opacity:1;}}
@keyframes losPulse{0%,100%{opacity:.4;}50%{opacity:1;}}
@keyframes turfShimmer{0%,100%{opacity:.015;}50%{opacity:.04;}}
@keyframes flashIn{0%{opacity:0;}100%{opacity:1;}}
@keyframes flashPop{0%{transform:scale(.5);opacity:0;}60%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ===== GAME DATA =====
const CARDS=[
  {id:'slant',     name:'SLANT',      type:'ROUTE',  icon:'↗',bg:'#0c1130',bd:'#2255cc',sv:['Cover 3','Cover 4','Man Free'],wv:['Cover 0','Cover 1'],          d:'Quick slant inside. Beats zone, tough vs tight man.',r:1,cost:2},

  {id:'out_route', name:'OUT ROUTE',  type:'ROUTE',  icon:'↪',bg:'#0c1130',bd:'#2255cc',sv:['Cover 2','Cover 3','Cover 4'],wv:['Cover 0','Cover 1'],          d:'Out route to sideline. Beats squatting Cover 2 corners.',r:1,cost:2},

  {id:'zone_read', name:'ZONE READ',  type:'RUN',    icon:'◎',bg:'#160800',bd:'#cc5522',sv:['Cover 4','Cover 3','Man Free'],wv:['Cover 0','Cover 1'],         d:'QB reads unblocked DE. Cornerstone of spread offense.',r:2,cost:3},
  {id:'power',     name:'POWER',      type:'RUN',    icon:'P',bg:'#160800',bd:'#883322',sv:['Cover 4','Cover 3'],           wv:['Cover 0','Cover 2'],          d:'FB lead power. Old-school grind vs soft zones.',r:1,cost:2},
  {id:'toss',      name:'TOSS',       type:'RUN',    icon:'T',bg:'#160800',bd:'#cc5522',sv:['Cover 4','Cover 2'],           wv:['Cover 0','Cover 1'],          d:'Perimeter toss sweep. Get the back to the edge.',r:2,cost:3},
  {id:'qb_sneak',  name:'QB SNEAK',   type:'RUN',    icon:'Q',bg:'#160800',bd:'#aa4411',sv:['Cover 4','Cover 2','Cover 3'],wv:['Cover 0','Cover 1'],           d:'Short yardage. Soft zones give you the pile.',r:1,cost:1},
  {id:'rb_screen', name:'RB SCREEN',  type:'SCREEN', icon:'S',bg:'#001810',bd:'#22cc88',sv:['Cover 0','Cover 1'],          wv:['Cover 4','Cover 3'],           d:'RB flat screen. The antidote to any blitz.',r:2,cost:3},
  {id:'tunnel_scr',name:'TUNNEL SCR', type:'SCREEN', icon:'T',bg:'#001810',bd:'#22aa77',sv:['Cover 0','Cover 1','Man Free'],wv:['Cover 4'],                   d:'WR with OL blockers. Turns the edge on blitzers.',r:2,cost:3},
  {id:'wr_screen', name:'WR SCREEN',  type:'SCREEN', icon:'B',bg:'#001810',bd:'#22cc88',sv:['Cover 0','Cover 1'],          wv:['Cover 4','Cover 3'],           d:'Bubble screen. Every single time vs the blitz.',r:3,cost:4},

const CVR={
  // Each coverage has multiple formation variants that rotate play-to-play.
  // Smart Football principle: defenses disguise and shift — reading the shell
  // is harder than it looks. The hint is a starting point, not a cheat code.

      [[null,null,'S',null,null],['CB',null,null,null,'CB'],[null,'LB','MLB','LB',null],['DE','DT','DT','DT','DE']],
      [[null,null,'S',null,null],['CB','CB',null,'CB','CB'],[null,'MLB',null,null,null],['DE','DT','DT','DT','DE']],

  'Cover 2':{label:'COVER 2',color:'#ffd700',blitz:false,bb:0,
    desc:'Two safeties split at the hashes. Corners squat the flats. Deep sidelines are tight.',

const byId=id=>CARDS.find(c=>c.id===id);
const shuf=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;};
function drawN(deck,disc,n){let d=[...deck],p=[...disc],dr=[];for(let i=0;i<n;i++){if(!d.length){d=shuf(p);p=[];}if(d.length)dr.push(d.pop());}return{drawn:dr,deck:d,discard:p};}

function resolve(card,def,bufs,pCards){
  const by={slant:8,cross:10,seam:14,corner_rte:16,go_route:20,flat:6,mesh:11,shallow_x:9,drag:7,pick_route:12,post:15,out_route:8,draw:6,zone_read:8,power:5,toss:9,qb_sneak:3,rb_screen:11,tunnel_scr:10,wr_screen:14};
  const base=by[card.id]||6;
  const isWeak=def.weak&&def.weak.includes(card.id);
  const wk=(card.wv||[]).includes(def.label);
  // weakStrength: how reliably this card exploits this coverage (Smart Football: not all exploits are equal)
  const weakConf=isWeak?(def.weakStrength&&def.weakStrength[card.id]!=null?def.weakStrength[card.id]:0.8):0;
  // exploit fires based on confidence — less predictable, more realistic
  const ex=isWeak&&Math.random()<weakConf;
  let mult=1,bonus=0,result='NEUTRAL',label='GAIN',desc='';
  if(ex){
    // exploit multiplier — higher confidence cards get bigger ceiling
    mult=1.6+Math.random()*(weakConf>0.85?0.65:0.45);
    result='EXPLOIT';label='EXPLOITED!';
    const explDescriptions={
      slant:'Slant beats the zone leverage. DB is caught in a trail.',
      cross:'Cross forces the safety to split — picked the wrong side.',
      seam:'Seam splits the safeties. Nobody home in the deep middle.',
      corner_rte:'Corner route high-lows the CB. Can\'t cover both levels.',
      go_route:'Vertical against zero help. Win the one-on-one.',
      flat:'Flat hits the void before the zone can rotate.',
      mesh:'Mesh creates traffic. Man coverage can\'t follow both crossers.',
      shallow_x:'Shallow X finds the curl-flat void. LBs can\'t get there.',
      drag:'Drag catches the linebacker in a mismatch. Too slow.',
      pick_route:'Natural rub frees the receiver clean. Trail man has nowhere to go.',
      post:'Post splits the two deep zones. Perfect window.',
      out_route:'Out route hits behind the squatting corner. Timing route works.',
      draw:'Draw catches them in pass rush mode. Lane opens wide.',
      zone_read:'Zone read freezes the unblocked end. QB takes the crease.',
      power:'Power behind the lead blocker — eight-man box wasn\'t tight enough.',
      toss:'Toss sweeps the edge. Safety is too deep to help.',
      qb_sneak:'QB sneak catches the soft zone off guard. One yard, taken.',
      rb_screen:'Screen against the blitz — they sent everyone and you used it against them.',
      wr_screen:'WR screen vs the all-out pressure. Blockers outnumber the defense.',
      tunnel_scr:'Tunnel screen turns the edge. Pressure becomes a blocker.',
      jet_motion:'Motion pre-snap IDs the man coverage. Now you know exactly where to attack.',
      pick_route2:'The pick route sets up a clean rub. DB lost in traffic.',
    };
    desc=explDescriptions[card.id]||card.name+' exploits the gap in '+def.label+'.';
  } else if(wk){
    mult=.1+Math.random()*.22;result='COVERED';label='COVERED!';
    const covDescriptions={
      go_route:'Safety has deep help. Go route is bracketed.',
      power:'Eight men in the box. No room to run.',
      draw:'They\'re in a soft zone, but linebacker read the delay perfectly.',
      slant:'Press technique disrupts the release. Timing is gone.',
      flat:'Corner sitting on the flat. Nowhere to throw.',
    };
    desc=covDescriptions[card.id]||def.label+' takes away '+card.name+'. Wrong call.';
  } else {
    mult=.72+Math.random()*.52;
    const neutralDescriptions=['Solid execution but no real advantage.','Gain, but nothing broken open.','Competed for it. Got what was there.','Clean play. Yards earned the hard way.','Coverage holds but they can\'t stop everything.'];
    desc=neutralDescriptions[Math.floor(Math.random()*neutralDescriptions.length)];
  }
  // Screens vs blitz — Leach gospel (mathematical certainty)
  if(def.blitz){
    if(card.type==='SCREEN'){bonus+=def.bb+15;result='EXPLOIT';label='🔥 BLITZ TORCHED!';desc='Screen against the all-out blitz. Numbers advantage. They sent everyone.';}
    else if(card.type==='ROUTE'&&!ex)bonus-=3;
  }
  // Motion IDs man coverage — Smart Football: looking middle-of-field first
  if(bufs.motion&&card.type==='ROUTE'){bonus+=5;if(result==='NEUTRAL'){result='EXPLOIT';label='MOTION EXPLOIT!';desc='Pre-snap motion exposed the coverage. The QB saw it and attacked it.';}}
  // Play action ONLY works if you've run the ball (Leach principle — Smart Football)
  if(bufs.pa&&card.type==='ROUTE'){if(bufs.cr>=1){bonus+=8;desc+=' Play action froze the LBs.';}else{bonus+=2;desc+=' PA with no run game — LBs didn\'t bite.';}}
  if(bufs.rpo)bonus+=4;
  // Run streak opens passing lanes (Smart Football: establishing run changes eyes)
  const crB=bufs.cr>=3?8:bufs.cr>=2?4:0;
  if(crB>0&&card.type==='ROUTE'){bonus+=crB;desc+=' Run game moved the safeties up.';}
  // Pass streak invites run blitz
  if(bufs.cp>=3&&card.type==='RUN'){mult*=1.4;desc+=' Box was empty — they had to respect the pass.';}
  if(bufs.down===4)mult*=1.22;
  (pCards||[]).forEach(p=>{
    if(p.trait==='BURNER'&&(card.type==='SCREEN'||card.id==='go_route'))bonus+=6;
    if(p.trait==='ROUTE IQ'&&['cross','mesh','drag','shallow_x'].includes(card.id))bonus+=4;
    if(p.trait==='YAC BEAST'&&(card.type==='RUN'||card.type==='SCREEN'))bonus+=4;
    if(p.trait==='JUMP BALL'&&['seam','drag','corner_rte','post'].includes(card.id))bonus+=5;
    if(p.trait==='ESCAPE'&&card.type==='RUN')bonus+=5;
  });
  // Daily player boost (trait-based)
  if(bufs.playerBoost){
    const pb=bufs.playerBoost;
    if(pb.trait==='BURNER'&&(card.type==='SCREEN'||card.id==='go_route'))bonus+=6;
    if(pb.trait==='ROUTE IQ'&&['cross','mesh','drag','shallow_x'].includes(card.id))bonus+=4;
    if(pb.trait==='YAC BEAST'&&(card.type==='RUN'||card.type==='SCREEN'))bonus+=4;
    if(pb.trait==='JUMP BALL'&&['seam','drag','corner_rte','post'].includes(card.id))bonus+=5;
    if(pb.trait==='ESCAPE'&&card.type==='RUN')bonus+=5;
    // Custom card boosts (non-trait players)
    if(pb.boostCards&&pb.boostCards.includes(card.id))bonus+=pb.boostYards||5;
  }
  // Score chain momentum bonus
  if(bufs.chainBonus&&bufs.chainBonus>0)bonus+=bufs.chainBonus;
  // Apply offense scheme bonuses
  if(bufs.offScheme){
    const sch=bufs.offScheme;
    if(sch.id==='spread_opt'){
      if(card.id==='zone_read'||card.id==='rpo')bonus+=12;
      else if(card.type==='RUN')bonus+=3;
    }else if(sch.id==='lightning_tempo'){
      if(card.id==='tempo')bonus+=0; // handled in draw
      const ct=bufs.consecutive||0;
      if(ct>=2)bonus+=ct*2;
    }else if(sch.id==='vertical_threat'){
      if(['go_route','seam','post','corner_rte'].includes(card.id))bonus+=8;
      if(sch.bonus.paAuto&&card.type==='ROUTE')bonus+=5;
    }else if(sch.id==='triple_option'){
      if(card.type==='RUN'){bonus+=5;if(bufs.cr>=3)bonus+=18;}
      if(bufs.motionOn&&card.type==='RUN')bonus+=3; // motion free
    }
  }
  let yards=Math.round(base*mult+bonus);yards=Math.max(-5,Math.min(yards,65));
  let turnover=false;
  // Go route INT — reduced confidence when motion active (pre-snap ID helps)
  if(card.id==='go_route'&&wk&&Math.random()<(bufs.motion?.12:.28)){yards=0;turnover=true;result='TURNOVER';label='INTERCEPTED!';desc='Safety had deep help and undercut the route. Film study would have caught this.';}
  if(card.type==='RUN'&&result==='COVERED'&&Math.random()<.07){yards=-3;turnover=true;result='TURNOVER';label='FUMBLE!';desc='Ball stripped in the backfield. Covered run play with penetration.';}
  return{yards,result,label,desc,turnover};
}

async function ai(prompt,sys,fallbackKey){

    const r=await fetch('/api/commentary',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:110,
        system:sys||'College football AI. Punchy, specific, 2 sentences max.',
        messages:[{role:'user',content:prompt}]})

    const d=await r.json();

const SND=(()=>{
  let ctx=null;
  const ac=()=>{if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();return ctx;};
  const tone=(f,dur,type,vol,t0)=>{
    try{const c=ac(),now=c.currentTime,o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type=type||'square';o.frequency.value=f;
      g.gain.setValueAtTime(vol||.1,now+(t0||0));
      g.gain.exponentialRampToValueAtTime(0.001,now+(t0||0)+dur);
      o.start(now+(t0||0));o.stop(now+(t0||0)+dur+.02);}catch(e){}};
  const noise=(dur,vol,t0)=>{
    try{const c=ac(),sr=c.sampleRate,buf=c.createBuffer(1,Math.floor(sr*dur),sr),data=buf.getChannelData(0);
      for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;
      const s=c.createBufferSource(),g=c.createGain();s.buffer=buf;s.connect(g);g.connect(c.destination);
      g.gain.setValueAtTime(vol||.1,c.currentTime+(t0||0));
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+(t0||0)+dur);
      s.start(c.currentTime+(t0||0));}catch(e){}};
  return{
    click:()=>{tone(440,.06,'square',.08);tone(880,.04,'square',.05,.05);},
    hover:()=>tone(660,.04,'square',.04),
    cardPick:()=>{tone(330,.04,'square',.1);tone(550,.05,'square',.12,.05);tone(880,.1,'square',.14,.1);},
    select:()=>{tone(523,.05,'triangle',.1);tone(659,.07,'triangle',.11,.06);},
    snap:()=>{noise(.12,.28);tone(80,.2,'sawtooth',.22,.02);tone(160,.1,'sawtooth',.14,.08);},
    exploit:()=>{
      [330,440,550,660,880,1100].forEach((f,i)=>tone(f,.1+i*.02,'square',.12+i*.01,i*.07));
      tone(1320,.45,'square',.2,.46);},
    covered:()=>{[440,330,275,220,165].forEach((f,i)=>tone(f,.16,'sawtooth',.15-i*.02,i*.11));},
    td:()=>{// Classic Blitz-style TD fanfare
      [523,659,784,1047,784,659,784,1047,1319].forEach((f,i)=>tone(f,.18,'square',.18,i*.1));
      [65,98,130,196].forEach((f,i)=>tone(f,.22,'sawtooth',.14,i*.18));},
    turnover:()=>{[330,247,196,147,110].forEach((f,i)=>tone(f,.2,'sawtooth',.18-i*.02,i*.13));noise(.3,.07,.6);tone(55,.55,'sawtooth',.15,.7);},
    blitz:()=>{noise(.14,.32);
      [110,165,220,330,440,660,880,1320].forEach((f,i)=>tone(f,.16,'square',.2,i*.04));
      tone(1760,.65,'square',.22,.4);
      [523,659,784,1047].forEach((f,i)=>tone(f,.2,'triangle',.14,.55+i*.1));},
    coin:()=>{tone(880,.05,'triangle',.1);tone(1320,.13,'triangle',.12,.06);},
    buy:()=>{[523,659,784].forEach((f,i)=>tone(f,.1,'triangle',.12,i*.07));},

    drive:()=>{[196,247,330].forEach((f,i)=>tone(f,.16,'sawtooth',.12,i*.09));tone(440,.5,'square',.14,.32);},

function defResolve(defCard,offCard,defScheme){
  const counters=defCard.counters||[],exposed=defCard.exposedBy||[];
  const isCounter=counters.includes(offCard.id),isExposed=exposed.includes(offCard.id);
  const byBase={slant:8,cross:10,seam:14,corner_rte:16,go_route:20,flat:6,mesh:11,shallow_x:9,drag:7,pick_route:12,post:15,out_route:8,draw:6,zone_read:8,power:5,toss:9,qb_sneak:3,rb_screen:11,tunnel_scr:10,wr_screen:14,play_action:0,rpo:5};
  const base=byBase[offCard.id]!==undefined?byBase[offCard.id]:7;
  let yards,result,label,desc;
  if(isCounter){
    yards=Math.floor(Math.random()*3);result='STOP';label='STUFFED!';
    desc=defCard.name+' takes away '+offCard.name+'. Perfect read.';
  }else if(isExposed){
    yards=Math.round(base*(1.4+Math.random()*.7));yards=Math.min(yards,65);
    result='EXPLOIT';label='🔥 EXPOSED!';
    desc=offCard.name+' attacks the void left by '+defCard.name+'. Wrong call.';
  }else{
    yards=Math.round(base*(.5+Math.random()*.45));
    result='NEUTRAL';label='GAIN';
    desc='Neither side gained a decisive advantage.';
  }
  if(defScheme){
    if((defScheme.strongVs||[]).includes(offCard.id)){yards=Math.max(0,yards-4);if(result==='NEUTRAL'&&yards<=2){result='STOP';label='SCHEME HOLDS!';}}
    if((defScheme.weakVs||[]).includes(offCard.id)){yards+=5;if(result==='NEUTRAL'&&yards>=10){result='EXPLOIT';label='SCHEME EXPOSED!';}}
  }
  return{yards,result,label,desc,offCard};
}

  function makePlayerDot(abbr,isHighlight,isWarning){

    lbl.style.cssText='font-family:\'Press Start 2P\',monospace;font-size:4px;color:'+rc+';line-height:1;text-align:center;';

  // ── LINE OF SCRIMMAGE ──
  const los=document.createElement('div');
  los.style.cssText='position:relative;z-index:2;display:flex;align-items:center;gap:6px;margin:8px 0;';

  // ── OFFENSE FORMATION (below LOS) ──
  // Fixed 9-column grid — every row has 9 slots (0-8).
  // OL always cols 2-6. Col 4 = center axis.
  // null = empty slot (rendered as spacer, not a dot).
  const cardType=picked?picked.type:null;
  const cardId=picked?picked.id:null;

  const OF={
    //        0      1      2     3     4     5     6      7      8
    // SHOTGUN 2×2 SPREAD + RB offset (most common college/modern)
    SG_4WR:{rows:[
      ['WR',  null,  null, null, null, null, null,  null, 'WR'],

      [null,  null,  'LT', 'LG', 'C',  'RG', 'RT',  null,  null],
      [null,  null,  null, null, null, 'RB', null,  null,  null],
      [null,  null,  null, null, 'QB', null, null,  null,  null],
    ],label:'SHOTGUN · 4 WR'},

    // EMPTY 5-WIDE (no backs): all 5 receivers spread

      [null,  null,  'LT', 'LG', 'C',  'RG', 'RT',  null,  null],
      [null, 'WR',   null, null, 'QB', null, null,  null,  null],
    ],label:'EMPTY · 5 WIDE'},

    // TRIPS RIGHT (3 WRs right, 1 WR left) + RB
    TRIPS_R:{rows:[
      ['WR',  null,  null, null, null, null, null,  null,  null],
      [null,  null,  'LT', 'LG', 'C',  'RG', 'RT',  null,  null],
      [null,  null,  null, null, null, null, null, 'WR',   'WR'],
      [null,  null,  null, null, null, null, null, 'WR',   null],
      [null,  null,  null, 'RB', 'QB', null, null,  null,  null],
    ],label:'TRIPS RIGHT'},

    // TRIPS LEFT (3 WRs left, 1 WR right) + RB
    TRIPS_L:{rows:[
      [null,  null,  null, null, null, null, null,  null, 'WR'],
      ['WR', 'WR',   null, null, null, null, null,  null,  null],
      ['WR',  null,  null, null, null, null, null,  null,  null],
      [null,  null,  'LT', 'LG', 'C',  'RG', 'RT',  null,  null],
      [null,  null,  null, null, 'QB', 'RB', null,  null,  null],
    ],label:'TRIPS LEFT'},

    // ACE / SINGLEBACK with TE attached right + 3 WRs
    ACE_TE:{rows:[
      ['WR',  null,  null, null, null, null, null,  null, 'WR'],
      [null,  null,  'LT', 'LG', 'C',  'RG', 'RT', 'TE',  null],
      [null, 'WR',   null, null, null, null, null,  null,  null],
      [null,  null,  null, null, 'QB', 'RB', null,  null,  null],
    ],label:'ACE · TE RIGHT'},

    // I-FORMATION under center: QB under C, FB then RB stacked
    I_FORM:{rows:[
      ['WR',  null,  null, null, null, null, null,  null, 'WR'],
      [null,  null, 'TE',  'LT', 'LG', 'C',  'RG', 'RT',  null],
      [null,  null,  null, null, 'QB', null, null,  null,  null],
      [null,  null,  null, null, 'FB', null, null,  null,  null],
      [null,  null,  null, null, 'RB', null, null,  null,  null],
    ],label:'I · FORMATION'},

    // STRONG I: TE left, FB offset, RB offset
    STRONG_I:{rows:[
      ['WR',  null,  null, null, null, null, null,  null, 'WR'],
      [null,  null, 'TE',  'LT', 'LG', 'C',  'RG', 'RT',  null],
      [null,  null,  null, null, 'QB', null, null,  null,  null],
      [null,  null,  null, 'FB', null, 'RB', null,  null,  null],
    ],label:'STRONG I'},

    // SPREAD ZONE READ: shotgun, 3 WRs + TE left, RB beside QB
    SPREAD_ZONE:{rows:[
      ['WR',  null,  null, null, null, null, null,  null, 'WR'],
      [null,  null, 'TE',  'LT', 'LG', 'C',  'RG', 'RT',  null],
      [null, 'WR',   null, null, null, null, null,  null,  null],

    GL:{rows:[

      ['WR',  null,  null, null, 'QB', null, null,  null,  null],
      [null,  null,  null, 'FB', null, 'RB', null,  null,  null],
    ],label:'GOAL LINE'},
  };

  function pickFmt(){
    if(!picked) return OF.SG_4WR;
    if(cardType==='RUN'){
      if(cardId==='qb_sneak') return OF.GL;
      if(cardId==='toss')     return OF.STRONG_I;
      if(cardId==='zone_read')return OF.SPREAD_ZONE;
      if(cardId==='draw')     return OF.SG_4WR;
      return OF.I_FORM;
    }
    if(cardType==='SCREEN'){
      if(cardId==='wr_screen'||cardId==='tunnel_scr') return OF.TRIPS_L;
      return OF.ACE_TE;
    }
    if(cardType==='MOTION'){
      if(cardId==='orbit') return OF.PISTOL;
      return OF.TRIPS_R;
    }
    if(cardType==='MODIFIER'){
      if(cardId==='play_action') return OF.PISTOL;
      return OF.SG_4WR;
    }
    if(cardType==='PLAYER') return OF.SG_4WR;
    // ROUTE
    if(cardId==='mesh'||cardId==='cross'||cardId==='shallow_x') return OF.EMPTY;
    if(cardId==='seam'||cardId==='drag'||cardId==='post')        return OF.ACE_TE;
    if(cardId==='flat'||cardId==='out_route'||cardId==='pick_route') return OF.TRIPS_R;
    if(cardId==='go_route'||cardId==='corner_rte') return OF.SG_4WR;
    return OF.SG_4WR;

      const lbl=document.createElement('div');

      lbl.textContent=role;
      dot.appendChild(lbl); rw.appendChild(dot);

  field.appendChild(fmtLbl);

  wrap.appendChild(field);

  // ── INFO BAR ──
  const info=document.createElement('div');

  descTxt.textContent=def.desc;info.appendChild(descTxt);
  const hintTxt=document.createElement('div');hintTxt.style.cssText='font-size:12.5px;font-weight:700;line-height:1.5;';
  if(showHintText){hintTxt.style.color='var(--gold)';hintTxt.textContent='📡 '+def.hint;}
  else if(hintLevel===1){hintTxt.style.color='#3e3c60';hintTxt.textContent='📡 Run a play to read the tendency...';}

  info.appendChild(hintTxt);
  wrap.appendChild(info);

  return wrap;
}


function fieldBar(pos){

// ===== STREAK SYSTEM =====
function todayStr(){return new Date().toISOString().slice(0,10);}
function getStreak(){
  try{const s=JSON.parse(localStorage.getItem('torch_streak')||'{}');
    return{count:s.count||0,lastDate:s.lastDate||null};}
  catch(e){return{count:0,lastDate:null};}
}
function bumpStreak(){
  const s=getStreak(),today=todayStr();
  if(s.lastDate===today)return s.count;
  const yest=new Date(Date.now()-864e5).toISOString().slice(0,10);
  const nc=(s.lastDate===yest)?s.count+1:1;
  try{localStorage.setItem('torch_streak',JSON.stringify({count:nc,lastDate:today}));}catch(e){}
  return nc;
}
function hasPlayedToday(){return getStreak().lastDate===todayStr();}
// Hint unlock: players earn film-room access by building a streak
// 0 = locked (< 3 days): learn by doing, no spoilers
// 1 = partial (3–6 days): hint text reveals after you've played a down
// 2 = unlocked (7+ days): full hints shown from pre-snap
function getHintLevel(){const s=getStreak();if(s.count>=7)return 2;if(s.count>=3)return 1;return 0;}

function getScenario(offset){
  const seed=Math.floor(Date.now()/(1000*60*60*24))+(offset||0);
  return SCENARIOS[seed%SCENARIOS.length];
}

// ===== FILM ROOM MODAL =====
function showFilmRoom(plays,defKey,isDefMode,defPlays){
  const def=CVR[defKey];
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.88);display:flex;align-items:flex-end;justify-content:center;';
  const sheet=document.createElement('div');
  sheet.style.cssText='background:linear-gradient(180deg,#0d0b22,#08061a);border-top:2px solid var(--purple);border-radius:16px 16px 0 0;padding:18px 16px 36px;max-height:88vh;overflow-y:auto;width:100%;max-width:430px;';
  // Header
  const hdr=document.createElement('div');
  hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;';
  hdr.innerHTML='<div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;color:var(--gold);letter-spacing:2px;">📽 FILM ROOM</div>';
  const closeBtn=document.createElement('button');closeBtn.className='btn bm';closeBtn.style.cssText='font-size:6px;padding:5px 9px;';closeBtn.textContent='✕ CLOSE';
  closeBtn.onclick=function(){document.body.removeChild(overlay);};
  hdr.appendChild(closeBtn);sheet.appendChild(hdr);
  // Coverage context card
  if(def){
    const dc=document.createElement('div');
    dc.style.cssText='margin-bottom:12px;padding:10px 12px;background:'+def.color+'0c;border:1px solid '+def.color+'33;border-radius:8px;';
    dc.innerHTML='<div style="font-family:\'Bebas Neue\',sans-serif;font-size:18px;color:'+def.color+';letter-spacing:1px;margin-bottom:3px;">DEFENSE: '+def.label+'</div>'+
      '<div style="font-size:12px;color:var(--muted);font-weight:700;line-height:1.5;margin-bottom:4px;">'+def.desc+'</div>'+
      '<div style="font-size:12px;color:var(--gold);font-weight:700;">📡 '+def.hint+'</div>';
    sheet.appendChild(dc);
  }
  // Play-by-play
  const plbl=document.createElement('div');plbl.style.cssText='font-family:\'Press Start 2P\',monospace;font-size:5px;color:var(--muted);letter-spacing:2px;margin-bottom:8px;';plbl.textContent='PLAY BY PLAY:';
  sheet.appendChild(plbl);
  const playsToShow=isDefMode?defPlays:plays;
  playsToShow.forEach(function(p,i){
    const result=isDefMode?p.result:p.res.result;
    const yards=isDefMode?p.yards:p.res.yards;
    const desc=isDefMode?p.desc:p.res.desc;
    const cardName=isDefMode?(p.defCard.name+' vs '+p.offCard.name):p.card.name;
    const isGood=result==='EXPLOIT'||result==='STOP';
    const isBad=result==='COVERED'||result==='TURNOVER'||(isDefMode&&result==='EXPLOIT');
    const rc=isGood?'var(--green)':isBad?'var(--danger)':'var(--cyan)';
    const row=document.createElement('div');
    row.style.cssText='margin-bottom:8px;padding:10px 12px;border-radius:8px;background:var(--bg2);border:1px solid '+(isGood?'rgba(0,255,136,.2)':isBad?'rgba(255,36,36,.2)':'var(--bdr)')+';';
    const rTop=document.createElement('div');rTop.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;';
    rTop.innerHTML='<div style="display:flex;align-items:center;gap:7px;">'+
      '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:16px;color:#fff;letter-spacing:.5px;">P'+(i+1)+' — '+cardName+'</div>'+
      '<div style="font-family:\'Press Start 2P\',monospace;font-size:4.5px;color:'+rc+';background:'+rc+'18;padding:2px 5px;border-radius:2px;">'+result+'</div>'+
      '</div>'+
      '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;color:'+rc+';letter-spacing:1px;">'+(yards>0?'+':'')+yards+'</div>';
    row.appendChild(rTop);
    const rDesc=document.createElement('div');rDesc.style.cssText='font-size:11px;color:var(--muted);font-weight:700;line-height:1.5;';rDesc.textContent=desc||'';
    row.appendChild(rDesc);
    // Coach's Note for COVERED/bad plays (offense only)
    if(!isDefMode&&(result==='COVERED'||result==='TURNOVER')&&def){
      const betterIds=(def.weak||[]).slice(0,3);
      const betterNames=betterIds.map(function(id){const c=byId(id);return c?c.name:id;}).filter(Boolean).slice(0,2);
      if(betterNames.length){
        const note=document.createElement('div');
        note.style.cssText='margin-top:7px;padding:7px 9px;background:rgba(255,215,0,.06);border-left:3px solid var(--gold);border-radius:0 5px 5px 0;';
        note.innerHTML='<div style="font-family:\'Press Start 2P\',monospace;font-size:4px;color:var(--gold);margin-bottom:3px;">COACH\'S NOTE</div>'+
          '<div style="font-size:11px;color:var(--gold);font-weight:700;">Better call: '+betterNames.join(' or ')+'</div>';
        row.appendChild(note);
      }
    }
    sheet.appendChild(row);
  });
  overlay.appendChild(sheet);
  document.body.appendChild(overlay);
  overlay.onclick=function(e){if(e.target===overlay)document.body.removeChild(overlay);};
}

  hright.innerHTML='<div style="font-family:\'Bebas Neue\',sans-serif;font-size:26px;color:var(--orange);line-height:1;">🔥'+streak.count+'</div>'+

  // ─── CONTENT AREA (swappable) ───
  const content=document.createElement('div');content.style.cssText='flex:1;overflow-y:auto;display:flex;flex-direction:column;';
  el.appendChild(content);

  function render_phase(){
    content.innerHTML='';

    // ── SETUP: side + scheme selection ──

      const wrap=document.createElement('div');wrap.style.cssText='padding:16px 14px;display:flex;flex-direction:column;gap:16px;';

// ===== ACTIONS =====
function doSelect(card){
  SND.select();
  if(GS.sel&&GS.sel.id===card.id){
    // Tapping the already-selected card deselects it
    GS=Object.assign({},GS,{sel:null});
    render();
  } else {
    GS=Object.assign({},GS,{sel:card});
    render();
  }
}

function doBuff(card){
  setGs(function(s){
    const idx=s.hand.findIndex(function(c){return c===card;});if(idx===-1)return s;
    const hand=[...s.hand];hand.splice(idx,1);
    let upd=Object.assign({},s,{hand:hand,disc:[...s.disc,card]});
    if(card.buff==='MOTION')upd.motionOn=true;
    if(card.buff==='PA')upd.paOn=true;
    if(card.buff==='RPO')upd.rpoOn=true;
    if(card.buff==='TEMPO'){const rr=drawN(upd.deck,upd.disc,1);upd.hand=[...upd.hand,...rr.drawn];upd.deck=rr.deck;upd.disc=rr.discard;}
    return upd;
  });
}

function doSnap(){
  const s=GS;if(!s.sel)return;
  SND.snap();
  const card=s.sel;
  const lastType=s.log.length>0?s.log[s.log.length-1].ctype:null;
  const consec=lastType===card.type?s.log.slice().reverse().findIndex(e=>e.ctype!==card.type):-1;
  const bufs={motion:s.motionOn,pa:s.paOn,rpo:s.rpoOn,cr:s.cr,cp:s.cp,down:s.down,offScheme:s.offScheme||null,consecutive:Math.max(0,consec)};
  const res=resolve(card,s.def,bufs,s.pCards);
  if(res.result==='EXPLOIT'||res.label.includes('BLITZ'))setTimeout(function(){if(res.label.includes('BLITZ'))SND.blitz();else SND.exploit();},150);
  else if(res.result==='COVERED')setTimeout(SND.covered,150);
  else if(res.result==='TURNOVER')setTimeout(SND.turnover,150);
  else setTimeout(SND.neutral,150);
  let newPos=Math.min(100,Math.max(0,s.pos+res.yards)),isTD=newPos>=100,isTO=res.turnover&&!isTD;
  let nd=s.down,dist=s.dist-res.yards;
  if(dist<=0&&!isTD){nd=1;dist=10;}else if(!isTO&&!isTD)nd=s.down+1;
  if(s.down===4&&dist>0&&!isTD){isTO=true;if(!res.label.includes('INTERCEPT')&&!res.label.includes('FUMBLE')){res.result='TURNOVER';res.label='TURNOVER ON DOWNS';res.desc='Fell short on 4th & '+s.dist+'. Turnover on downs.';}}
  const ncr=card.type==='RUN'?s.cr+1:0,ncp=['ROUTE','SCREEN'].includes(card.type)?s.cp+1:0;
  let hand=[...s.hand.filter(function(c){return c!==card;})],disc=[...s.disc,card],deck=[...s.deck];
  if(!isTD&&!isTO){const rr=drawN(deck,disc,1);hand=[...hand,...rr.drawn];deck=rr.deck;disc=rr.discard;}
  const logEntry={text:card.name+': '+(res.yards>0?'+':'')+res.yards+'y',name:card.name,yards:res.yards,result:res.result,ctype:card.type};
  // Flash drama before result
  const flashEl=document.createElement('div');
  const flashColor=isTD?'rgba(255,215,0,.35)':res.result==='EXPLOIT'?'rgba(0,255,136,.3)':res.result==='COVERED'?'rgba(255,36,36,.2)':'rgba(0,212,255,.15)';
  const yardsTxt=(res.yards>0?'+':'')+res.yards+' YDS';
  flashEl.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:'+flashColor+';backdrop-filter:blur(2px);pointer-events:none;animation:flashIn .08s ease-out;';
  flashEl.innerHTML='<div style="font-family:\'Bebas Neue\',sans-serif;font-size:72px;color:'+(isTD?'var(--gold)':res.result==='EXPLOIT'?'var(--green)':res.result==='COVERED'?'var(--danger)':'var(--text)')+';letter-spacing:4px;line-height:1;text-shadow:0 0 40px currentColor;animation:flashPop .15s ease-out;">'+yardsTxt+'</div>'+
    '<div style="font-family:\'Press Start 2P\',monospace;font-size:10px;color:rgba(255,255,255,.7);margin-top:8px;letter-spacing:2px;">'+(isTD?'TOUCHDOWN!':res.label)+'</div>';
  document.body.appendChild(flashEl);
  setTimeout(function(){if(flashEl.parentNode)flashEl.parentNode.removeChild(flashEl);},420);
  setTimeout(function(){
    setGs(Object.assign({},s,{pos:newPos,totalYards:s.totalYards+Math.max(0,res.yards),down:isTD||isTO?1:nd,dist:isTD||isTO?10:Math.max(1,dist),hand:hand,deck:deck,disc:disc,cr:ncr,cp:ncp,motionOn:false,paOn:false,rpoOn:false,sel:null,lastR:Object.assign({},res,{isTD:isTD,isTurnover:isTO,playedCard:card}),log:[...s.log,logEntry],screen:'result'}));
  },400);
}

function continueResult(){
  const s=GS;if(!s.lastR)return;
  const{isTD,isTurnover}=s.lastR;
  if(isTD){
    const ntds=s.tds+1,nc=s.coins+10;
    if(ntds>=5){setGs(Object.assign({},s,{tds:ntds,coins:nc,won:true,screen:'end'}));return;}
    setGs(Object.assign({},s,{tds:ntds,coins:nc,shop:shopPool(s.driveNum),screen:'shop'}));return;
  }
  if(isTurnover){
    const nl=s.lives-1;
    if(nl<=0){setGs(Object.assign({},s,{lives:0,screen:'end'}));return;}
    const nd=s.driveNum+1,def=CVR[DRIVES[nd%DRIVES.length]];
    const rr=drawN(s.deck,s.disc,4);
    setGs(Object.assign({},s,{lives:nl,driveNum:nd,def:def,down:1,dist:10,pos:20,hand:rr.drawn,deck:rr.deck,disc:rr.discard,cr:0,cp:0,motionOn:false,paOn:false,rpoOn:false,sel:null,screen:'intro'}));return;
  }
  setGs(function(s2){return Object.assign({},s2,{screen:'game'});});
}

}
function markOnboardingSeen(){
  try{localStorage.setItem('torch_seen','1');}catch(e){}
}

function buildOnboarding(){
  const slides=[
    {
      icon:'🏈',
      headline:'READ THE DEFENSE',
      body:'Every day you get a real scenario — a down, distance, and defensive coverage shell. Study it.',
      sub:'Cover 2? Cover 0 blitz? Man Free? Each one has a weakness.',
      color:'var(--cyan)',glow:'rgba(0,212,255,.3)'
    },
    {
      icon:'🃏',
      headline:'PICK YOUR PLAY',
      body:'Choose from 5 cards. Runs, routes, screens, motion. No yards shown — that\'s the game.',
      sub:'The right play against the right coverage explodes. The wrong one gets stuffed.',
      color:'var(--purple)',glow:'rgba(204,68,255,.3)'
    },
    {
      icon:'⚡',
      headline:'SNAP IT & FIND OUT',
      body:'Hit SNAP. AI commentary fires. Hidden yards reveal. Did you read it right?',
      sub:'Build a daily streak. Earn film-room hints. Become a football mind.',
      color:'var(--gold)',glow:'rgba(255,215,0,.3)'
    }
  ];
  let cur=0;
  const el=document.createElement('div');
  el.style.cssText='min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;background:radial-gradient(ellipse at 50% 20%,#1a0030 0%,var(--bg) 70%);';

  // logo
  const logo=document.createElement('div');
  logo.style.cssText='font-family:\'Bebas Neue\',sans-serif;font-size:52px;letter-spacing:10px;color:var(--gold);text-shadow:0 0 30px rgba(255,215,0,.5);margin-bottom:6px;';
  logo.textContent='TORCH';
  const logoSub=document.createElement('div');
  logoSub.style.cssText='font-family:\'Press Start 2P\',monospace;font-size:6px;color:var(--cyan);letter-spacing:4px;margin-bottom:32px;opacity:.7;';
  logoSub.textContent='THE FOOTBALL CARD GAME';
  el.append(logo,logoSub);

  // slide card
  const card=document.createElement('div');
  card.style.cssText='width:100%;max-width:380px;background:#0a0820;border-radius:16px;padding:32px 24px;text-align:center;border:2px solid var(--bdr);transition:opacity .2s;';
  el.appendChild(card);

  // dots
  const dotsRow=document.createElement('div');
  dotsRow.style.cssText='display:flex;gap:8px;justify-content:center;margin-top:24px;';
  const dots=slides.map(function(_,i){
    const d=document.createElement('div');
    d.style.cssText='width:8px;height:8px;border-radius:50%;background:'+(i===0?'var(--cyan)':'var(--bdr)')+';transition:background .2s;cursor:pointer;';
    d.onclick=function(){cur=i;refresh();};
    dotsRow.appendChild(d);return d;
  });
  el.appendChild(dotsRow);

  // nav buttons
  const nav=document.createElement('div');
  nav.style.cssText='display:flex;gap:10px;margin-top:20px;width:100%;max-width:380px;';

  const skipBtn=document.createElement('button');skipBtn.className='btn bm';
  skipBtn.style.cssText='flex:1;padding:12px;font-size:7px;opacity:.6;';
  skipBtn.textContent='SKIP';
  skipBtn.onclick=function(){SND.click();markOnboardingSeen();GS=null;render();};

  const nextBtn=document.createElement('button');nextBtn.className='btn bp';
  nextBtn.style.cssText='flex:2;padding:12px;font-size:8px;';
  nextBtn.textContent='NEXT →';

  nextBtn.onclick=function(){
    SND.click();
    if(cur<slides.length-1){cur++;refresh();}
    else{markOnboardingSeen();GS=null;render();}
  };
  nav.append(skipBtn,nextBtn);
  el.appendChild(nav);

  function refresh(){
    const s=slides[cur];
    const isLast=cur===slides.length-1;
    card.style.borderColor=s.color;
    card.style.boxShadow='0 0 40px '+s.glow;
    card.innerHTML=
      '<div style="font-size:64px;margin-bottom:18px;line-height:1;">'+s.icon+'</div>'+
      '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:38px;letter-spacing:3px;color:'+s.color+';line-height:1;margin-bottom:14px;">'+s.headline+'</div>'+
      '<div style="font-size:16px;color:var(--text);font-weight:700;line-height:1.6;margin-bottom:12px;">'+s.body+'</div>'+
      '<div style="font-size:13px;color:var(--muted);font-weight:600;line-height:1.5;">'+s.sub+'</div>';
    dots.forEach(function(d,i){d.style.background=i===cur?s.color:'var(--bdr)';});
    nextBtn.textContent=isLast?'LET\'S GO 🔥':'NEXT →';
    nextBtn.style.background=isLast?'linear-gradient(135deg,var(--orange),var(--gold))':'';
  }
  refresh();
  return el;
}

// ===== RENDER =====
function render(){
  root.innerHTML='';
  // First-launch onboarding gate
  if(!hasSeenOnboarding()&&(!GS||GS.screen==='title')){
    const ob=buildOnboarding();
    if(ob)root.appendChild(ob);
    root.scrollTop=0;
    return;
  }
  const scr=GS&&GS.screen||'title';
  let content;
  if(!GS||scr==='title')content=buildTitle();
  else if(scr==='daily')content=buildDaily();
  else if(scr==='intro')content=buildIntro();
  else if(scr==='game')content=buildGame();
  else if(scr==='result')content=buildResult();
  else if(scr==='shop')content=buildShop();
  else if(scr==='end')content=buildEnd();
  else content=buildTitle();
  if(content)root.appendChild(content);
  root.scrollTop=0;
}

render();

if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js');}
</script>
</body>
</html>
