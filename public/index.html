<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#07050e">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🔥 TORCH — The Football Card Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{
  --bg:#07050e;--bg2:#0d0b1e;--bg3:#131128;
  --cyan:#00d4ff;--gold:#ffd700;--green:#00ff88;
  --orange:#ff6633;--danger:#ff2424;--purple:#cc44ff;
  --text:#e8e4ff;--muted:#3e3c60;--bdr:#1c1930;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);width:100%;height:100%;}
body{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--text);display:flex;justify-content:center;}
#root{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative;}
.bn{font-family:'Bebas Neue',sans-serif;}
.px{font-family:'Press Start 2P',monospace;}
/* FIELD GRID BACKGROUND */
#root::before{content:'';position:fixed;inset:0;width:100%;max-width:430px;left:50%;transform:translateX(-50%);
  background-image:linear-gradient(rgba(0,212,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.018) 1px,transparent 1px);
  background-size:36px 36px;pointer-events:none;z-index:0;}
/* ANIMATIONS */
@keyframes gGold{0%,100%{text-shadow:0 0 14px var(--gold),0 0 40px rgba(255,215,0,.4);}50%{text-shadow:0 0 4px var(--gold);}}
@keyframes gCyan{0%,100%{text-shadow:0 0 12px var(--cyan),0 0 28px rgba(0,212,255,.32);}50%{text-shadow:0 0 3px var(--cyan);}}
@keyframes sup{from{transform:translateY(26px);opacity:0;}to{transform:none;opacity:1;}}
@keyframes pop{0%{transform:scale(.2);opacity:0;}65%{transform:scale(1.16);}100%{transform:scale(1);opacity:1;}}
@keyframes fire{0%,100%{transform:scaleY(1) scaleX(1);}33%{transform:scaleY(1.12) scaleX(.93);}66%{transform:scaleY(.93) scaleX(1.09);}}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
@keyframes deal{from{transform:translateY(50px) rotate(6deg);opacity:0;}to{transform:none;opacity:1;}}
@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:1;}}
/* CLASSES */
.gg{animation:gGold 2s ease-in-out infinite;color:var(--gold);}
.gc{animation:gCyan 2s ease-in-out infinite;color:var(--cyan);}
.sup{animation:sup .38s ease-out both;}
.pop{animation:pop .48s cubic-bezier(.34,1.56,.64,1) both;}
.fire{animation:fire 1.35s ease-in-out infinite;display:inline-block;}
.fi{animation:fi .45s ease-out both;}
.d1{animation:deal .3s .04s ease-out both;}.d2{animation:deal .3s .09s ease-out both;}
.d3{animation:deal .3s .14s ease-out both;}.d4{animation:deal .3s .19s ease-out both;}
/* BUTTONS */
.btn{font-family:'Press Start 2P',monospace;padding:12px 18px;cursor:pointer;border:2px solid;text-transform:uppercase;transition:all .11s;letter-spacing:.06em;border-radius:4px;position:relative;top:0;line-height:1.5;}
.btn:hover:not(:disabled){top:-2px;filter:brightness(1.2);}
.btn:active:not(:disabled){top:3px;}
.btn:disabled{cursor:not-allowed;opacity:.4;}
.bg{background:#001600;color:var(--green);border-color:var(--green);box-shadow:0 5px 0 #003000;font-size:10px;}
.bo{background:#160f00;color:var(--gold);border-color:var(--gold);box-shadow:0 5px 0 #362600;font-size:10px;}
.bp{background:#110020;color:var(--purple);border-color:var(--purple);box-shadow:0 5px 0 #260048;font-size:10px;}
.bm{background:#08071a;color:#28264a;border-color:#18162e;font-size:9px;cursor:default;}
.bsnap{background:#200b00;color:var(--orange);border-color:var(--orange);box-shadow:0 5px 0 #501c00;font-size:10px;}
/* SIDE SELECTOR */
.side-opt{flex:1;cursor:pointer;border:2px solid;border-radius:10px;padding:18px 10px;text-align:center;transition:all .15s;background:var(--bg2);}
.side-opt:hover{transform:translateY(-2px);filter:brightness(1.1);}
.side-opt.act{transform:translateY(-2px);}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ===== TORCH v0.7 =====

// ===== SOUND ENGINE =====
var SND=(function(){
  var ctx=null;
  function ac(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();return ctx;}
  function tone(f,dur,type,vol,t0){
    try{var c=ac(),now=c.currentTime,o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type=type||'square';o.frequency.value=f;
      g.gain.setValueAtTime(vol||.1,now+(t0||0));
      g.gain.exponentialRampToValueAtTime(0.001,now+(t0||0)+dur);
      o.start(now+(t0||0));o.stop(now+(t0||0)+dur+.02);}catch(e){}}
  function noise(dur,vol,t0){
    try{var c=ac(),sr=c.sampleRate,buf=c.createBuffer(1,Math.floor(sr*dur),sr),data=buf.getChannelData(0);
      for(var i=0;i<data.length;i++)data[i]=Math.random()*2-1;
      var s=c.createBufferSource(),g=c.createGain();s.buffer=buf;s.connect(g);g.connect(c.destination);
      g.gain.setValueAtTime(vol||.1,c.currentTime+(t0||0));
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+(t0||0)+dur);
      s.start(c.currentTime+(t0||0));}catch(e){}}
  return{
    click:function(){tone(440,.06,'square',.08);tone(880,.04,'square',.05,.05);},
    select:function(){tone(523,.05,'triangle',.1);tone(659,.07,'triangle',.11,.06);},
    snap:function(){noise(.12,.28);tone(80,.2,'sawtooth',.22,.02);tone(160,.1,'sawtooth',.14,.08);},
    menu:function(){[262,330,392,523].forEach(function(f,i){tone(f,.14,'square',.12,i*.1);});},
    td:function(){[523,659,784,1047,784,659,784,1047,1319].forEach(function(f,i){tone(f,.18,'square',.18,i*.1);});},
    turnover:function(){[330,247,196,147,110].forEach(function(f,i){tone(f,.2,'sawtooth',.18-i*.02,i*.13);});},
    clash:function(){noise(.14,.32);[110,220,440,880].forEach(function(f,i){tone(f,.12,'square',.18,i*.03);});tone(1320,.4,'square',.2,.2);},
    draft:function(){tone(330,.04,'square',.1);tone(550,.05,'square',.12,.05);tone(880,.1,'square',.14,.1);},
  };
})();

// ===== TEAMS (v0.7: 2 teams) =====
var TEAMS=[
  {id:'iron_ridge',name:'IRON RIDGE',abbr:'IR',icon:'🔱',
   color:'#CC1A1A',accent:'#ff4444',bg:'#1a0000',
   style:'Ground & Pound',desc:'Downhill runs. Physical defense. Win in the trenches.',
   coach:{name:'Coach Mack Harmon',voice:'Old school. No nonsense. Believes in the run game.'},
   players:[
     {name:'Darnell Wade',nick:'"Red Dog"',pos:'QB',ovr:91},
     {name:'T.J. Harks',nick:'"Freight Train"',pos:'RB',ovr:88},
     {name:'Marcus Cole',nick:'"Iron Wall"',pos:'OL',ovr:94},
   ]},
  {id:'canyon_tech',name:'CANYON TECH',abbr:'CT',icon:'🌵',
   color:'#FF5E1A',accent:'#ff8844',bg:'#1a0800',
   style:'Air Raid',desc:'Spread the field. Throw it deep. Make them pay.',
   coach:{name:'Coach Hank McCord',voice:'Aggressive. Loves the deep ball. Always attacking.'},
   players:[
     {name:'Casey Burns',nick:'"The Maestro"',pos:'QB',ovr:96},
     {name:'Marquise Reed',nick:'"Big Play"',pos:'WR',ovr:87},
     {name:'Jalen Torres',nick:'"The Mismatch"',pos:'TE',ovr:85},
   ]},
];

// ===== CARDS =====
var OFF_CARDS=[
  // Run plays
  {id:'qb_sneak', name:'QB SNEAK',    type:'run', cat:'Run - Short',     icon:'🏃', desc:'QB drives forward behind the center. Almost always gains 1-2 yards.'},
  {id:'draw',     name:'DRAW',        type:'run', cat:'Run - Deceptive', icon:'🃏', desc:'QB fakes a pass dropback, hands to the RB. Exploits aggressive pass rushers.'},
  {id:'power',    name:'POWER',       type:'run', cat:'Run - Physical',  icon:'💪', desc:'Downhill run with a lead blocker. Attacks one specific gap.'},
  {id:'zone_read',name:'ZONE READ',   type:'run', cat:'Run - Read',      icon:'👁', desc:'QB reads the defender — keeps or gives based on what he sees. Spread staple.'},
  {id:'toss',     name:'TOSS',        type:'run', cat:'Run - Outside',   icon:'↗', desc:'Pitch sweep to the edge. Gets the RB outside with blockers in front.'},
  // Pass plays
  {id:'slant',    name:'SLANT',       type:'pass',cat:'Pass - Quick',         icon:'⚡', desc:'Quick inside route at 5 yards. Ball out in under 2 seconds.'},
  {id:'flat',     name:'FLAT',        type:'pass',cat:'Pass - Safe',          icon:'🛡', desc:'Short throw to the RB/TE along the sideline. Safety valve. 4-6 yards.'},
  {id:'cross',    name:'CROSS',       type:'pass',cat:'Pass - Intermediate',  icon:'↔', desc:'WR runs across the field at 10-12 yards. Beats man coverage with traffic.'},
  {id:'corner_rte',name:'CORNER RTE', type:'pass',cat:'Pass - Deep',          icon:'↖', desc:'WR breaks to the sideline at 15 yards. High reward, needs arm strength.'},
  {id:'go_route', name:'GO ROUTE',    type:'pass',cat:'Pass - Bomb',          icon:'🚀', desc:'Straight vertical. Home run ball — 30+ yards if it hits. Biggest risk/reward.'},
];

var DEF_CARDS=[
  // Aggressive
  {id:'blitz',        name:'BLITZ',         type:'agg',cat:'Pressure',            icon:'🔥', desc:'Send extra rushers. High risk/high reward. Gets destroyed by quick throws.'},
  {id:'corner_blitz', name:'CORNER BLITZ',  type:'agg',cat:'Pressure - Edge',     icon:'💨', desc:'Pressure off the corner. Leaves the sideline exposed.'},
  {id:'press_man',    name:'PRESS MAN',     type:'agg',cat:'Coverage - Physical',  icon:'🤝', desc:'Jam receivers at the line. Shuts down short routes. Speed beats you deep.'},
  {id:'safety_blitz', name:'SAFETY BLITZ',  type:'agg',cat:'Pressure - Downhill',  icon:'⬇', desc:'Safety attacks from depth. Kills the run. Zero deep help.'},
  {id:'line_stunt',   name:'LINE STUNT',    type:'agg',cat:'Pressure - Interior',  icon:'🔄', desc:'DL twist and games. Disrupts timing but opens running lanes.'},
  // Conservative
  {id:'cover_2',  name:'COVER 2',  type:'con',cat:'Zone - Two Deep',   icon:'2️⃣', desc:'Two safeties deep, corners in flats. Soft in the middle.'},
  {id:'cover_3',  name:'COVER 3',  type:'con',cat:'Zone - Three Deep', icon:'3️⃣', desc:'Three deep zones, 8-man box. Strong vs deep balls, weak underneath.'},
  {id:'cover_4',  name:'COVER 4',  type:'con',cat:'Zone - Four Deep',  icon:'4️⃣', desc:'Four across the back. Takes away everything deep, gives up short.'},
  {id:'spy',      name:'SPY',      type:'con',cat:'Assignment',         icon:'🕵', desc:'One defender watches the QB. Contains scrambles, fewer guys in coverage.'},
  {id:'prevent',  name:'PREVENT',  type:'con',cat:'Zone - Max Depth',   icon:'🧱', desc:'Everyone drops deep. Nothing over the top. Gives up 5+ yards every snap.'},
];

// ===== MATCHUP TABLE =====
// Tiers: 'O+' = offense wins (8-20), 'N' = neutral (2-6), 'D+' = defense wins (-2 to 2), 'TO' = turnover risk (-2 to 0, ~20% INT/fumble)
// Rows: offense cards (order matches OFF_CARDS). Cols: defense cards (order matches DEF_CARDS).
var MATCHUPS=[
  // QB Sneak vs: Blitz, CornerBlitz, PressMan, SafetyBlitz, LineStunt, Cover2, Cover3, Cover4, Spy, Prevent
  ['N',  'N',  'D+', 'N',  'D+', 'O+', 'O+', 'N',  'N',  'O+'],
  // Draw
  ['TO', 'N',  'O+', 'D+', 'D+', 'O+', 'N',  'N',  'N',  'O+'],
  // Power
  ['D+', 'O+', 'N',  'D+', 'O+', 'N',  'D+', 'N',  'N',  'O+'],
  // Zone Read
  ['D+', 'O+', 'N',  'N',  'O+', 'N',  'N',  'O+', 'D+', 'O+'],
  // Toss
  ['N',  'D+', 'N',  'O+', 'O+', 'N',  'N',  'N',  'N',  'O+'],
  // Slant
  ['O+', 'O+', 'TO', 'N',  'N',  'N',  'N',  'N',  'O+', 'N'],
  // Flat
  ['O+', 'N',  'D+', 'O+', 'N',  'D+', 'O+', 'N',  'N',  'N'],
  // Cross
  ['N',  'N',  'O+', 'N',  'D+', 'O+', 'N',  'D+', 'O+', 'N'],
  // Corner Rte
  ['O+', 'TO', 'N',  'O+', 'N',  'O+', 'N',  'D+', 'N',  'D+'],
  // Go Route
  ['O+', 'O+', 'N',  'O+', 'N',  'D+', 'D+', 'D+', 'N',  'D+'],
];

// Yard ranges per tier
function rollYards(tier){
  if(tier==='O+') return 8+Math.floor(Math.random()*13);   // 8-20
  if(tier==='N')  return 2+Math.floor(Math.random()*5);    // 2-6
  if(tier==='D+') return -2+Math.floor(Math.random()*5);   // -2 to 2
  if(tier==='TO') return -2+Math.floor(Math.random()*3);   // -2 to 0
  return 3;
}
function isTurnover(tier){return tier==='TO'&&Math.random()<0.2;}

// ===== SCENARIO (v0.7: one test scenario) =====
var SCENARIO={
  desc:'2nd & 10 from the defense\'s 35',
  context:'Down 7 · 2:45 left · 1 timeout',
  down:2, dist:10, ballOn:35,
  clock:165, // seconds
  timeouts:1,
  offScore:14, defScore:21,
};

// ===== STATE =====
var GS=null;
var root=document.getElementById('root');

function setGs(fn){GS=typeof fn==='function'?fn(GS):fn;render();}

// ===== STORAGE =====
function getSaved(key,def){try{return localStorage.getItem('torch_'+key)||def;}catch(e){return def;}}
function setSaved(key,val){try{localStorage.setItem('torch_'+key,val);}catch(e){}}

// ===== RENDER =====
function render(){
  root.innerHTML='';
  var content;
  if(!GS) content=buildHome();
  else if(GS.screen==='setup') content=buildSetup();
  else if(GS.screen==='draft') content=buildDraft();
  else if(GS.screen==='play') content=buildPlay();
  else if(GS.screen==='result') content=buildResult();
  else content=buildHome();
  if(content) root.appendChild(content);
  root.scrollTop=0;
}

// ===== SCREEN 1: HOME =====
function buildHome(){
  SND.menu();
  var el=document.createElement('div');
  el.className='sup';
  el.style.cssText='min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-y:auto;';

  // Hero banner
  var hero=document.createElement('div');
  hero.style.cssText='width:100%;background:radial-gradient(ellipse at 50% 0%,#1a0030 0%,#0d0020 40%,var(--bg) 75%);padding:48px 20px 32px;text-align:center;border-bottom:1px solid var(--bdr);position:relative;overflow:hidden;';
  // scanlines
  var scl=document.createElement('div');
  scl.style.cssText='position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.1) 3px,rgba(0,0,0,.1) 4px);pointer-events:none;';
  hero.appendChild(scl);

  var fireEl=document.createElement('div');
  fireEl.className='fire';
  fireEl.style.cssText='font-size:64px;line-height:1;margin-bottom:12px;position:relative;z-index:1;';
  fireEl.textContent='\uD83D\uDD25';

  var title=document.createElement('h1');
  title.style.cssText='font-family:\'Bebas Neue\',sans-serif;font-size:90px;letter-spacing:14px;line-height:.9;color:var(--gold);text-shadow:0 0 44px rgba(255,215,0,.7),0 0 90px rgba(255,215,0,.2),2px 4px 0 #3a1a00;position:relative;z-index:1;';
  title.textContent='TORCH';

  var sub=document.createElement('div');
  sub.style.cssText='font-family:\'Press Start 2P\',monospace;font-size:7px;color:var(--cyan);letter-spacing:5px;margin:12px 0 0;position:relative;z-index:1;';
  sub.textContent='THE FOOTBALL CARD GAME';

  hero.append(fireEl,title,sub);
  el.appendChild(hero);

  // Play button
  var playWrap=document.createElement('div');

  var playBtn=document.createElement('button');
  playBtn.className='btn bp';
  playBtn.style.cssText='width:100%;padding:22px;font-size:11px;letter-spacing:3px;box-shadow:0 6px 0 #260048,0 0 28px rgba(204,68,255,.35);background:linear-gradient(135deg,#1a0035,#110020);position:relative;overflow:hidden;';
  playBtn.innerHTML='<span style="position:relative;z-index:1;">\u26A1 PLAY TODAY\'S TORCH</span>';
  playBtn.onclick=function(){SND.click();setGs({screen:'setup',team:null,side:null});};
  playWrap.appendChild(playBtn);
  el.appendChild(playWrap);

  // Scenario teaser
  var teaser=document.createElement('div');
  teaser.style.cssText='text-align:center;padding:12px 20px 0;font-size:14px;color:var(--muted);font-weight:700;';
  teaser.textContent=SCENARIO.desc+' \u00B7 '+SCENARIO.context;
  el.appendChild(teaser);

  // How to Play (expandable)
  var htpWrap=document.createElement('div');
  htpWrap.style.cssText='width:100%;padding:28px 20px 0;';
  var htpBtn=document.createElement('button');
  htpBtn.style.cssText='background:none;border:none;cursor:pointer;font-family:\'Press Start 2P\',monospace;font-size:6px;color:var(--cyan);letter-spacing:2px;display:flex;align-items:center;gap:8px;width:100%;justify-content:center;padding:8px;';
  var htpArrow=document.createElement('span');
  htpArrow.textContent='\u25B6';
  htpArrow.style.cssText='transition:transform .2s;font-size:8px;';
  var htpLabel=document.createElement('span');
  htpLabel.textContent='HOW TO PLAY';
  htpBtn.append(htpArrow,htpLabel);

  var htpContent=document.createElement('div');
  htpContent.style.cssText='max-height:0;overflow:hidden;transition:max-height .3s ease;';
  var htpInner=document.createElement('div');
  htpInner.style.cssText='padding:16px 0 8px;';

  var steps=[
    {icon:'\uD83C\uDFC8',text:'Pick your team. Choose offense or defense.'},
    {icon:'\uD83C\uDCCF',text:'Draft 5 cards from 10 to build your game plan.'},
    {icon:'\u26A1',text:'Each snap: pick a card. The AI picks for the other side. Neither knows.'},
    {icon:'\uD83D\uDCA5',text:'Cards CLASH. See who won the matchup. Real football logic decides.'},
    {icon:'\uD83C\uDFC6',text:'Win the drive. Share your result. Come back tomorrow.'},
  ];
  steps.forEach(function(s){
    var row=document.createElement('div');
    row.style.cssText='display:flex;gap:12px;align-items:flex-start;margin-bottom:12px;';
    var ico=document.createElement('div');
    ico.style.cssText='font-size:20px;flex-shrink:0;width:28px;text-align:center;';
    ico.textContent=s.icon;
    var txt=document.createElement('div');
    txt.style.cssText='font-size:14px;color:var(--text);font-weight:600;line-height:1.5;';
    txt.textContent=s.text;
    row.append(ico,txt);

  });
  htpContent.appendChild(htpInner);

  var htpOpen=false;
  htpBtn.onclick=function(){
    SND.click();
    htpOpen=!htpOpen;
    htpArrow.style.transform=htpOpen?'rotate(90deg)':'';
    htpContent.style.maxHeight=htpOpen?(htpInner.scrollHeight+'px'):'0';
  };
  htpWrap.append(htpBtn,htpContent);
  el.appendChild(htpWrap);

  // What is a Torch?
  var whatWrap=document.createElement('div');
  whatWrap.style.cssText='width:100%;padding:12px 20px 0;';
  var whatBtn=document.createElement('button');
  whatBtn.style.cssText='background:none;border:none;cursor:pointer;font-family:\'Press Start 2P\',monospace;font-size:6px;color:var(--muted);letter-spacing:2px;display:flex;align-items:center;gap:8px;width:100%;justify-content:center;padding:8px;';
  var whatArrow=document.createElement('span');
  whatArrow.textContent='\u25B6';
  whatArrow.style.cssText='transition:transform .2s;font-size:8px;';
  var whatLabel=document.createElement('span');
  whatLabel.textContent='WHAT IS A TORCH?';
  whatBtn.append(whatArrow,whatLabel);

  var whatContent=document.createElement('div');
  whatContent.style.cssText='max-height:0;overflow:hidden;transition:max-height .3s ease;';
  var whatInner=document.createElement('div');
  whatInner.style.cssText='padding:12px 0 8px;font-size:14px;color:var(--muted);font-weight:600;line-height:1.7;text-align:center;';
  whatInner.textContent='In football, to "torch" a defense means to burn it \u2014 to read the coverage and exploit its weakness with the perfect play call. Every day, TORCH gives you one drive, one scenario, one chance to prove you can read the defense.';
  whatContent.appendChild(whatInner);

  var whatOpen=false;
  whatBtn.onclick=function(){
    SND.click();
    whatOpen=!whatOpen;
    whatArrow.style.transform=whatOpen?'rotate(90deg)':'';
    whatContent.style.maxHeight=whatOpen?(whatInner.scrollHeight+'px'):'0';
  };
  whatWrap.append(whatBtn,whatContent);
  el.appendChild(whatWrap);

  // Version
  var ver=document.createElement('div');
  ver.style.cssText='text-align:center;padding:28px 20px 20px;font-size:11px;color:var(--muted);font-weight:700;letter-spacing:1px;';
  ver.textContent='v0.7';
  el.appendChild(ver);

  return el;
}

// ===== SCREEN 2: TEAM & SIDE SELECTION =====
function buildSetup(){
  var el=document.createElement('div');
  el.className='sup';
  el.style.cssText='min-height:100vh;display:flex;flex-direction:column;background:var(--bg);';

  // Header
  var hdr=document.createElement('div');
  hdr.style.cssText='background:linear-gradient(135deg,#0a0820,#10082a);border-bottom:2px solid rgba(204,68,255,.3);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;';
  var hleft=document.createElement('div');
  hleft.style.cssText='display:flex;align-items:center;gap:8px;';
  hleft.innerHTML='<div style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;color:var(--gold);letter-spacing:2px;">\uD83D\uDD25 TORCH</div>';
  var backBtn=document.createElement('button');
  backBtn.className='btn bm';
  backBtn.style.cssText='font-size:6px;padding:6px 10px;cursor:pointer;color:var(--muted);';
  backBtn.textContent='\u2190 BACK';
  backBtn.onclick=function(){SND.click();GS=null;render();};
  hdr.append(hleft,backBtn);
  el.appendChild(hdr);

  var content=document.createElement('div');
  content.style.cssText='flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:20px;';

  // Scenario context
  var scenario=document.createElement('div');
  scenario.style.cssText='background:linear-gradient(135deg,#0c0820,#08061a);border:1px solid var(--bdr);border-radius:10px;padding:16px;text-align:center;';
  scenario.innerHTML=
    '<div style="font-family:\'Press Start 2P\',monospace;font-size:5px;color:var(--muted);letter-spacing:3px;margin-bottom:10px;">TODAY\'S SCENARIO</div>'+
    '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;color:var(--text);letter-spacing:2px;line-height:1.1;">'+SCENARIO.desc+'</div>'+
    '<div style="margin-top:8px;display:flex;justify-content:center;gap:16px;flex-wrap:wrap;">'+
      '<div style="font-size:14px;font-weight:700;color:var(--danger);">Down 7</div>'+
      '<div style="font-size:14px;font-weight:700;color:var(--orange);">2:45 left</div>'+
      '<div style="font-size:14px;font-weight:700;color:var(--cyan);">1 timeout</div>'+
    '</div>'+
    '<div style="margin-top:10px;font-size:13px;color:var(--muted);font-weight:600;line-height:1.5;">The offense needs a touchdown. Score + go for 2 to win, or kick the XP to tie.</div>';
  content.appendChild(scenario);

  // Team selection
  var teamLabel=document.createElement('div');
  teamLabel.style.cssText='font-family:\'Press Start 2P\',monospace;font-size:6px;color:var(--muted);letter-spacing:3px;text-align:center;';
  teamLabel.textContent='CHOOSE YOUR TEAM';
  content.appendChild(teamLabel);

  var teamGrid=document.createElement('div');
  teamGrid.style.cssText='display:flex;gap:10px;';

  var selTeam=GS.team;
  var selSide=GS.side;

  function refreshTeams(){
    teamGrid.innerHTML='';
    TEAMS.forEach(function(team){
      var isSel=selTeam===team.id;
      var card=document.createElement('div');
      card.style.cssText='flex:1;cursor:pointer;border:2px solid '+(isSel?team.accent:'var(--bdr)')+';background:'+(isSel?team.bg:'var(--bg2)')+';border-radius:10px;padding:16px 12px;text-align:center;transition:all .15s;'+(isSel?'box-shadow:0 0 20px '+team.accent+'33;transform:translateY(-2px);':'');
      card.innerHTML=
        '<div style="font-size:36px;margin-bottom:6px;">'+team.icon+'</div>'+
        '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;color:'+(isSel?team.accent:'var(--text)')+';letter-spacing:2px;line-height:1;">'+team.name+'</div>'+
        '<div style="font-family:\'Press Start 2P\',monospace;font-size:5px;color:'+(isSel?team.accent:'var(--muted)')+';margin-top:6px;letter-spacing:1px;">'+team.style+'</div>'+
        '<div style="font-size:12px;color:var(--muted);margin-top:8px;font-weight:600;line-height:1.4;">'+team.desc+'</div>';
      card.onclick=function(){SND.select();selTeam=team.id;GS.team=team.id;refreshTeams();refreshSides();refreshGo();};
      teamGrid.appendChild(card);
    });
  }

  content.appendChild(teamGrid);

  // Team roster (shown when team is selected)
  var rosterWrap=document.createElement('div');
  rosterWrap.style.cssText='min-height:0;';
  function refreshRoster(){
    rosterWrap.innerHTML='';
    if(!selTeam) return;
    var team=TEAMS.find(function(t){return t.id===selTeam;});
    if(!team) return;

    var rLabel=document.createElement('div');
    rLabel.style.cssText='font-family:\'Press Start 2P\',monospace;font-size:5px;color:'+team.accent+';letter-spacing:2px;margin-bottom:8px;text-align:center;';
    rLabel.textContent='\u25B8 ROSTER';
    rosterWrap.appendChild(rLabel);

    team.players.forEach(function(pl){
      var row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg2);border:1px solid var(--bdr);border-radius:6px;margin-bottom:5px;';
      row.innerHTML=
        '<div style="display:flex;align-items:center;gap:8px;">'+
          '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:17px;color:'+team.accent+';letter-spacing:.5px;">'+pl.name+'</div>'+
          '<div style="font-family:\'Press Start 2P\',monospace;font-size:4px;color:var(--muted);">'+pl.pos+' \u00B7 '+pl.ovr+' OVR</div>'+
        '</div>'+
        '<div style="font-size:11px;color:var(--muted);font-weight:700;">'+pl.nick+'</div>';
      rosterWrap.appendChild(row);
    });

    var coach=document.createElement('div');
    coach.style.cssText='margin-top:6px;padding:8px 12px;font-size:12px;color:var(--muted);font-weight:600;font-style:italic;text-align:center;';
    coach.textContent='\uD83C\uDFA4 '+team.coach.name+' \u2014 '+team.coach.voice;
    rosterWrap.appendChild(coach);
  }
  content.appendChild(rosterWrap);

  // Side selection
  var sideLabel=document.createElement('div');
  sideLabel.style.cssText='font-family:\'Press Start 2P\',monospace;font-size:6px;color:var(--muted);letter-spacing:3px;text-align:center;';
  sideLabel.textContent='PICK YOUR SIDE';
  content.appendChild(sideLabel);

  var sideRow=document.createElement('div');
  sideRow.style.cssText='display:flex;gap:10px;';

  function refreshSides(){
    sideRow.innerHTML='';
    var sides=[
      {id:'offense',icon:'\uD83C\uDFC8',label:'OFFENSE',desc:'Score a TD to tie or win',color:'var(--green)',glow:'rgba(0,255,136,.2)',bgc:'#001600'},
      {id:'defense',icon:'\uD83D\uDEE1\uFE0F',label:'DEFENSE',desc:'Stop the drive to win',color:'var(--danger)',glow:'rgba(255,36,36,.2)',bgc:'#160000'},
    ];
    sides.forEach(function(s){
      var isSel=selSide===s.id;
      var opt=document.createElement('div');
      opt.className='side-opt'+(isSel?' act':'');
      opt.style.cssText='flex:1;cursor:pointer;border:2px solid '+(isSel?s.color:'var(--bdr)')+';background:'+(isSel?s.bgc:'var(--bg2)')+';border-radius:10px;padding:18px 10px;text-align:center;transition:all .15s;'+(isSel?'box-shadow:0 0 20px '+s.glow+';transform:translateY(-2px);':'');
      opt.innerHTML=
        '<div style="font-size:32px;margin-bottom:6px;">'+s.icon+'</div>'+
        '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:22px;color:'+(isSel?s.color:'var(--text)')+';letter-spacing:2px;">'+s.label+'</div>'+
        '<div style="font-size:12px;color:var(--muted);margin-top:4px;font-weight:600;">'+s.desc+'</div>';
      opt.onclick=function(){SND.select();selSide=s.id;GS.side=s.id;refreshSides();refreshGo();};
      sideRow.appendChild(opt);
    });
  }
  content.appendChild(sideRow);

  // GO button
  var goWrap=document.createElement('div');
  goWrap.style.cssText='padding:8px 0 20px;';
  var goBtn=document.createElement('button');

  function refreshGo(){
    var ready=selTeam&&selSide;
    goBtn.className='btn '+(ready?'bsnap':'bm');
    goBtn.style.cssText='width:100%;padding:18px;font-size:10px;letter-spacing:3px;'+(ready?'':'cursor:not-allowed;opacity:.3;');
    goBtn.disabled=!ready;
    goBtn.textContent=ready?'\uD83C\uDCCF DRAFT YOUR HAND':'SELECT TEAM & SIDE';
    goBtn.onclick=ready?function(){
      SND.snap();
      setGs({screen:'draft',team:selTeam,side:selSide});
    }:null;
    refreshRoster();
  }

  goWrap.appendChild(goBtn);
  content.appendChild(goWrap);

  el.appendChild(content);

  // Initialize
  refreshTeams();
  refreshSides();
  refreshGo();

  return el;
}

// ===== PLACEHOLDER SCREENS (to be built next) =====
function buildDraft(){
  var el=document.createElement('div');
  el.style.cssText='min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;';
  el.innerHTML=
    '<div style="font-size:48px;margin-bottom:16px;">\uD83C\uDCCF</div>'+
    '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:36px;color:var(--gold);letter-spacing:3px;">DRAFT SCREEN</div>'+
    '<div style="font-size:14px;color:var(--muted);margin-top:8px;font-weight:600;">Coming next \u2014 pick 5 cards from 10</div>'+
    '<div style="font-size:12px;color:var(--muted);margin-top:4px;">Team: '+GS.team+' \u00B7 Side: '+GS.side+'</div>';
  var back=document.createElement('button');
  back.className='btn bp';
  back.style.cssText='margin-top:24px;padding:14px 28px;font-size:8px;';
  back.textContent='\u2190 BACK TO SETUP';
  back.onclick=function(){SND.click();setGs({screen:'setup',team:GS.team,side:GS.side});};
  el.appendChild(back);
  return el;
}

function buildPlay(){
  var el=document.createElement('div');
  el.style.cssText='min-height:100vh;display:flex;align-items:center;justify-content:center;';
  el.innerHTML='<div style="font-family:\'Bebas Neue\',sans-serif;font-size:36px;color:var(--cyan);">GAMEPLAY — COMING SOON</div>';
  return el;
}

function buildResult(){
  var el=document.createElement('div');
  el.style.cssText='min-height:100vh;display:flex;align-items:center;justify-content:center;';
  el.innerHTML='<div style="font-family:\'Bebas Neue\',sans-serif;font-size:36px;color:var(--green);">RESULT — COMING SOON</div>';
  return el;
}

// ===== INIT =====
render();

if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js');}
</script>
</body>
</html>
