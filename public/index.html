<style>
:root{
  --bg:#07050e;--bg2:#0d0b1e;--bg3:#131128;
  --cyan:#00d4ff;--gold:#ffd700;--green:#00ff88;
  --orange:#ff6633;--danger:#ff2424;--purple:#cc44ff;
  --text:#e8e4ff;--muted:#5c5a8a;--dim:#3e3c60;--bdr:#1c1930;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);width:100%;height:100%;}
body{font-family:'Barlow Condensed',sans-serif;font-size:18px;color:var(--text);display:flex;justify-content:center;}
#root{width:100%;max-width:430px;min-height:100vh;background:var(--bg);position:relative;}
.bn{font-family:'Bebas Neue',sans-serif;}
.px{font-family:'Press Start 2P',monospace;}
#root::before{content:'';position:fixed;inset:0;width:100%;max-width:430px;left:50%;transform:translateX(-50%);
  background-image:linear-gradient(rgba(0,212,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.018) 1px,transparent 1px);
  background-size:36px 36px;pointer-events:none;z-index:0;}
/* ANIMATIONS */
@keyframes gGold{0%,100%{text-shadow:0 0 14px var(--gold),0 0 40px rgba(255,215,0,.4);}50%{text-shadow:0 0 4px var(--gold);}}
@keyframes gCyan{0%,100%{text-shadow:0 0 12px var(--cyan),0 0 28px rgba(0,212,255,.32);}50%{text-shadow:0 0 3px var(--cyan);}}
@keyframes sup{from{transform:translateY(26px);opacity:0;}to{transform:none;opacity:1;}}
@keyframes pop{0%{transform:scale(.2);opacity:0;}65%{transform:scale(1.16);}100%{transform:scale(1);opacity:1;}}
@keyframes fire{0%,100%{transform:scaleY(1) scaleX(1);}33%{transform:scaleY(1.12) scaleX(.93);}66%{transform:scaleY(.93) scaleX(1.09);}}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
@keyframes deal{from{transform:translateY(40px) rotate(4deg);opacity:0;}to{transform:none;opacity:1;}}
@keyframes pulse{0%,100%{opacity:.6;}50%{opacity:1;}}
/* CLASSES */
.gg{animation:gGold 2s ease-in-out infinite;color:var(--gold);}
.gc{animation:gCyan 2s ease-in-out infinite;color:var(--cyan);}
.sup{animation:sup .38s ease-out both;}
.pop{animation:pop .48s cubic-bezier(.34,1.56,.64,1) both;}
.fire{animation:fire 1.35s ease-in-out infinite;display:inline-block;}
.fi{animation:fi .45s ease-out both;}
/* BUTTONS */
.btn{font-family:'Press Start 2P',monospace;padding:12px 18px;cursor:pointer;border:2px solid;text-transform:uppercase;transition:all .11s;letter-spacing:.06em;border-radius:4px;position:relative;top:0;line-height:1.5;}
.btn:hover:not(:disabled){top:-2px;filter:brightness(1.2);}
.btn:active:not(:disabled){top:3px;}
.btn:disabled{cursor:not-allowed;opacity:.4;}
.bg{background:#001600;color:var(--green);border-color:var(--green);box-shadow:0 5px 0 #003000;font-size:10px;}
.bo{background:#160f00;color:var(--gold);border-color:var(--gold);box-shadow:0 5px 0 #362600;font-size:10px;}
.bp{background:#110020;color:var(--purple);border-color:var(--purple);box-shadow:0 5px 0 #260048;font-size:10px;}
.bm{background:#08071a;color:#28264a;border-color:#18162e;font-size:9px;cursor:default;}
.bsnap{background:#200b00;color:var(--orange);border-color:var(--orange);box-shadow:0 5px 0 #501c00;font-size:10px;}
/* SCOREBOARD */
.sb{background:linear-gradient(180deg,#0c0a1a 0%,#06040e 50%,#080614 100%);
  border:3px solid #2a2445;border-radius:12px;padding:14px 12px;position:relative;
  box-shadow:0 0 40px rgba(0,212,255,.12),0 0 80px rgba(0,212,255,.05),0 8px 32px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.06);
  overflow:hidden;}
.sb::before{content:'';position:absolute;inset:0;border-radius:10px;
  border:1px solid rgba(0,212,255,.12);pointer-events:none;z-index:2;}
.sb::after{content:'';position:absolute;inset:0;border-radius:10px;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 3px);
  pointer-events:none;z-index:3;}
.sb-cell{background:linear-gradient(180deg,#08061a 0%,#050310 100%);border:1px solid #1a1640;border-radius:6px;
  padding:6px 8px;position:relative;box-shadow:inset 0 0 12px rgba(0,0,0,.5),0 0 6px rgba(0,212,255,.04);}
.sb-cell::before{content:'';position:absolute;inset:0;border-radius:5px;border:1px solid rgba(0,212,255,.06);pointer-events:none;}
.sb-led{font-family:'Press Start 2P',monospace;color:var(--cyan);text-shadow:0 0 8px rgba(0,212,255,.9),0 0 24px rgba(0,212,255,.4),0 0 48px rgba(0,212,255,.15);}
.sb-led-gold{font-family:'Press Start 2P',monospace;color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,.9),0 0 28px rgba(255,215,0,.4),0 0 56px rgba(255,215,0,.15);}
.sb-led-dim{font-family:'Press Start 2P',monospace;color:#1a1830;text-shadow:none;}
.sb-label{font-family:'Press Start 2P',monospace;font-size:5px;color:#5a5888;letter-spacing:2px;text-transform:uppercase;text-shadow:0 0 4px rgba(90,88,136,.3);}
/* TRADING CARDS */
.tcard{border-radius:10px;position:relative;overflow:hidden;transition:all .15s;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 1px rgba(255,255,255,.05) inset;}
.tcard:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.5);}
.tcard-sel{transform:translateY(-3px);}
/* SPLIT-FLAP */
.flap-wrap{display:inline-flex;perspective:200px;gap:1px;}
.flap-char{display:inline-block;position:relative;overflow:hidden;width:.65em;height:1.15em;background:#08061a;border:1px solid #14122a;border-radius:2px;}
.flap-char .flap-top,.flap-char .flap-bot{position:absolute;left:0;right:0;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.flap-char .flap-top{top:0;height:50%;border-bottom:1px solid #0a081a;}
.flap-char .flap-bot{bottom:0;height:50%;}
.flap-char .flap-top span{position:absolute;bottom:0;transform:translateY(50%);}
.flap-char .flap-bot span{position:absolute;top:0;transform:translateY(-50%);}
@keyframes flapDown{0%{transform:rotateX(0);}100%{transform:rotateX(-90deg);}}
@keyframes flapUp{0%{transform:rotateX(90deg);}100%{transform:rotateX(0);}}
.flap-anim-top{animation:flapDown .15s ease-in forwards;transform-origin:bottom;backface-visibility:hidden;}
.flap-anim-bot{animation:flapUp .15s ease-out forwards;transform-origin:top;backface-visibility:hidden;}

// ===== SOUND ENGINE =====
var SND=(function(){
  var ctx=null;var crowdNode=null;var crowdGain=null;
  function ac(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();return ctx;}
  function tone(f,dur,type,vol,t0){
    try{var c=ac(),now=c.currentTime,o=c.createOscillator(),g=c.createGain();
      o.connect(g);g.connect(c.destination);o.type=type||'square';o.frequency.value=f;
      g.gain.setValueAtTime(vol||.1,now+(t0||0));
      g.gain.exponentialRampToValueAtTime(0.001,now+(t0||0)+dur);
      o.start(now+(t0||0));o.stop(now+(t0||0)+dur+.02);}catch(e){}}
  function noise(dur,vol,t0){
    try{var c=ac(),sr=c.sampleRate,buf=c.createBuffer(1,Math.floor(sr*dur),sr),data=buf.getChannelData(0);
      for(var i=0;i<data.length;i++)data[i]=Math.random()*2-1;
      var s=c.createBufferSource(),g=c.createGain();s.buffer=buf;s.connect(g);g.connect(c.destination);
      g.gain.setValueAtTime(vol||.1,c.currentTime+(t0||0));
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+(t0||0)+dur);
      s.start(c.currentTime+(t0||0));}catch(e){}}
  return{
    click:function(){tone(440,.06,'square',.08);tone(880,.04,'square',.05,.05);},
    select:function(){tone(523,.05,'triangle',.1);tone(659,.07,'triangle',.11,.06);},
    snap:function(){noise(.12,.28);tone(80,.2,'sawtooth',.22,.02);tone(160,.1,'sawtooth',.14,.08);},
    menu:function(){[262,330,392,523].forEach(function(f,i){tone(f,.14,'square',.12,i*.1);});},
    td:function(){[523,659,784,1047,784,659,784,1047,1319].forEach(function(f,i){tone(f,.18,'square',.18,i*.1);});},
    turnover:function(){[330,247,196,147,110].forEach(function(f,i){tone(f,.2,'sawtooth',.18-i*.02,i*.13);});},
    clash:function(){noise(.14,.32);[110,220,440,880].forEach(function(f,i){tone(f,.12,'square',.18,i*.03);});tone(1320,.4,'square',.2,.2);},
    draft:function(){tone(330,.04,'square',.1);tone(550,.05,'square',.12,.05);tone(880,.1,'square',.14,.1);},
    flip:function(){for(var i=0;i<4;i++)tone(1200+i*200,.02,'square',.04,i*.04);},
    crowdStart:function(){
      try{var c=ac();if(crowdNode)return;
        var sr=c.sampleRate,dur=4,buf=c.createBuffer(2,Math.floor(sr*dur),sr);
        for(var ch=0;ch<2;ch++){var data=buf.getChannelData(ch);for(var i=0;i<data.length;i++)data[i]=Math.random()*2-1;}
        crowdNode=c.createBufferSource();crowdNode.buffer=buf;crowdNode.loop=true;
        crowdGain=c.createGain();crowdGain.gain.setValueAtTime(0.03,c.currentTime);
        // Low rumble band
        var lo=c.createBiquadFilter();lo.type='bandpass';lo.frequency.value=250;lo.Q.value=0.4;
        // Mid murmur band
        var mid=c.createBiquadFilter();mid.type='bandpass';mid.frequency.value=800;mid.Q.value=0.6;
        // High chatter band
        var hi=c.createBiquadFilter();hi.type='bandpass';hi.frequency.value=2200;hi.Q.value=0.8;
        var loG=c.createGain();loG.gain.value=0.5;
        var midG=c.createGain();midG.gain.value=1.0;
        var hiG=c.createGain();hiG.gain.value=0.3;
        crowdNode.connect(lo);lo.connect(loG);loG.connect(crowdGain);
        crowdNode.connect(mid);mid.connect(midG);midG.connect(crowdGain);
        crowdNode.connect(hi);hi.connect(hiG);hiG.connect(crowdGain);
        crowdGain.connect(c.destination);crowdNode.start();
        // Random swells
        (function swell(){
          if(!crowdGain)return;
          var t=c.currentTime;
          var peak=0.03+Math.random()*0.025;
          crowdGain.gain.setValueAtTime(0.03,t);
          crowdGain.gain.linearRampToValueAtTime(peak,t+1+Math.random()*2);
          crowdGain.gain.linearRampToValueAtTime(0.03,t+3+Math.random()*2);
          setTimeout(swell,4000+Math.random()*4000);
        })();
      }catch(e){}},
    crowdStop:function(){
      try{var n=crowdNode,g=crowdGain;crowdNode=null;crowdGain=null;
        if(g){g.gain.exponentialRampToValueAtTime(0.001,ac().currentTime+0.5);}
        setTimeout(function(){try{if(n){n.stop();}}catch(e2){}},600);
      }catch(e){crowdNode=null;crowdGain=null;}},
  };
})();

// ===== YARD/TURNOVER RESOLUTION =====
function rollYards(tier){
  if(tier==='O+') return 8+Math.floor(Math.random()*13);
  if(tier==='N')  return 2+Math.floor(Math.random()*5);
  if(tier==='D+') return -2+Math.floor(Math.random()*5);
  if(tier==='TO') return -2+Math.floor(Math.random()*5);
  if(tier==='OT') return Math.random()<0.7?(8+Math.floor(Math.random()*13)):(-2+Math.floor(Math.random()*3));
  return 3;
}
function isTurnover(tier){
  if(tier==='TO') return Math.random()<0.2;
  if(tier==='OT') return Math.random()<0.2;
  return false;
}

// ===== AI PLAY-CALLING =====
function aiPickDefense(defTeamId,hand,lastPlayId){
  if(hand.length===0) return null;
  if(hand.length===1) return hand[0];
  var pool=hand.slice();
  // Iron Ridge (Saban): 60% zone, 25% adjustment, 15% aggressive
  if(defTeamId==='iron_ridge'){
    // Never call same play twice in a row
    if(lastPlayId) pool=pool.filter(function(c){return c.id!==lastPlayId;});
    if(pool.length===0) pool=hand.slice();
    var zone=['rip_liz','cov4_match','mod','cover_6'];
    var adjust=['skinny','bracket','meg'];
    var aggr=['fire_zone','robber','gap_int'];
    var r=Math.random();
    var bucket=r<0.6?zone:r<0.85?adjust:aggr;
    var avail=pool.filter(function(c){return bucket.indexOf(c.id)!==-1;});
    if(avail.length>0) return avail[Math.floor(Math.random()*avail.length)];
  }
  // Canyon Tech (Williams): 50% blitz, 30% coverage, 15% specialty, 5% random
  if(defTeamId==='canyon_tech'){
    var blitz=['overload','db_blitz','zero_cov','a_gap_mug','edge_crash'];
    var cov=['cov2_buc','man_press','zone_drop'];
    var spec=['spy','prevent'];
    var r2=Math.random();
    var bucket2=r2<0.5?blitz:r2<0.8?cov:r2<0.95?spec:null;
    if(bucket2){
      var avail2=pool.filter(function(c){return bucket2.indexOf(c.id)!==-1;});
      if(avail2.length>0) return avail2[Math.floor(Math.random()*avail2.length)];
    }
  }
  return pool[Math.floor(Math.random()*pool.length)];
}

function aiPickOffense(offTeamId,hand,lastPlayId){
  if(hand.length===0) return null;
  if(hand.length===1) return hand[0];
  var pool=hand.slice();
  // Canyon Tech AI (Air Raid): 70% short pass, 20% deep, 10% run
  if(offTeamId==='canyon_tech'){
    var short=['mesh','slant','shallow_cross','stick','bubble_screen'];
    var deep=['four_verts','go_route','y_corner'];
    var run=['draw','qb_sneak'];
    var r=Math.random();
    var bucket=r<0.7?short:r<0.9?deep:run;
    var avail=pool.filter(function(c){return bucket.indexOf(c.id)!==-1;});
    if(avail.length>0) return avail[Math.floor(Math.random()*avail.length)];
  }
  // Iron Ridge AI (Triple Option): 70% run, 20% option/misdirection, 10% play-action
  if(offTeamId==='iron_ridge'){
    var mainRun=['triple_option','zone_read','power'];
    var optMis=['midline','qb_keeper','trap','rocket_toss'];
    var pa=['pa_post','pa_flat'];
    var r2=Math.random();
    var bucket2=r2<0.7?mainRun:r2<0.9?optMis:pa;
    var avail2=pool.filter(function(c){return bucket2.indexOf(c.id)!==-1;});
    if(avail2.length>0) return avail2[Math.floor(Math.random()*avail2.length)];
  }
  return pool[Math.floor(Math.random()*pool.length)];
}

function playSvg(id,color){
  var d=PD[id];
  if(!d) return '<div style="width:60px;height:50px;"></div>';
  var dots=d[0],lines=d[1],dashes=d[2];
  var svg='<svg viewBox="0 0 60 50" width="60" height="50" xmlns="http://www.w3.org/2000/svg" style="display:block;">';
  // dashes
  for(var i=0;i<dashes.length;i++){
    var dl=dashes[i];
    if(dl.length===4) svg+='<line x1="'+dl[0]+'" y1="'+dl[1]+'" x2="'+dl[2]+'" y2="'+dl[3]+'" stroke="'+color+'" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>';
    else if(dl.length===6) svg+='<polyline points="'+dl[0]+','+dl[1]+' '+dl[2]+','+dl[3]+' '+dl[4]+','+dl[5]+'" fill="none" stroke="'+color+'" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>';
  }
  // lines
  for(var j=0;j<lines.length;j++){
    var ln=lines[j];
    if(ln.length===4) svg+='<line x1="'+ln[0]+'" y1="'+ln[1]+'" x2="'+ln[2]+'" y2="'+ln[3]+'" stroke="'+color+'" stroke-width="1.5" opacity="0.8"/>';
    else if(ln.length===6) svg+='<polyline points="'+ln[0]+','+ln[1]+' '+ln[2]+','+ln[3]+' '+ln[4]+','+ln[5]+'" fill="none" stroke="'+color+'" stroke-width="1.5" opacity="0.8"/>';
  }
  // dots
  for(var k=0;k<dots.length;k++){
    var r=k===0?3.5:2.5;
    svg+='<circle cx="'+dots[k][0]+'" cy="'+dots[k][1]+'" r="'+r+'" fill="'+color+'" opacity="'+(k===0?'1':'0.7')+'"/>';
  }
  svg+='</svg>';
  return svg;
}

function clockCost(cardId){
  var quick={slant:1,stick:1,shallow_cross:1,bubble_screen:1};
  var short={mesh:1,pa_flat:1};
  var deep={four_verts:1,y_corner:1,go_route:1,pa_post:1};
  if(quick[cardId]) return 8+Math.floor(Math.random()*5);
  if(short[cardId]) return 12+Math.floor(Math.random()*5);
  if(deep[cardId]) return 16+Math.floor(Math.random()*7);
  return 10+Math.floor(Math.random()*9);
}

// ===== RENDER =====
function render(){
  SND.crowdStop();
  root.innerHTML='';
  var content;
  if(!GS) content=buildHome();
  else if(GS.screen==='setup') content=buildSetup();
  else if(GS.screen==='players') content=buildPlayers();
  else if(GS.screen==='draft') content=buildDraft();
  else if(GS.screen==='play') content=buildPlay();
  else if(GS.screen==='result') content=buildResult();
  else content=buildHome();
  if(content) root.appendChild(content);
  root.scrollTop=0;
}

  var homeScore=document.createElement('div');homeScore.className='sb-led-gold';

  // Score divider
  var divCell=document.createElement('div');
  divCell.className='sb-cell';
  divCell.style.cssText+='display:flex;align-items:center;justify-content:center;padding:8px 10px;';
  var divLed=document.createElement('div');divLed.className='sb-led';
  divLed.style.cssText+='font-size:24px;';divLed.textContent='\u2014';
  divCell.appendChild(divLed);

  // Away cell
  var awayCell=document.createElement('div');
  awayCell.className='sb-cell';
  awayCell.style.cssText+='text-align:center;padding:8px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;';
  var awayLabel=document.createElement('div');awayLabel.className='sb-label';awayLabel.textContent='AWAY';
  var awayName=document.createElement('div');
  awayName.style.cssText='font-family:\'Press Start 2P\',monospace;font-size:7px;color:#fff;letter-spacing:1px;min-height:14px;display:flex;justify-content:center;text-shadow:0 0 6px rgba(255,255,255,.2);';
  var awayScore=document.createElement('div');awayScore.className='sb-led-gold';
  awayScore.style.cssText+='font-size:32px;line-height:1;';

  function renderFlap(container,text){
    container.innerHTML='';
    var wrap=document.createElement('span');
    wrap.className='flap-wrap';
    wrap.style.cssText='font-family:\'Press Start 2P\',monospace;font-size:7px;letter-spacing:1px;';
    for(var i=0;i<text.length;i++){
      var ch=document.createElement('span');
      ch.className='flap-char';
      if(text[i]===' '){ch.style.width='.3em';ch.style.background='transparent';ch.style.border='none';}
      else{
        var top=document.createElement('div');top.className='flap-top';
        var ts=document.createElement('span');ts.textContent=text[i];ts.style.color='#fff';top.appendChild(ts);
        var bot=document.createElement('div');bot.className='flap-bot';
        var bs=document.createElement('span');bs.textContent=text[i];bs.style.color='#fff';bot.appendChild(bs);
        ch.append(top,bot);
      }
      wrap.appendChild(ch);
    }
    container.appendChild(wrap);
  }

  function flipTo(container,newText){
    var padded=newText;
    while(padded.length<12)padded+=' ';
    renderFlap(container,padded);
    var newChars=container.querySelectorAll('.flap-char');
    newChars.forEach(function(ch,i){
      if(padded[i]===' ')return;
      var topDiv=ch.querySelector('.flap-top');
      var botDiv=ch.querySelector('.flap-bot');
      if(topDiv&&botDiv){
        topDiv.style.opacity='0';botDiv.style.opacity='0';
        setTimeout(function(){
          topDiv.classList.add('flap-anim-top');
          topDiv.style.opacity='1';
          setTimeout(function(){
            botDiv.classList.add('flap-anim-bot');
            botDiv.style.opacity='1';
          },80);
        },i*40);
      }
    });
    SND.flip();
  }

  homeCell.append(homeLabel,homeName,homeScore);
  awayCell.append(awayLabel,awayName,awayScore);
  scoreRow.append(homeCell,divCell,awayCell);
  sb.appendChild(scoreRow);

  // Initialize
  homeScore.textContent=String(SCENARIO.offScore);
  awayScore.textContent=String(SCENARIO.defScore);
  if(homeTeam){flipTo(homeName,homeTeam);}
  else{renderFlap(homeName,'---         ');}
  if(awayTeam){flipTo(awayName,awayTeam);}
  else{renderFlap(awayName,'---         ');}

  // === BOTTOM ROW: DOWN / BALL / TIMEOUTS ===
  var infoRow=document.createElement('div');
  infoRow.style.cssText='display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;';

  var downs=['','1ST','2ND','3RD','4TH'];
  var infoCells=[
    {label:'DOWN',val:downs[SCENARIO.down]+' & '+SCENARIO.dist},
    {label:'BALL ON',val:'DEF '+SCENARIO.ballOn},
    {label:'TIMEOUTS',val:String(SCENARIO.timeouts)},
  ];
  infoCells.forEach(function(c){
    var cell=document.createElement('div');
    cell.className='sb-cell';
    cell.style.cssText+='text-align:center;padding:6px;';
    cell.innerHTML='<div class="sb-label" style="margin-bottom:3px;">'+c.label+'</div><div class="sb-led" style="font-size:9px;">'+c.val+'</div>';
    infoRow.appendChild(cell);
  });
  sb.appendChild(infoRow);

  // Expose update
  sb._update=function(ht,at){
    if(ht){flipTo(homeName,ht);homeScore.textContent=String(SCENARIO.offScore);}
    if(at){flipTo(awayName,at);awayScore.textContent=String(SCENARIO.defScore);}
  };

  return sb;
}

// ===== SCREEN 4: CARD DRAFT =====
function buildDraft(){
  var el=document.createElement('div');el.className='sup';
  el.style.cssText='min-height:100vh;display:flex;flex-direction:column;background:var(--bg);';

  var team=getTeam(GS.team);

  var pool=isOffense?getOffCards(GS.team):getDefCards(GS.team);

  // Header
  var hdr=document.createElement('div');
  hdr.style.cssText='background:linear-gradient(135deg,#0a0820,#10082a);border-bottom:2px solid '+team.accent+'55;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;';
  hdr.innerHTML='<div style="display:flex;align-items:center;gap:8px;"><span style="font-size:20px;">'+team.icon+'</span><span style="font-family:\'Bebas Neue\',sans-serif;font-size:20px;color:'+team.accent+';letter-spacing:2px;">'+team.name+'</span><span style="font-family:\'Press Start 2P\',monospace;font-size:5px;color:var(--muted);letter-spacing:1px;">'+GS.side.toUpperCase()+'</span></div>';

  hdr.appendChild(backBtn);
  el.appendChild(hdr);

  var content=document.createElement('div');
  content.style.cssText='flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;';

  var inst=document.createElement('div');
  inst.style.cssText='text-align:center;padding:4px 0;';
  inst.innerHTML='<div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;color:var(--text);letter-spacing:2px;">DRAFT YOUR PLAYS</div><div style="font-size:14px;color:var(--text);font-weight:600;margin-top:2px;opacity:.7;">Pick 5 cards for your game plan</div>';
  content.appendChild(inst);

  // Counter
  var counter=document.createElement('div');
  counter.style.cssText="font-family:'Press Start 2P',monospace;font-size:8px;text-align:center;color:var(--cyan);";
  content.appendChild(counter);

  var selected={};

  var cardGrid=document.createElement('div');
  cardGrid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;';

  function typeColor(card){
    if(card.type==='run') return {border:'#cc5522',bg:'linear-gradient(180deg,#1a0800 0%,#0e0400 100%)',glow:'rgba(204,85,34,.25)',label:'RUN'};
    if(card.type==='pass') return {border:'#2255cc',bg:'linear-gradient(180deg,#0c1535 0%,#06091a 100%)',glow:'rgba(34,85,204,.25)',label:'PASS'};
    if(card.type==='agg') return {border:'#ff2424',bg:'linear-gradient(180deg,#220000 0%,#140000 100%)',glow:'rgba(255,36,36,.25)',label:'AGG'};
    return {border:'#00aacc',bg:'linear-gradient(180deg,#001822 0%,#000a14 100%)',glow:'rgba(0,170,204,.25)',label:'CON'};
  }

  function refreshCards(){
    cardGrid.innerHTML='';
    var count=Object.keys(selected).length;
    counter.textContent=count+' / 5 SELECTED';
    counter.style.color=count===5?'var(--green)':'var(--cyan)';

    pool.forEach(function(card,idx){
      var isSel=!!selected[card.id+'_'+idx];
      var tc=typeColor(card);
      var cel=document.createElement('div');
      cel.className='tcard'+(isSel?' tcard-sel':'');
      cel.style.cssText='border:2px solid '+(isSel?'var(--gold)':tc.border+'55')+';background:'+tc.bg+';padding:12px 10px;aspect-ratio:5/7;display:flex;flex-direction:column;justify-content:space-between;'+(isSel?'box-shadow:0 0 20px rgba(255,215,0,.3),0 0 40px rgba(255,215,0,.08),inset 0 0 16px rgba(255,215,0,.05);':'');
      cel.style.animationDelay=(idx*0.03)+'s';

      cel.innerHTML=
        '<div>'+
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">'+
            '<div style="font-family:\'Press Start 2P\',monospace;font-size:5px;padding:2px 4px;background:rgba(0,0,0,.3);color:'+tc.border+';border-radius:3px;letter-spacing:1px;">'+tc.label+'</div>'+
            (isSel?'<div style="font-size:12px;color:var(--gold);text-shadow:0 0 6px rgba(255,215,0,.5);">\u2713</div>':'')+
          '</div>'+
          '<div style="font-size:32px;text-align:center;margin:6px 0 8px;'+(isSel?'filter:drop-shadow(0 0 8px var(--gold));':'')+'">'+card.icon+'</div>'+
          '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:18px;color:'+(isSel?'var(--gold)':'#fff')+';letter-spacing:2px;line-height:1;text-align:center;">'+card.name+'</div>'+
          '<div style="font-family:\'Press Start 2P\',monospace;font-size:4px;color:'+tc.border+';text-align:center;margin-top:4px;letter-spacing:1px;opacity:.8;">'+card.cat+'</div>'+
        '</div>'+
        '<div style="font-size:10px;color:var(--text);font-weight:600;line-height:1.3;opacity:.6;text-align:center;border-top:1px solid '+(isSel?'rgba(255,215,0,.2)':'#1c1930')+';padding-top:6px;">'+card.desc+'</div>';

      if(!isSel&&count>=5) cel.style.opacity='.3';
      cel.onclick=function(){
        SND.click();
        var key=card.id+'_'+idx;
        if(selected[key]) delete selected[key];
        else if(Object.keys(selected).length<5) selected[key]=card;
        refreshCards();refreshGoBtn();
      };
      cardGrid.appendChild(cel);
    });
  }
  content.appendChild(cardGrid);

  // Buttons
  var btnRow=document.createElement('div');btnRow.style.cssText='display:flex;gap:8px;padding:8px 0 16px;';

  var pickForMe=document.createElement('button');
  pickForMe.className='btn bo';
  pickForMe.style.cssText+='flex:1;padding:14px;font-size:7px;';
  pickForMe.textContent='\uD83C\uDFB2 PICK FOR ME';
  pickForMe.onclick=function(){
    SND.draft();
    selected={};
    var indices=shuffle(pool.map(function(_,i){return i;})).slice(0,5);
    indices.forEach(function(i){selected[pool[i].id+'_'+i]=pool[i];});
    refreshCards();refreshGoBtn();
  };

  var goBtn=document.createElement('button');

  function refreshGoBtn(){
    var ready=Object.keys(selected).length===5;
    goBtn.className='btn '+(ready?'bsnap':'bm');
    goBtn.style.cssText='flex:1.5;padding:14px;font-size:8px;'+(ready?'':'cursor:not-allowed;opacity:.3;');
    goBtn.disabled=!ready;
    goBtn.textContent=ready?'\uD83C\uDFC8 START DRIVE \u2192':'PICK 5 CARDS';
    goBtn.onclick=ready?function(){
      SND.snap();
      var hand=Object.keys(selected).map(function(k){return selected[k];});
      setGs({screen:'play',team:GS.team,side:GS.side,roster:GS.roster,hand:hand});
    }:null;
  }

  btnRow.append(pickForMe,goBtn);
  content.appendChild(btnRow);
  el.appendChild(content);

  refreshCards();refreshGoBtn();
  return el;
}

// ===== GAMEPLAY SCREEN =====
function buildPlay(){
  SND.crowdStart();
  var el=document.createElement('div');
  el.style.cssText='height:100vh;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;';

  var isOff=GS.side==='offense';
  var team=getTeam(GS.team);
  var opp=getOtherTeam(GS.team);
  var playerPool=isOff?team.players:team.defPlayers;

  // Drive state (local, not in GS)
  var down=SCENARIO.down;
  var dist=SCENARIO.dist;
  var ballOn=SCENARIO.ballOn;
  var clock=SCENARIO.clock;
  var offScore=SCENARIO.offScore;
  var defScore=SCENARIO.defScore;
  var myHand=GS.hand.slice();
  var myDeck=shuffle((isOff?getOffCards(GS.team):getDefCards(GS.team)).filter(function(c){
    return !myHand.some(function(h){return h.id===c.id;});
  }));
  var aiCards=isOff?getDefCards(opp.id):getOffCards(opp.id);
  var aiHand=shuffle(aiCards.slice()).slice(0,5);
  var aiDeck=shuffle(aiCards.filter(function(c){return !aiHand.some(function(h){return h.id===c.id;});}));
  var lastAiPlay=null;
  var selIdx=-1;
  var animating=false;
  var playNum=0;
  var totalYards=0;
  var turnovers=0;
  var newCardIndices={};

  // Roster lookups
  function getPlayer(cat){
    if(!GS.roster) return null;
    for(var i=0;i<GS.roster.length;i++){
      var p=playerPool.find(function(pl){return pl.id===GS.roster[i];});
      if(p&&p.cat===cat) return p;
    }
    return null;
  }

  // ===== NARRATIVE GENERATION =====
  function genNarrative(tier,yards,myCard,aiCard,isTurnoverResult){
    var qbNick=qb?('\u201C'+qb.nick+'\u201D'):'The QB';
    var skillNick=skill1?('\u201C'+skill1.nick+'\u201D'):'the receiver';
    if(isTurnoverResult){
      if(isOff){
        var defNarr=['INTERCEPTED! The defense reads it all the way!','FUMBLE! Ball comes loose on the exchange!','PICKED OFF! Thrown right to the defender!','TURNOVER! Bad read by the offense!'];
        return defNarr[Math.floor(Math.random()*defNarr.length)];
      } else {
        var offNarr=['INTERCEPTED! '+qbNick+' jumps the route!','FUMBLE! '+qbNick+' forces it loose!','TURNOVER! Great read by the defense!','PICKED OFF! '+skillNick+' saw it coming!'];
        return offNarr[Math.floor(Math.random()*offNarr.length)];
      }
    }
    if(isOff){
      if(tier==='O+'){
        var opNarr=[qbNick+' hits '+skillNick+' deep for '+yards+' yards!',myCard.name+' burns the defense! '+yards+' yards!','Big play! '+skillNick+' breaks free for '+yards+'!',qbNick+' delivers a strike! '+yards+' yards gained!'];
        return opNarr[Math.floor(Math.random()*opNarr.length)];
      }
      if(tier==='N'){
        var nNarr=[myCard.name+' picks up '+yards+' yards underneath.','Steady gain of '+yards+'. Moving the chains.',yards+' yards on '+myCard.name+'. Methodical.','Short gain. '+yards+' yards on the play.'];
        return nNarr[Math.floor(Math.random()*nNarr.length)];
      }
      var dpNarr=[aiCard.name+' shuts it down. '+(yards<=0?'No gain.':yards+' yard'+(yards===1?'':'s')+'.'),'Defense reads '+myCard.name+' perfectly.','Stuffed! '+(yards<=0?'Loss on the play.':yards+' yard'+(yards===1?'':'s')+'.'),'The defense wins this snap.'];
      return dpNarr[Math.floor(Math.random()*dpNarr.length)];
    } else {
      // Player is defense
      if(tier==='O+'){ // offense gained big = bad for us
        var badNarr=['Offense breaks through for '+yards+'!','Big gain! '+yards+' yards. '+aiCard.name+' beats the coverage.','Can\'t stop it. '+yards+' yards on the play.'];
        return badNarr[Math.floor(Math.random()*badNarr.length)];
      }
      if(tier==='N'){
        var okNarr=['Contained to '+yards+' yards.','Solid tackle. '+yards+' yard gain.','Bend but don\'t break. '+yards+' yards.'];
        return okNarr[Math.floor(Math.random()*okNarr.length)];
      }
      var goodNarr=[myCard.name+' locks it down! '+(yards<=0?'Loss!':yards+' yard'+(yards===1?'':'s')+'.'),'Great call! Defense stuffs '+aiCard.name+'.',qbNick+' makes the play! '+(yards<=0?'TFL!':'Minimal gain.')];
      return goodNarr[Math.floor(Math.random()*goodNarr.length)];
    }
  }

  // ===== END DRIVE =====
  function endDrive(result){
    var stats={plays:playNum,yards:totalYards,turnovers:turnovers};
    if(result==='td'){
      offScore+=7;
    }
    var finalResult;
    if(isOff){
      finalResult=result==='td'?'win':'loss';
    } else {
      finalResult=result==='td'?'loss':'win';
    }
    setTimeout(function(){
      setGs({screen:'result',team:GS.team,side:GS.side,roster:GS.roster,hand:GS.hand,
        result:finalResult,
        finalScore:{off:result==='td'?offScore:SCENARIO.offScore,def:defScore},
        driveStats:stats});
    },1200);
  }

  // ===== SNAP LOGIC =====
  snapBtn.onclick=function(){
    if(selIdx<0||animating) return;
    animating=true;
    playNum++;
    SND.snap();

    var myCard=myHand[selIdx];
    var playedIdx=selIdx;
    selIdx=-1;

    // AI picks
    var aiCard;
    if(isOff){
      aiCard=aiPickDefense(opp.id,aiHand,lastAiPlay);
    } else {
      aiCard=aiPickOffense(opp.id,aiHand,lastAiPlay);
    }
    lastAiPlay=aiCard?aiCard.id:null;

    // Resolve matchup
    var mt,tier,offCard,defCard;
    if(isOff){
      offCard=myCard;defCard=aiCard;
      mt=getMatchupTable(team.id,opp.id);
    } else {
      offCard=aiCard;defCard=myCard;
      mt=getMatchupTable(opp.id,team.id);
    }
    tier=mt[offCard.id][defCard.id];
    var yards=rollYards(tier);
    var turnover=isTurnover(tier);

    // Hide snap button
    snapBtn.style.display='none';

    // Clear prompt + result area
    pickPrompt.style.display='none';
    resultArea.innerHTML='';

    // 0ms: my card slides in
    mySlot.innerHTML='';
    mySlot.style.border='none';
    var myClash=renderClashCard(myCard,true,team.accent);
    myClash.style.cssText+=';animation:sup .3s ease-out both;';
    mySlot.appendChild(myClash);

    // 300ms: AI card appears face-down
    setTimeout(function(){
      aiSlot.innerHTML='';
      aiSlot.style.border='none';
      var aiDown=renderClashCard(aiCard,false);
      aiDown.style.cssText+=';animation:sup .3s ease-out both;';
      aiSlot.appendChild(aiDown);
    },300);

    // 800ms: flip AI card, flash, shake, clash sound
    setTimeout(function(){
      SND.clash();
      aiSlot.innerHTML='';
      var aiUp=renderClashCard(aiCard,true,opp.accent);
      aiUp.style.cssText+=';animation:pop .35s ease-out both;';
      aiSlot.appendChild(aiUp);

      // Flash overlay
      var flash=document.createElement('div');
      flash.style.cssText='position:absolute;inset:0;background:rgba(255,255,255,.25);z-index:10;pointer-events:none;';
      clash.appendChild(flash);
      setTimeout(function(){flash.remove();},120);

      // Shake
      clash.style.animation='none';
      clash.offsetHeight;
      clash.style.transition='transform 0.08s';
      clash.style.transform='translateX(4px)';
      setTimeout(function(){clash.style.transform='translateX(-4px)';},60);
      setTimeout(function(){clash.style.transform='translateX(2px)';},120);
      setTimeout(function(){clash.style.transform='none';},180);
    },800);

    // 1100ms: yard result punches in
    setTimeout(function(){
      var yardColor;
      if(turnover){
        yardColor='var(--danger)';
      } else if(isOff){
        yardColor=tier==='O+'?'var(--green)':tier==='N'?'var(--gold)':'var(--danger)';
      } else {
        yardColor=tier==='D+'?'var(--green)':tier==='N'?'var(--gold)':'var(--danger)';
      }
      var yardText;
      if(turnover){
        yardText='TURNOVER!';
        SND.turnover();
      } else {
        yardText=(yards>0?'+':'')+yards+' YDS';
      }
      var yardEl=document.createElement('div');
      yardEl.style.cssText="font-family:'Bebas Neue',sans-serif;font-size:36px;color:"+yardColor+';letter-spacing:3px;text-shadow:0 0 16px '+yardColor+';animation:pop .35s ease-out both;';
      yardEl.textContent=yardText;
      resultArea.appendChild(yardEl);
    },1100);

    // 1400ms: narrative fades in
    setTimeout(function(){
      var narrText=genNarrative(tier,yards,myCard,aiCard,turnover);
      var narrEl=document.createElement('div');
      narrEl.style.cssText='font-size:13px;color:var(--text);font-weight:600;line-height:1.4;opacity:0;animation:fi .4s ease-out .05s both;max-width:280px;text-align:center;';
      narrEl.textContent=narrText;
      resultArea.appendChild(narrEl);
    },1400);

    // 1700ms: Next play button fades in / process result
    setTimeout(function(){
      // Update game state
      if(!turnover){
        totalYards+=yards;
        ballOn=Math.max(0,ballOn-yards);
      } else {
        turnovers++;
      }
      var cost=clockCost(offCard.id);
      clock=Math.max(0,clock-cost);

      // Check end conditions
      var driveOver=false;
      if(ballOn<=0){
        // TD
        if(yards>0){
          SND.td();
        }
        endDrive('td');
        driveOver=true;
      } else if(turnover){
        endDrive('turnover');
        driveOver=true;
      } else if(clock<=0){
        endDrive('clock');
        driveOver=true;
      } else {
        // Down logic
        if(yards>=dist){
          // First down
          down=1;
          dist=Math.min(10,ballOn);
        } else {
          dist=Math.max(1,dist-Math.max(0,yards));
          down++;
          if(down>4){
            endDrive('downs');
            driveOver=true;
          }
        }
      }

      if(!driveOver){
        // Show next play button
        nextBtn.style.cssText='padding:10px 24px;font-size:8px;animation:fi .3s ease-out both;';
        nextBtn.style.pointerEvents='auto';
        nextBtn.onclick=function(){
          SND.click();
          animating=false;
          // Replace played card
          if(newCardIndices[playedIdx]) delete newCardIndices[playedIdx];
          if(myDeck.length>0){
            var newCard=myDeck.shift();
            myHand[playedIdx]=newCard;
            newCardIndices[playedIdx]=true;
          } else {
            myHand.splice(playedIdx,1);
          }
          // Replace AI card
          var aiIdx=aiHand.indexOf(aiCard);
          if(aiIdx>=0){
            if(aiDeck.length>0) aiHand[aiIdx]=aiDeck.shift();
            else aiHand.splice(aiIdx,1);
          }
          // Update field + scorebug
          updateScoreBug();
          updateField();
          // Reset clash zone
          resetClash();
          renderHand();
          updateSnapBtn();
          snapBtn.style.display='block';
        };
      }
    },1700);
  };

  function resetClash(){
    pickPrompt.style.display='block';
    pickPrompt.textContent='PICK YOUR PLAY';
    resultArea.innerHTML='';
    nextBtn.style.cssText='padding:10px 24px;font-size:8px;opacity:0;pointer-events:none;';
    mySlot.innerHTML='<div class="px" style="font-size:6px;color:var(--muted);letter-spacing:1px;">YOU</div>';
    mySlot.style.border='2px dashed var(--muted)';
    aiSlot.innerHTML='<div class="px" style="font-size:6px;color:var(--muted);letter-spacing:1px;">AI</div>';
    aiSlot.style.border='2px dashed var(--muted)';
  }

  renderHand();
  updateSnapBtn();
  return el;
}

// ===== RESULT SCREEN =====
function buildResult(){
  var el=document.createElement('div');
  el.style.cssText='min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;background:var(--bg);position:relative;overflow:hidden;';

  var isWin=GS.result==='win';
  var stats=GS.driveStats||{plays:0,yards:0,turnovers:0};
  var score=GS.finalScore||{off:SCENARIO.offScore,def:SCENARIO.defScore};
  var team=getTeam(GS.team);
  var opp=getOtherTeam(GS.team);

  // Streak tracking
  var streakKey='torch_streak';
  var lastPlayKey='torch_last_play';
  var today=new Date().toDateString();
  var lastPlay=localStorage.getItem(lastPlayKey);
  var streak=parseInt(localStorage.getItem(streakKey)||'0',10);
  if(lastPlay!==today){
    if(isWin){
      streak++;
    } else {
      streak=0;
    }
    localStorage.setItem(streakKey,String(streak));
    localStorage.setItem(lastPlayKey,today);
  }

  // Save result for bonus round check
  var bonusKey='torch_bonus_'+today;
  var bonusSide=GS.side==='offense'?'defense':'offense';
  var alreadyPlayedBonus=localStorage.getItem(bonusKey)==='played';

  if(isWin){
    SND.td();

    // Blackout fade-in
    el.style.opacity='0';
    el.style.animation='fi .8s ease-out .2s both';

    // Flame CSS animation (large torch fire)
    var flameWrap=document.createElement('div');
    flameWrap.style.cssText='position:relative;width:120px;height:120px;margin-bottom:12px;';
    var flameInner=document.createElement('div');
    flameInner.style.cssText='font-size:80px;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;animation:fire 1.35s ease-in-out infinite;filter:drop-shadow(0 0 30px rgba(255,100,0,.6)) drop-shadow(0 0 60px rgba(255,200,0,.3));';
    flameInner.textContent='\uD83D\uDD25';
    var flameGlow=document.createElement('div');
    flameGlow.style.cssText='position:absolute;inset:-20px;border-radius:50%;background:radial-gradient(circle,rgba(255,150,0,.2),transparent 70%);animation:pulse 2s ease-in-out infinite;';
    flameWrap.append(flameGlow,flameInner);
    el.appendChild(flameWrap);

    var title=document.createElement('div');
    title.className='gg';
    title.style.cssText="font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:8px;line-height:1;animation:pop .5s ease-out .4s both;opacity:0;";
    title.textContent='TORCH LIT';
    el.appendChild(title);

    var sub=document.createElement('div');
    sub.style.cssText="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text);letter-spacing:3px;margin-top:8px;opacity:0;animation:fi .5s ease-out .7s both;";
    sub.textContent=GS.side==='offense'?'YOU TORCHED THE DEFENSE':'YOUR DEFENSE HELD STRONG';
    el.appendChild(sub);
  } else {
    SND.turnover();

    el.style.opacity='0';
    el.style.animation='fi .8s ease-out .2s both';

    // Dying flame
    var dyingWrap=document.createElement('div');
    dyingWrap.style.cssText='position:relative;width:100px;height:100px;margin-bottom:12px;';
    var dyingFlame=document.createElement('div');
    dyingFlame.style.cssText='font-size:60px;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:.4;filter:grayscale(.5);animation:fire 2s ease-in-out infinite;';
    dyingFlame.textContent='\uD83D\uDD25';
    dyingWrap.appendChild(dyingFlame);
    el.appendChild(dyingWrap);

    var title=document.createElement('div');
    title.style.cssText="font-family:'Bebas Neue',sans-serif;font-size:64px;letter-spacing:8px;line-height:1;color:var(--danger);text-shadow:0 0 20px rgba(255,36,36,.4);animation:pop .5s ease-out .4s both;opacity:0;";
    title.textContent='TORCH OUT';
    el.appendChild(title);

    var sub=document.createElement('div');
    sub.style.cssText="font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--text);letter-spacing:3px;margin-top:8px;opacity:0;animation:fi .5s ease-out .7s both;";
    sub.textContent=GS.side==='offense'?'THE DEFENSE HELD':'THE OFFENSE SCORED';
    el.appendChild(sub);
  }

  // Final score
  var scoreBox=document.createElement('div');
  scoreBox.className='sb-cell';
  scoreBox.style.cssText='margin-top:24px;padding:16px 32px;text-align:center;opacity:0;animation:fi .5s ease-out .9s both;';
  var homeTeamName=GS.side==='offense'?team.abbr:opp.abbr;
  var awayTeamName=GS.side==='offense'?opp.abbr:team.abbr;
  scoreBox.innerHTML='<div class="sb-label" style="margin-bottom:6px;">FINAL SCORE</div>'+
    '<div style="display:flex;align-items:center;justify-content:center;gap:12px;">'+
      '<span style="font-family:\'Bebas Neue\',sans-serif;font-size:16px;color:var(--text);letter-spacing:2px;">'+homeTeamName+'</span>'+
      '<span class="sb-led-gold" style="font-size:28px;">'+score.off+'</span>'+
      '<span class="sb-led" style="font-size:16px;">\u2014</span>'+
      '<span class="sb-led-gold" style="font-size:28px;">'+score.def+'</span>'+
      '<span style="font-family:\'Bebas Neue\',sans-serif;font-size:16px;color:var(--text);letter-spacing:2px;">'+awayTeamName+'</span>'+
    '</div>';
  el.appendChild(scoreBox);

  // Drive stats
  var statBox=document.createElement('div');
  statBox.style.cssText='margin-top:20px;display:flex;gap:20px;justify-content:center;opacity:0;animation:fi .5s ease-out 1.1s both;';
  [{label:'PLAYS',val:stats.plays},{label:'YARDS',val:stats.yards},{label:'TURNOVERS',val:stats.turnovers}].forEach(function(s){
    var cell=document.createElement('div');
    cell.style.cssText='text-align:center;';
    cell.innerHTML='<div class="px" style="font-size:5px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;">'+s.label+'</div>'+
      '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:32px;color:var(--cyan);letter-spacing:2px;">'+s.val+'</div>';
    statBox.appendChild(cell);
  });
  el.appendChild(statBox);

  // Streak
  var streakBox=document.createElement('div');
  streakBox.style.cssText='margin-top:16px;opacity:0;animation:fi .5s ease-out 1.3s both;';
  if(streak>0){
    streakBox.innerHTML='<div class="px" style="font-size:5px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;">STREAK</div>'+
      '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:28px;color:var(--orange);letter-spacing:2px;text-shadow:0 0 12px rgba(255,102,51,.4);">'+streak+' \uD83D\uDD25</div>';
  } else {
    streakBox.innerHTML='<div class="px" style="font-size:5px;color:var(--muted);letter-spacing:1px;">STREAK RESET</div>';
  }
  el.appendChild(streakBox);

  // Buttons
  var btnWrap=document.createElement('div');
  btnWrap.style.cssText='margin-top:24px;width:100%;max-width:300px;opacity:0;animation:fi .5s ease-out 1.5s both;display:flex;flex-direction:column;gap:10px;';

  // Share button
  var shareBtn=document.createElement('button');
  shareBtn.className='btn bo';
  shareBtn.style.cssText='width:100%;padding:14px;font-size:8px;letter-spacing:2px;';
  shareBtn.textContent='\uD83D\uDCCB SHARE RESULT';
  shareBtn.onclick=function(){
    SND.click();
    var emoji=isWin?'\uD83D\uDD25':'\uD83D\uDCA8';
    var result=isWin?'TORCH LIT':'TORCH OUT';
    var shareText='TORCH '+emoji+' '+result+'\n'+
      homeTeamName+' '+score.off+' - '+score.def+' '+awayTeamName+'\n'+
      stats.plays+' plays | '+stats.yards+' yds | '+stats.turnovers+' TO\n'+
      (streak>0?'\uD83D\uDD25 Streak: '+streak+'\n':'')+
      'torch-two.vercel.app';
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(shareText).then(function(){
        shareBtn.textContent='\u2705 COPIED!';
        setTimeout(function(){shareBtn.textContent='\uD83D\uDCCB SHARE RESULT';},2000);
      });
    } else {
      // Fallback
      var ta=document.createElement('textarea');ta.value=shareText;ta.style.cssText='position:fixed;left:-9999px;';
      document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();
      shareBtn.textContent='\u2705 COPIED!';
      setTimeout(function(){shareBtn.textContent='\uD83D\uDCCB SHARE RESULT';},2000);
    }
  };
  btnWrap.appendChild(shareBtn);

  if(isWin&&!alreadyPlayedBonus){
    var bonusBtn=document.createElement('button');
    bonusBtn.className='btn bg';
    bonusBtn.style.cssText='width:100%;padding:16px;font-size:9px;letter-spacing:2px;';
    bonusBtn.textContent='\u26A1 BONUS ROUND: PLAY '+bonusSide.toUpperCase();
    bonusBtn.onclick=function(){
      SND.snap();
      localStorage.setItem(bonusKey,'played');
      setGs({screen:'setup',team:null,side:null,bonusSide:bonusSide});
    };
    btnWrap.appendChild(bonusBtn);
  } else if(isWin&&alreadyPlayedBonus){
    var perfectBox=document.createElement('div');
    perfectBox.style.cssText="font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);letter-spacing:4px;text-shadow:0 0 16px rgba(255,215,0,.5);text-align:center;padding:8px;";
    perfectBox.textContent='\uD83D\uDD25 PERFECT TORCH \uD83D\uDD25';
    btnWrap.appendChild(perfectBox);
  }

  var homeBtn=document.createElement('button');
  homeBtn.className='btn '+(isWin?'bp':'bp');
  homeBtn.style.cssText='width:100%;padding:14px;font-size:9px;letter-spacing:2px;';
  homeBtn.textContent=isWin?'\uD83C\uDFE0 HOME':'\uD83D\uDD25 COME BACK TOMORROW';
  homeBtn.onclick=function(){SND.click();GS=null;render();};
  btnWrap.appendChild(homeBtn);
  el.appendChild(btnWrap);

  return el;
}

// ===== INIT =====
render();
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js');}
</script>
