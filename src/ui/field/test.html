<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TORCH Field — Game State Test</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@300..700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#050505;display:flex;flex-direction:column;align-items:center;padding:12px;font-family:'Teko',sans-serif;color:#fff;max-width:400px;margin:0 auto}
  h1{font-size:16px;letter-spacing:4px;color:#EBB010;margin-bottom:2px}
  .sub{font-size:10px;color:#555;letter-spacing:2px;margin-bottom:8px}

  .scorebug{width:100%;display:flex;justify-content:space-between;align-items:center;padding:6px 12px;background:#0E0A04;border-radius:6px;margin-bottom:4px}
  .team{text-align:center}
  .team-name{font-size:14px;font-weight:700;letter-spacing:1px}
  .team-score{font-size:22px;font-weight:700;font-family:'Rajdhani'}
  .game-info{text-align:center;font-size:11px;color:#888;letter-spacing:1px}
  .game-info .down{color:#FF6B00;font-size:14px;font-weight:700}

  .field-wrap{border-radius:6px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.8);width:100%}

  .section{margin-top:8px;width:100%}
  .section-label{font-size:10px;color:#FF6B00;letter-spacing:2px;margin-bottom:3px}
  .controls{display:flex;gap:3px;flex-wrap:wrap}
  button{background:#1a1a1a;border:1px solid #333;color:#aaa;font-family:'Teko';font-size:11px;padding:3px 7px;cursor:pointer;border-radius:3px;letter-spacing:1px;min-height:32px}
  button:hover{background:#222;color:#fff}
  button.active{background:#FF4511;color:#000;border-color:#FF4511}
  .play-btn{border-color:#00ff4444}
  .play-btn:hover{color:#00ff44}
  .play-btn.bad{border-color:#ff444444}
  .play-btn.bad:hover{color:#ff4444}
  .play-btn.td{border-color:#EBB01044}
  .play-btn.td:hover{color:#EBB010}

  .drive-log{margin-top:8px;width:100%;max-height:120px;overflow-y:auto;font-family:'Rajdhani';font-size:11px}
  .drive-log div{padding:2px 6px;border-bottom:1px solid #1a1a1a;display:flex;justify-content:space-between}
  .drive-log .yards{font-weight:700}
  .drive-log .positive{color:#00ff44}
  .drive-log .negative{color:#ff4444}
  .drive-log .special{color:#EBB010}

  /* Dev controls panel */
  .dev-panel{width:100%;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;margin-top:8px;overflow:hidden}
  .dev-panel-header{font-size:10px;color:#FF6B00;letter-spacing:2px;padding:4px 8px;background:#111;border-bottom:1px solid #1a1a1a}
  .dev-row{border-bottom:1px solid #111}
  .dev-row:last-child{border-bottom:none}
  .dev-row label{font-size:10px;color:#888;display:block;padding:4px 8px 0;}
  .dev-row-inner{padding:2px 8px 4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  input[type=range]{flex:1;accent-color:#EBB010}
  input[type=number]{background:#1a1a1a;color:#fff;border:1px solid #333;padding:2px 4px;font-family:'Teko';font-size:12px;border-radius:3px;width:60px}

  #eventLog{max-height:80px;overflow-y:auto;font-size:9px;color:#666;padding:4px 8px;background:#0a0a0a;border-top:1px solid #1a1a1a;font-family:'Rajdhani'}
</style>
</head>
<body>
<h1>TORCH FIELD — GAME SIM</h1>
<div class="sub">FORMATIONS · PLAY TYPES · ANIMATIONS</div>

<div class="scorebug">
  <div class="team">
    <div class="team-name" id="offTeam" style="color:#85C1E9">SPECTRES</div>
    <div class="team-score" id="offScore">0</div>
  </div>
  <div class="game-info">
    <div class="down" id="downDist">1ST & 10</div>
    <div id="ballPos">OWN 25</div>
    <div id="halfInfo">1ST HALF · 0/20</div>
  </div>
  <div class="team">
    <div class="team-name" id="defTeam" style="color:#FF7EB3">DOLPHINS</div>
    <div class="team-score" id="defScore">0</div>
  </div>
</div>

<div class="field-wrap" id="wrap"></div>

<div class="section">
  <div class="section-label">TEAM</div>
  <div class="controls" id="teams"></div>
</div>

<div class="section">
  <div class="section-label">PLAY TYPE → AUTO-SELECTS FORMATION</div>
  <div class="controls" id="playTypes"></div>
</div>

<div class="section">
  <div class="section-label">SNAP — TAP TO RESOLVE</div>
  <div class="controls" id="results"></div>
</div>

<div class="section">
  <div class="section-label">MANUAL FORMATION</div>
  <div class="controls" id="formations"></div>
</div>

<!-- Dev controls panel -->
<div class="dev-panel">
  <div class="dev-panel-header">DEV CONTROLS</div>

  <!-- 1. Ball position slider -->
  <div class="dev-row">
    <label>BALL POSITION</label>
    <div class="dev-row-inner">
      <input type="range" id="yardSlider" min="10" max="110" value="25">
      <span id="yardLabel" style="font-size:10px;color:#EBB010;white-space:nowrap;">OWN 25</span>
    </div>
  </div>

  <!-- 2. Custom yards + play -->
  <div class="dev-row">
    <label>CUSTOM YARDS</label>
    <div class="dev-row-inner">
      <input type="number" id="customYards" value="8" min="-15" max="50">
      <button id="playCustom" style="background:#1a3a1a;border-color:#00ff4444;color:#00ff44;">PLAY</button>
      <button id="playCustomRun" style="background:#1a2a1a;border-color:#00cc3344;color:#00cc33;">RUN</button>
    </div>
  </div>

  <!-- 3. Defense scheme -->
  <div class="dev-row">
    <label>DEF SCHEME</label>
    <div class="dev-row-inner" id="defSchemes"></div>
  </div>

  <!-- 4. Replay + 5. Speed -->
  <div class="dev-row">
    <div class="dev-row-inner" style="justify-content:space-between;">
      <button id="replay" style="background:#1a1a2a;border-color:#4488FF44;color:#4488FF;">REPLAY LAST</button>
      <div id="speedSelect" style="display:flex;gap:4px;"></div>
    </div>
  </div>

  <!-- 6. Event log -->
  <div id="eventLog"></div>
</div>

<div class="drive-log" id="log"></div>

<script type="module">
import { createFieldAnimator } from './fieldAnimator.js';

// Game state
let offTeam = 'stags';
let defTeam = 'wolves';
let ballYard = 25;
let down = 1;
let distance = 10;
let offScore = 0;
let defScore = 0;
let snaps = 0;
let currentPlayType = 'SHORT';
let currentFormation = 'shotgun_deuce';
let defScheme = 'ZONE';

// Replay state
let _lastType = null;
let _lastYards = 0;

// Speed state (wired visually, no fieldAnimator param yet)
let _speed = 1;

const TEAM_COLORS = {
  sentinels: { name: 'BOARS', color: '#C4A265' },
  wolves: { name: 'DOLPHINS', color: '#FF7EB3' },
  stags: { name: 'SPECTRES', color: '#85C1E9' },
  serpents: { name: 'SERPENTS', color: '#39FF14' },
};

const DOWN_LABELS = ['', '1ST', '2ND', '3RD', '4TH'];

function ballLabel(yard) {
  var ydsToEz = 110 - yard;
  return ydsToEz <= 50 ? 'OPP ' + ydsToEz : 'OWN ' + (yard - 10);
}

function logEvent(msg) {
  var el = document.getElementById('eventLog');
  var ts = new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
  var line = document.createElement('div');
  line.textContent = ts + '  ' + msg;
  el.insertBefore(line, el.firstChild);
  // Keep to 30 lines
  while (el.children.length > 30) el.removeChild(el.lastChild);
}

document.fonts.ready.then(() => {
  const field = createFieldAnimator(375, 360);
  document.getElementById('wrap').appendChild(field.canvas);

  function getFormation(playType, team) {
    var picked = field.pickFormation(team, playType);
    if (picked) return picked;
    var teamOverrides = field.TEAM_FORMATION_MAP[team] || {};
    return teamOverrides[playType] || field.PLAY_FORMATION_MAP[playType] || 'shotgun_deuce';
  }

  function getState() {
    return {
      ballYard: ballYard,
      losYard: ballYard,
      firstDownYard: Math.min(ballYard + distance, 110),
      formation: currentFormation,
      playType: currentPlayType,
      defScheme: defScheme,
      offTeam: offTeam,
      defTeam: defTeam
    };
  }

  function updateUI() {
    var ot = TEAM_COLORS[offTeam], dt = TEAM_COLORS[defTeam];
    document.getElementById('offTeam').textContent = ot.name;
    document.getElementById('offTeam').style.color = ot.color;
    document.getElementById('defTeam').textContent = dt.name;
    document.getElementById('defTeam').style.color = dt.color;
    document.getElementById('offScore').textContent = offScore;
    document.getElementById('defScore').textContent = defScore;
    var ydsToEz = 110 - ballYard;
    document.getElementById('downDist').textContent = DOWN_LABELS[down] + ' & ' + (distance <= ydsToEz ? distance : 'GOAL');
    document.getElementById('ballPos').textContent = 'BALL ON ' + ballLabel(ballYard);
    document.getElementById('halfInfo').textContent = '1ST HALF · ' + snaps + '/20';
    // Sync slider
    document.getElementById('yardSlider').value = ballYard;
    document.getElementById('yardLabel').textContent = ballLabel(ballYard);
  }

  function draw() {
    field.render(getState());
    updateUI();
  }

  function logPlay(desc, yards, cls) {
    var log = document.getElementById('log');
    var d = document.createElement('div');
    d.innerHTML = '<span>' + desc + '</span><span class="yards ' + cls + '">' + (yards >= 0 ? '+' : '') + yards + '</span>';
    log.insertBefore(d, log.firstChild);
  }

  function resolvePlay(type, yards) {
    var oldBall = ballYard;
    snaps++;

    // Store for replay
    _lastType = type;
    _lastYards = yards;

    var t0 = Date.now();

    // Play the animation
    field.playSequence(type, yards, getState());

    var timeout = (type === 'touchdown' || type === 'interception') ? 5000 : 4500;

    // Update game state after animation
    setTimeout(function() {
      var duration = ((Date.now() - t0) / 1000).toFixed(1);
      logEvent('PLAY ' + type.toUpperCase() + ' ' + (yards >= 0 ? '+' : '') + yards + ' yds  (' + duration + 's)');

      if (type === 'touchdown') {
        offScore += 7;
        logPlay(TEAM_COLORS[offTeam].name + ' TOUCHDOWN!', yards, 'special');
        ballYard = 25; down = 1; distance = 10;
      } else if (type === 'interception') {
        logPlay('INTERCEPTION!', 0, 'negative');
        var temp = offTeam; offTeam = defTeam; defTeam = temp;
        ballYard = Math.max(20, 110 - ballYard); down = 1; distance = 10;
      } else if (type === 'sack') {
        logPlay('SACK! -' + yards + ' yds', -yards, 'negative');
        ballYard = Math.max(1, ballYard - yards);
        distance += yards;
        down++;
      } else if (type === 'incomplete') {
        logPlay('Incomplete', 0, 'negative');
        down++;
      } else {
        logPlay(yards + '-yd ' + (type === 'run' ? 'Run' : 'Pass'), yards, 'positive');
        ballYard = Math.min(109, ballYard + yards);
        if (yards >= distance) {
          down = 1; distance = Math.min(10, 110 - ballYard);
        } else {
          distance -= yards; down++;
        }
      }

      // Turnover on downs
      if (down > 4) {
        logPlay('TURNOVER ON DOWNS', 0, 'negative');
        var temp2 = offTeam; offTeam = defTeam; defTeam = temp2;
        down = 1; distance = 10;
      }

      // Update formation for current play type
      currentFormation = getFormation(currentPlayType, offTeam);

      // Brief pause before scrolling to new position
      setTimeout(function() {
        field.scrollTo(oldBall, ballYard, 800);
        setTimeout(function() {
          draw();
        }, 850);
      }, 400);
    }, timeout);
  }

  // Team buttons
  var teamDiv = document.getElementById('teams');
  ['sentinels','wolves','stags','serpents'].forEach(function(t) {
    var btn = document.createElement('button');
    btn.textContent = TEAM_COLORS[t].name;
    btn.style.color = TEAM_COLORS[t].color;
    btn.onclick = function() {
      offTeam = t;
      var others = ['sentinels','wolves','stags','serpents'].filter(function(x) { return x !== t; });
      defTeam = others[Math.floor(Math.random() * others.length)];
      currentFormation = getFormation(currentPlayType, offTeam);
      draw();
    };
    teamDiv.appendChild(btn);
  });

  // Play type buttons
  var ptDiv = document.getElementById('playTypes');
  ['DEEP','SHORT','QUICK','SCREEN','RUN'].forEach(function(pt) {
    var btn = document.createElement('button');
    btn.textContent = pt;
    btn.className = pt === currentPlayType ? 'active' : '';
    btn.onclick = function() {
      currentPlayType = pt;
      currentFormation = getFormation(pt, offTeam);
      ptDiv.querySelectorAll('button').forEach(function(b) { b.className = ''; });
      btn.className = 'active';
      draw();
    };
    ptDiv.appendChild(btn);
  });

  // Result buttons
  var resDiv = document.getElementById('results');
  [
    { label: '8-YD PASS', type: 'complete', yards: 8, cls: 'play-btn' },
    { label: '18-YD DEEP', type: 'complete', yards: 18, cls: 'play-btn' },
    { label: '4-YD RUN', type: 'run', yards: 4, cls: 'play-btn' },
    { label: '12-YD RUN', type: 'run', yards: 12, cls: 'play-btn' },
    { label: 'SACK', type: 'sack', yards: 6, cls: 'play-btn bad' },
    { label: 'INC', type: 'incomplete', yards: 0, cls: 'play-btn bad' },
    { label: 'INT', type: 'interception', yards: 0, cls: 'play-btn bad' },
    { label: 'TD', type: 'touchdown', yards: 30, cls: 'play-btn td' },
  ].forEach(function(r) {
    var btn = document.createElement('button');
    btn.textContent = r.label;
    btn.className = r.cls;
    btn.onclick = function() { resolvePlay(r.type, r.yards); };
    resDiv.appendChild(btn);
  });

  // Manual formation buttons
  var fDiv = document.getElementById('formations');
  var CANONICAL = ['shotgun_deuce','trips','twins','bunch','iform_pistol','empty'];
  CANONICAL.forEach(function(f) {
    var btn = document.createElement('button');
    btn.textContent = f.replace(/_/g, ' ').toUpperCase();
    btn.onclick = function() {
      currentFormation = f;
      draw();
    };
    fDiv.appendChild(btn);
  });

  // --- DEV CONTROLS ---

  // 1. Yard position slider
  var slider = document.getElementById('yardSlider');
  slider.oninput = function() {
    ballYard = parseInt(slider.value);
    document.getElementById('yardLabel').textContent = ballLabel(ballYard);
    draw();
  };

  // 2. Custom yards play
  document.getElementById('playCustom').onclick = function() {
    var yds = parseInt(document.getElementById('customYards').value) || 0;
    resolvePlay('complete', yds);
  };
  document.getElementById('playCustomRun').onclick = function() {
    var yds = parseInt(document.getElementById('customYards').value) || 0;
    resolvePlay('run', yds);
  };

  // 3. Defense scheme selector
  var defDiv = document.getElementById('defSchemes');
  ['ZONE','MAN','BLITZ'].forEach(function(s) {
    var btn = document.createElement('button');
    btn.textContent = s;
    btn.className = s === defScheme ? 'active' : '';
    btn.onclick = function() {
      defScheme = s;
      defDiv.querySelectorAll('button').forEach(function(b) { b.className = ''; });
      btn.className = 'active';
      logEvent('DEF SCHEME → ' + s);
      draw();
    };
    defDiv.appendChild(btn);
  });

  // 4. Replay button
  document.getElementById('replay').onclick = function() {
    if (_lastType === null) {
      logEvent('NO PLAY TO REPLAY');
      return;
    }
    logEvent('REPLAY ' + _lastType.toUpperCase() + ' ' + (_lastYards >= 0 ? '+' : '') + _lastYards + ' yds');
    field.playSequence(_lastType, _lastYards, getState());
  };

  // 5. Speed selector (visual only — no fieldAnimator param yet)
  var speedDiv = document.getElementById('speedSelect');
  [0.5, 1, 2].forEach(function(s) {
    var btn = document.createElement('button');
    btn.textContent = s + 'x';
    btn.style.minWidth = '36px';
    btn.className = s === _speed ? 'active' : '';
    btn.onclick = function() {
      _speed = s;
      speedDiv.querySelectorAll('button').forEach(function(b) { b.className = ''; });
      btn.className = 'active';
      logEvent('SPEED → ' + s + 'x  (visual only, wiring TBD)');
    };
    speedDiv.appendChild(btn);
  });

  // Init
  currentFormation = getFormation(currentPlayType, offTeam);
  logEvent('FIELD TEST READY');
  draw();
});
</script>
</body>
</html>
