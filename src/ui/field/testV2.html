<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TORCH Field — V2 Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050505; color: #ccc; font-family: 'Teko', sans-serif; max-width: 400px; margin: 0 auto; overflow-y: auto; }
  #wrap { position: relative; width: 375px; height: 260px; margin: 8px auto; border-radius: 8px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
  #wrap canvas { position: absolute; top: 0; left: 0; }
  .row { display: flex; gap: 4px; padding: 4px 8px; flex-wrap: wrap; }
  .btn { font-family: 'Teko', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 1px;
         padding: 6px 10px; border-radius: 4px; border: 1px solid #333; background: #1a1a1a;
         color: #888; cursor: pointer; min-height: 32px; flex: 1; text-align: center; }
  .btn:active { background: #2a2a2a; }
  .btn.active { background: #FF4511; color: #000; border-color: #FF4511; }
  .section { font-size: 10px; color: #555; letter-spacing: 2px; padding: 6px 8px 2px; }
  #log { max-height: 100px; overflow-y: auto; font-family: 'Rajdhani', sans-serif; font-size: 10px;
         color: #666; padding: 4px 8px; background: #0a0a0a; border-top: 1px solid #1a1a1a; }
  .log-entry { padding: 1px 0; border-bottom: 1px solid #111; }
  select { background: #1a1a1a; color: #ccc; border: 1px solid #333; padding: 4px 8px; border-radius: 4px;
           font-family: 'Rajdhani', sans-serif; font-size: 12px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;700&family=Rajdhani:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="section">TORCH FIELD V2 — PHASE 2 TEST</div>

<!-- Canvas container -->
<div id="wrap"></div>

<!-- Team select -->
<div class="section">TEAMS</div>
<div class="row" id="teams"></div>

<!-- Play type -->
<div class="section">PLAY TYPE</div>
<div class="row" id="playTypes"></div>

<!-- Formation override -->
<div class="section">FORMATION</div>
<div class="row" id="formations"></div>

<!-- Ball position -->
<div class="section">FIELD POSITION</div>
<div class="row">
  <input type="range" id="yardSlider" min="10" max="110" value="35" style="flex:1;">
  <span id="yardLabel" style="font-size:11px;color:#EBB010;min-width:60px;text-align:right;">OWN 25</span>
</div>

<!-- Play Results -->
<div class="section">SNAP RESULT</div>
<div class="row" id="results"></div>
<div class="row">
  <input type="number" id="customYards" value="8" min="-15" max="50" style="width:60px;background:#1a1a1a;color:#fff;border:1px solid #333;padding:4px;border-radius:4px;">
  <button class="btn" id="playCustom" style="color:#EBB010;border-color:#EBB010;">CUSTOM</button>
  <button class="btn" id="playRandom" style="color:#39FF14;border-color:#39FF14;">RANDOM</button>
</div>

<!-- Event log -->
<div class="section">LOG</div>
<div id="log"></div>

<script type="module">
import { createFieldAnimatorV2 } from './fieldAnimatorV2.js';

// ── Init ──
var wrap = document.getElementById('wrap');
var field = createFieldAnimatorV2(375, 260);

// Single canvas — field is blitted then dots drawn on same surface
field.canvas.style.cssText = 'position:absolute;top:0;left:0;width:375px;height:260px;pointer-events:none;touch-action:none;';
wrap.appendChild(field.canvas);

// ── State ──
var offTeam = 'sentinels';
var defTeam = 'serpents';
var playType = 'SHORT';
var currentFormation = null; // null = auto-pick
var ballYard = 35;

function draw() {
  field.updateFieldPosition(ballYard, ballYard, Math.min(ballYard + 10, 110));
  field.showFormation(offTeam, defTeam, playType);
}

function logEvent(text) {
  var log = document.getElementById('log');
  var entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.textContent = new Date().toLocaleTimeString() + ' — ' + text;
  log.insertBefore(entry, log.firstChild);
  if (log.children.length > 30) log.removeChild(log.lastChild);
}

// ── Team Buttons ──
var teamIds = ['sentinels', 'wolves', 'stags', 'serpents'];
var teamLabels = ['BOARS', 'DOLPHINS', 'SPECTRES', 'SERPENTS'];
var teamColors = ['#FFB800', '#FFB8D4', '#A8E6FF', '#39FF14'];
var teamsDiv = document.getElementById('teams');
teamIds.forEach(function(tid, idx) {
  var btn = document.createElement('button');
  btn.className = 'btn' + (tid === offTeam ? ' active' : '');
  btn.style.color = teamColors[idx];
  btn.textContent = teamLabels[idx];
  btn.onclick = function() {
    offTeam = tid;
    // Pick different defense
    var others = teamIds.filter(function(t) { return t !== tid; });
    defTeam = others[Math.floor(Math.random() * others.length)];
    teamsDiv.querySelectorAll('.btn').forEach(function(b, i) {
      b.className = 'btn' + (teamIds[i] === offTeam ? ' active' : '');
    });
    logEvent('TEAM → ' + teamLabels[idx] + ' vs ' + defTeam.toUpperCase());
    draw();
  };
  teamsDiv.appendChild(btn);
});

// ── Play Type Buttons ──
var playTypeIds = ['DEEP', 'SHORT', 'QUICK', 'SCREEN', 'RUN'];
var ptDiv = document.getElementById('playTypes');
playTypeIds.forEach(function(pt) {
  var btn = document.createElement('button');
  btn.className = 'btn' + (pt === playType ? ' active' : '');
  btn.textContent = pt;
  btn.onclick = function() {
    playType = pt;
    ptDiv.querySelectorAll('.btn').forEach(function(b, i) {
      b.className = 'btn' + (playTypeIds[i] === playType ? ' active' : '');
    });
    logEvent('PLAY TYPE → ' + pt);
    draw();
  };
  ptDiv.appendChild(btn);
});

// ── Formation Buttons ──
var formIds = ['shotgun_deuce', 'trips', 'twins', 'bunch', 'iform_pistol', 'empty'];
var formLabels = ['SHOTGUN', 'TRIPS', 'TWINS', 'BUNCH', 'I-FORM', 'EMPTY'];
var fmDiv = document.getElementById('formations');
formIds.forEach(function(fid, idx) {
  var btn = document.createElement('button');
  btn.className = 'btn';
  btn.textContent = formLabels[idx];
  btn.onclick = function() {
    currentFormation = fid;
    fmDiv.querySelectorAll('.btn').forEach(function(b, i) {
      b.className = 'btn' + (formIds[i] === currentFormation ? ' active' : '');
    });
    logEvent('FORMATION → ' + formLabels[idx]);
    // Override the formation in state
    field.showFormation(offTeam, defTeam, playType);
    // Manually set formation
    if (field._ctx && field._state) {
      field._state.formation = fid;
      field._renderStaticFrame();
    }
  };
  fmDiv.appendChild(btn);
});

// ── Yard Slider ──
var yardSlider = document.getElementById('yardSlider');
var yardLabel = document.getElementById('yardLabel');
yardSlider.oninput = function() {
  ballYard = parseInt(yardSlider.value);
  var own = ballYard <= 50;
  yardLabel.textContent = own ? 'OWN ' + ballYard : 'OPP ' + (110 - ballYard);
  draw();
};

// ── Result Buttons ──
var resultTypes = [
  { label: '8-YD PASS', yards: 8, isRun: false, color: '#00ff44' },
  { label: '18-YD DEEP', yards: 18, isRun: false, color: '#00ff44' },
  { label: '4-YD RUN', yards: 4, isRun: true, color: '#00ff44' },
  { label: 'SACK', yards: -5, isRun: false, isSack: true, color: '#ff4040' },
  { label: 'INCOMPLETE', yards: 0, isRun: false, isIncomplete: true, color: '#ff4040' },
  { label: 'INT', yards: 0, isRun: false, isInterception: true, color: '#ff4040' },
  { label: 'TD', yards: 25, isRun: false, isTouchdown: true, color: '#EBB010' },
  { label: '12-YD RUN', yards: 12, isRun: true, color: '#00ff44' },
];
var resDiv = document.getElementById('results');
resultTypes.forEach(function(rt) {
  var btn = document.createElement('button');
  btn.className = 'btn';
  btn.style.color = rt.color;
  btn.style.borderColor = rt.color + '44';
  btn.textContent = rt.label;
  btn.onclick = function() {
    logEvent('PLAY → ' + rt.label + ' (' + rt.yards + ' yds)');
    field.animatePlay({
      yards: rt.yards,
      isRun: rt.isRun || false,
      isTouchdown: rt.isTouchdown || false,
      isSack: rt.isSack || false,
      isInterception: rt.isInterception || false,
      isIncomplete: rt.isIncomplete || false,
      isFumbleLost: false,
    });
  };
  resDiv.appendChild(btn);
});

// Custom yards button
document.getElementById('playCustom').onclick = function() {
  var y = parseInt(document.getElementById('customYards').value) || 0;
  logEvent('CUSTOM PLAY → ' + y + ' yds');
  field.animatePlay({ yards: y, isRun: false });
};

// Random play button
document.getElementById('playRandom').onclick = function() {
  var types = ['complete', 'run', 'sack', 'incomplete', 'interception'];
  var t = types[Math.floor(Math.random() * types.length)];
  var y = t === 'sack' ? -(3 + Math.floor(Math.random() * 5)) :
          t === 'incomplete' ? 0 : t === 'interception' ? 0 :
          3 + Math.floor(Math.random() * 20);
  logEvent('RANDOM → ' + t + ' (' + y + ' yds)');
  field.animatePlay({
    yards: y,
    isRun: t === 'run',
    isSack: t === 'sack',
    isIncomplete: t === 'incomplete',
    isInterception: t === 'interception',
  });
};

// ── Initial draw ──
logEvent('FIELD V2 TEST READY — Phase 2');
draw();
</script>
</body>
</html>
