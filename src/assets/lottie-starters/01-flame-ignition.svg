<!--
  TORCH Lottie Starter #1 — Flame Ignition
  Drop into LottieCreator: New Animation → Import → SVG.
  Each path becomes its own layer you can keyframe independently.

  Animation plan (3.0s, 90 frames @ 30fps):
    0.0s — all 4 flame layers + spark hidden (opacity 0)
    0.2s — spark appears center, scales 0→1 (back.out ease)
    0.4s — spark wisps up + fades, smoke wisp drifts up
    0.6s — Layer 1 (outer red) fades in 0→1, scale 0.6→1
    0.8s — Layer 2 (depth shadow) joins, opacity 0→1
    1.0s — Layer 3 (orange body) joins
    1.2s — Layer 4 (hot center) joins, full flame flickers
    1.5–3.0s — flame idles with subtle scale wobble (sy: 1, 1.04, 0.97, 1)
                + hot center hue shift (color keyframe)

  Tip: GROUP the 4 flame paths into one nested group, animate the group's
  scale up from 0 once. Then animate INDIVIDUAL layer opacities for the
  layered fade-in. That gives you 1 scale anim + 4 opacity anims (cheap).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- center the 34-unit flame at 200,200 with 8x scale = 272 unit display -->
  <g id="flame-group" transform="translate(64 64) scale(8)">
