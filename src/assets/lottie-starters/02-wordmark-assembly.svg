<!--
  TORCH Lottie Starter #2 — Wordmark Assembly
  Drop into LottieCreator: New Animation → Import → SVG.

  Animation plan (3.5s, 105 frames @ 30fps):
    0.0–0.4s  — letters T, R, C, H drop in from y:-60, opacity 0→1
                stagger: T@0.0, R@0.08, C@0.24, H@0.32  (skip O slot)
    0.4–0.7s  — football "O" spins in (rotation -360→0), scale 0→1, back.out
    0.7–1.2s  — flame ignites on top of the T (reuse layered fade-in from #1,
                position over the T cap)
    1.2–2.0s  — entire wordmark settles + light shimmer sweep across (gradient mask
                moving left→right, 0.6s duration)
    2.0–3.5s  — idle: flame breathing scale wobble (sy: 1, 1.04, 0.97, 1)

  Layers in this SVG:
    - 4 letter glyphs (T, R, C, H) as solid Teko 900 paths
    - 1 football placeholder (circle for now, swap for footballIcon path in app)
    - 1 flame group (linked to starter #1)

  Tip: LottieCreator can keyframe TEXT as well as paths. If you want, you can
  use a real Teko font in LC and skip the path glyphs entirely — set font,
  type "TORCH", animate per-character (LC has "split text" feature).
  This SVG path-version exists for fallback when font isn't available.

  IMPORTANT: This file uses placeholder rectangle paths for the letters because
  rendering Teko glyphs as paths needs an actual font conversion. In LottieCreator,
  use the TEXT TOOL with Teko 900, type "T R C H" with spacing, then split.
  Drop the football SVG (from src/utils/footballIcon.js) into the O slot.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <!-- guide frame (delete in LC) -->
  <rect x="0" y="0" width="800" height="200" fill="#0A0804"/>

  <!-- T at x=80, R at x=240, [football slot 380-460], C at x=520, H at x=680 -->
  <g id="letters" font-family="Teko, sans-serif" font-weight="900" font-size="180" fill="#EBB010" letter-spacing="6" text-anchor="middle">
    <text id="letter-T" x="120" y="155" opacity="0" transform="translate(0 -60)">T</text>
    <text id="letter-R" x="280" y="155" opacity="0" transform="translate(0 -60)">R</text>
    <text id="letter-C" x="560" y="155" opacity="0" transform="translate(0 -60)">C</text>
    <text id="letter-H" x="720" y="155" opacity="0" transform="translate(0 -60)">H</text>
  </g>

  <!-- football "O" placeholder. In LC, replace with actual football SVG paths
       from src/utils/footballIcon.js. Spin via rotation keyframe. -->
  <g id="football-O" transform="translate(420 110) rotate(0)" opacity="0">
    <ellipse cx="0" cy="0" rx="70" ry="44" fill="#5C3617" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="-30" y1="0" x2="30" y2="0" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="-15" y1="-7" x2="-15" y2="7" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="0" y1="-9" x2="0" y2="9" stroke="#FFFFFF" stroke-width="3"/>
    <line x1="15" y1="-7" x2="15" y2="7" stroke="#FFFFFF" stroke-width="3"/>
  </g>

  <!-- flame above the T (use starter #1 paths here once you build the ignition
       in LC, or just keyframe a scaled flame group on top of the T cap) -->
  <g id="flame-on-T" transform="translate(120 -10) scale(1.6)" opacity="0">
    <path fill="#EF3820" d="M16.77607,32.97235c0,0-8.62259,0.72281-10.90293-5.22241c0,0,0.91624,0.14254,2.18875,0.05089c0,0-2.97258-3.07435-1.99533-7.94048c0,0,0.38685,1.59829,1.49651,2.0971c0,0-0.04076-0.39698-0.08146-1.03833c-0.45648-7.88977,5.29012-10.11692,5.39545-13.621l0.733,1.11979c0,0,2.1378-3.52234-0.04076-6.89196c-0.18323-0.2952,0.12216-0.64129,0.42761-0.48863c2.20907,1.16055,6.60689,3.99059,8.71418,8.98906c0,0,0.67186-1.45575,1.3641-1.64917c-0.07127,0.23412-1.18087,3.88881,1.07909,6.99374c0,0,2.13786,3.36962,1.8019,5.80268c0,0,0.82459-0.7737,1.11979-1.65936C28.07597,19.51426,29.58267,32.59569,16.77607,32.97235z"/>
    <path fill="#F8AB1F" d="M14.68431,13.2c0.17783,0.38763,0.45541,0.83912,0.88113,0.8137c0.42606-0.02543,0.64873-0.50917,0.76382-0.92017c0.4423-1.57952,0.65917-3.22198,0.642-4.86216c1.26,1.41103,2.52715,2.83159,3.5182,4.44293c2.2072,3.58867,1.46806,5.55673,1.91391,5.90033c0.16984,0.13089,0.43115,0.06213,0.57997-0.09224c0.14882-0.15437,0.2131-0.36923,0.27243-0.57528c0.67106,2.61303,0.35992,5.46612-0.85859,7.87308c0.37932-0.13055,0.71753-0.18838,1.09686-0.31894c-0.38076,1.07008-1.03283,6.55796-7.37309,6.15187c-0.82954-0.05313-1.65846-0.17206-2.39113-0.56469c-0.67899-0.36387-1.30035-0.85278-1.75136-1.4773c-0.451-0.62452-0.72358-1.39081-0.69091-2.16047c0.42093,0.21707,0.84186,0.43414,1.26279,0.65121C10.9112,22.66396,12.55488,18.42272,14.68431,13.2z"/>
  </g>
</svg>
