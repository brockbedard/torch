<!--
  TORCH Lottie Starter #3 — Per-Team TOUCHDOWN Stamp
  Drop into LottieCreator: New Animation → Import → SVG.

  Animation plan (1.8s, 54 frames @ 30fps):
    0.0–0.15s — slam in: scale 2.5→1, rotation 8°→0°, opacity 0→1, ease cubic.out
    0.15–0.20s — overshoot: scale 1→1.04→1 (small bounce)
    0.20–0.30s — shimmer sweep: linear gradient mask moves left→right across
                  the text fill. (white sheen on top of team color)
    0.30–1.5s — hold: gentle scale wobble (1, 1.01, 1) + flame underline pulse
    1.5–1.8s — exit: scale 1→1.1, opacity 1→0 (cubic.in)

  Per-team config — DON'T animate these in LC, set them at runtime via JS:
    - text fill color: TEAMS[teamId].colors.primary
    - font-family: TEAM_WORDMARKS[teamId].font
    - font-weight: TEAM_WORDMARKS[teamId].weight

  In LC: animate the GENERIC version (gold/Teko 900). At export, the .lottie
  JSON contains a fontFamily + fillColor field for the text layer. Patch
  those at runtime via:
    const animData = JSON.parse(json);
    animData.fonts.list[0].fName = TEAM_WORDMARKS[teamId].font;
    animData.layers[textLayerIdx].t.d.k[0].s.fc = hexToRgb01(team.colors.primary);
    new DotLottie({ data: JSON.stringify(animData), ... })

  ALTERNATIVE if JSON-patching feels fragile: Render team text as a DOM
  element OVER the Lottie. Lottie provides ONLY the slam motion + flame
  underline + shimmer mask. Text stays in DOM, GSAP slams it in matching the
  Lottie timeline. This is the more reliable pattern.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <rect x="0" y="0" width="800" height="280" fill="#0A0804"/>

  <!-- TOUCHDOWN word -->
  <text id="td-word" x="400" y="180" font-family="Teko, sans-serif" font-weight="900" font-size="160" letter-spacing="6"
        fill="#EBB010" text-anchor="middle">TOUCHDOWN</text>

  <!-- shimmer mask placeholder — in LC, create a clipPath with a white
       gradient and animate the gradient transform's translateX from -800 to 800 -->
  <g id="shimmer" opacity="0">
    <rect x="0" y="100" width="80" height="120" fill="url(#shimmer-grad)"/>
  </g>
  <defs>
    <linearGradient id="shimmer-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- flame underline accent -->
  <g id="flame-underline" transform="translate(380 210) scale(1.4)" opacity="0">
    <path fill="#EF3820" d="M16.77607,32.97235c0,0-8.62259,0.72281-10.90293-5.22241c0,0,0.91624,0.14254,2.18875,0.05089c0,0-2.97258-3.07435-1.99533-7.94048c0,0,0.38685,1.59829,1.49651,2.0971c0,0-0.04076-0.39698-0.08146-1.03833c-0.45648-7.88977,5.29012-10.11692,5.39545-13.621l0.733,1.11979c0,0,2.1378-3.52234-0.04076-6.89196c-0.18323-0.2952,0.12216-0.64129,0.42761-0.48863c2.20907,1.16055,6.60689,3.99059,8.71418,8.98906c0,0,0.67186-1.45575,1.3641-1.64917c-0.07127,0.23412-1.18087,3.88881,1.07909,6.99374c0,0,2.13786,3.36962,1.8019,5.80268c0,0,0.82459-0.7737,1.11979-1.65936C28.07597,19.51426,29.58267,32.59569,16.77607,32.97235z"/>
    <path fill="#F8AB1F" d="M14.68431,13.2c0.17783,0.38763,0.45541,0.83912,0.88113,0.8137c0.42606-0.02543,0.64873-0.50917,0.76382-0.92017c0.4423-1.57952,0.65917-3.22198,0.642-4.86216c1.26,1.41103,2.52715,2.83159,3.5182,4.44293c2.2072,3.58867,1.46806,5.55673,1.91391,5.90033c0.16984,0.13089,0.43115,0.06213,0.57997-0.09224c0.14882-0.15437,0.2131-0.36923,0.27243-0.57528c0.67106,2.61303,0.35992,5.46612-0.85859,7.87308c0.37932-0.13055,0.71753-0.18838,1.09686-0.31894c-0.38076,1.07008-1.03283,6.55796-7.37309,6.15187c-0.82954-0.05313-1.65846-0.17206-2.39113-0.56469c-0.67899-0.36387-1.30035-0.85278-1.75136-1.4773c-0.451-0.62452-0.72358-1.39081-0.69091-2.16047c0.42093,0.21707,0.84186,0.43414,1.26279,0.65121C10.9112,22.66396,12.55488,18.42272,14.68431,13.2z"/>
  </g>
</svg>
