<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#09081A">
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>🔥 TORCH — The Football Card Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Teko:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Modularized CSS -->
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="root"></div>
  <!-- Modularized JS Entry Point -->
  <script type="module" src="/src/main.js"></script>
  <script>
    // Request fullscreen on first user interaction
    document.addEventListener('click', function goFS() {
      var el = document.documentElement;
      if (el.requestFullscreen) el.requestFullscreen().catch(function(){});
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      document.removeEventListener('click', goFS);
    }, { once: true });
  </script>
</body>
</html>
